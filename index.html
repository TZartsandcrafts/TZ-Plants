
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>植物管家</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;background:linear-gradient(150deg,#dce8d8,#c8dcc0,#d4e4cc);color:#3a5030;-webkit-tap-highlight-color:transparent}
button:active{opacity:.7}
input::placeholder,textarea::placeholder{color:#9aaa88;opacity:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(100,150,80,.3);border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// --- DATA (完全保留) ---
var W={loc:"Surrey, BC",upd:"2026年5月13日",temp:16,hum:83,pre:0,cond:"多云",emo:"⛅",rain:false,fc:[{d:"今天",e:"⛅",t:"多云"},{d:"明天",e:"☀️",t:"晴天"},{d:"后天",e:"🌤️",t:"晴转多云"}],tip:"近日无雨，湿度偏高，浇水适量即可"};
var SK="plants_v9";
var FERT_DB=[{id:"npk_bal",name:"复合肥",icon:"🌿",type:"化肥",npk:"15-15-15",desc:"氮磷钾均衡，通用追肥。",usage:"土施或稀释",dosage:"5–10 g/株",interval:"2-3周",suitable:"通用",caution:"避开根部。"},{id:"urea",name:"尿素",icon:"🌱",type:"化肥",npk:"46-0-0",desc:"速效氮肥，促枝叶。",usage:"土施",dosage:"3–5 g/株",interval:"2-4周",suitable:"蔬菜、果树",caution:"易烧根。"},{id:"kh2po4",name:"磷酸二氢钾",icon:"🌸",type:"化肥",npk:"0-52-34",desc:"促花果，强枝条。",usage:"喷施",dosage:"1-3 g/L",interval:"每月1-2次",suitable:"花卉、番茄",caution:"浓度勿高。"},{id:"organic",name:"有机肥",icon:"🌾",type:"有机肥",npk:"2-1-1",desc:"改良土壤，肥效久。",usage:"基肥",dosage:"100g+",interval:"每季度",suitable:"所有",caution:"需腐熟。"}];
var MED_DB=[{id:"carbendazim",name:"多菌灵",icon:"🔵",type:"杀菌剂",chemical:"苯并咪唑",target:"白粉病、灰霉",desc:"常用杀菌剂。",dosage:"800倍",method:"喷雾",interval:"7-10天",safetyDays:15,caution:"连用易抗药。"},{id:"imidacloprid",name:"吡虫啉",icon:"🔴",type:"杀虫剂",chemical:"烟碱类",target:"蚜虫、粉虱",desc:"刺吸害虫特效。",dosage:"1500倍",method:"喷雾",interval:"10-15天",safetyDays:14,caution:"花期禁用。"},{id:"matrine",name:"苦参碱",icon:"🍃",type:"生物药",chemical:"植物碱",target:"红蜘蛛、蚜虫",desc:"低毒环保。",dosage:"800倍",method:"喷雾",interval:"5-7天",safetyDays:3,caution:"见光分解。"}];
var CATS=[{key:"fruit",icon:"🍎",label:"果树"},{key:"shrub",icon:"🌿",label:"灌木"},{key:"veg",icon:"🥬",label:"蔬菜"},{key:"perennial",icon:"🌸",label:"多年生"},{key:"annual",icon:"🌱",label:"一年生"},{key:"succulent",icon:"🌵",label:"多肉"},{key:"indoor",icon:"🪴",label:"室内"},{key:"other",icon:"📦",label:"其他"}];
var SRCS=[{key:"seed",icon:"🌱",label:"种子自播"},{key:"sapling",icon:"🌿",label:"购入苗木"},{key:"mature",icon:"🪴",label:"购入成株"},{key:"cutting",icon:"✂️",label:"扦插繁殖"},{key:"graft",icon:"🔗",label:"嫁接"},{key:"division",icon:"🌾",label:"分株"},{key:"other",icon:"📦",label:"其他"}];
var BLANK={name:"",variety:"",type:"",category:"other",source:"sapling",wi:3,fi:14,waterLog:[],fertLog:[],medLog:[]};

// --- STATE ---
var S={
    plants: (function(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return [];}})(),
    showAdd:false, search:'', formTab:'basic', form:Object.assign({},BLANK), logPlantId:null, logType:null, lf:{date:td(),note:''}
};

// --- HELPERS ---
function q(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function td(){return new Date().toISOString().slice(0,10);}
function ds(d){if(!d)return null;var dt=new Date(d.replace(/-/g,'/'));return Math.floor((new Date()-dt)/86400000);}
function ld(log){return log&&log.length?log[log.length-1].date:null;}

function buildAdvice(p){
    var wd=ds(ld(p.waterLog)), fd=ds(ld(p.fertLog));
    var L=[];
    L.push('💧 '+( (wd==null||wd>=p.wi)?'建议浇水':'距下一次约'+(p.wi-wd)+'天' ));
    L.push('🌿 '+( (fd==null||fd>=p.fi)?'可以施肥了':'距下一次约'+(p.fi-fd)+'天' ));
    return L.join('\n');
}

// --- RENDER ---
function render(){
    var sy=window.scrollY;
    var act=document.activeElement;
    var actId=act?act.id:null;
    document.getElementById('root').innerHTML=buildApp();
    window.scrollTo(0,sy);
    if(actId){var el=document.getElementById(actId);if(el)el.focus();}
}

function saveFormVal(){
    var els=document.querySelectorAll('[data-field]');
    for(var i=0;i<els.length;i++){ S.form[els[i].dataset.field]=els[i].value; }
}

function savePlant(){
    saveFormVal();
    if(!S.form.name.trim()){alert('请输入名称');return;}
    var np=JSON.parse(JSON.stringify(S.form));
    np.id=Date.now().toString();
    S.plants.push(np);
    S.showAdd=false;
    localStorage.setItem(SK,JSON.stringify(S.plants));
    render();
}

function buildApp(){
    var list=S.plants;
    var FS="background:rgba(255,255,255,0.7);border:1px solid rgba(150,185,130,0.5);border-radius:8px;padding:8px 12px;color:#2e4a22;font-size:13px;width:100%;outline:none;";
    
    var html='<div style="max-width:460px;margin:0 auto;padding:16px">';
    html+='<div style="padding:20px;text-align:center"><h1 style="color:#3d5c30;font-size:29px;font-weight:700">植物管家</h1></div>';
    
    // 天气
    html+='<div style="background:rgba(255,255,255,0.6);border:1px solid rgba(150,185,130,0.5);border-radius:18px;padding:17px;margin-bottom:18px">';
    html+='<div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;color:#6a8a5a">📍 '+W.loc+'</div><div style="font-size:31px;color:#2e4a22">'+W.emo+' '+W.temp+'°C</div></div><div style="text-align:right;font-size:12px;color:#6a8858">湿度 '+W.hum+'%<br>'+W.cond+'</div></div>';
    html+='<div style="margin-top:10px;background:rgba(175,210,155,0.3);border-radius:8px;padding:7px 12px;font-size:12px;color:#4a6838">💡 '+q(W.tip)+'</div></div>';

    // 列表控制
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><span style="font-size:11px;color:#6a8858">我的植物 ('+list.length+')</span><button onclick="S.showAdd=true;render()" style="padding:6px 15px;border-radius:20px;background:rgba(160,200,135,0.3);border:1px solid rgba(130,175,105,0.5);font-size:12px">+ 添加植物</button></div>';

    if(S.showAdd){
        html+='<div style="background:white;padding:15px;border-radius:15px;border:1px solid rgba(150,185,130,0.4);margin-bottom:15px"><label style="font-size:10px">植物名称 *</label><input id="name_inp" data-field="name" value="'+q(S.form.name)+'" style="'+FS+'">';
        html+='<div style="display:flex;gap:8px;margin-top:15px"><button onclick="savePlant()" style="flex:1;padding:12px;background:#6a8858;color:white;border:none;border-radius:10px;font-weight:700">保存</button><button onclick="S.showAdd=false;render()" style="flex:1;padding:12px;background:#eee;border:none;border-radius:10px">取消</button></div></div>';
    }

    if(list.length===0 && !S.showAdd){
        html+='<div style="text-align:center;padding:50px 0;color:#8a9e78">🪴<br><br>还没有植物</div>';
    } else {
        for(var i=0; i<list.length; i++){
            var p=list[i];
            html+='<div style="background:rgba(255,255,255,0.7);padding:17px;border-radius:16px;margin-bottom:15px;border:1px solid rgba(150,185,130,0.4)">';
            html+='<div style="display:flex;justify-content:space-between"><strong>'+q(p.name)+'</strong><button onclick="S.plants.splice('+i+',1);localStorage.setItem(SK,JSON.stringify(S.plants));render()" style="background:none;border:none;color:#ccc">✕</button></div>';
            html+='<div style="background:rgba(180,210,160,0.3);padding:10px;border-radius:10px;margin:12px 0;font-size:13px;white-space:pre-line">'+q(buildAdvice(p))+'</div>';
            html+='<div style="display:flex;gap:8px"><button onclick="S.logPlantId=\''+p.id+'\';S.logType=\'water\';render()" style="flex:1;padding:10px;border-radius:10px;background:rgba(180,215,160,0.3);border:none;font-size:12px">💧 浇水</button><button onclick="S.logPlantId=\''+p.id+'\';S.logType=\'fert\';render()" style="flex:1;padding:10px;border-radius:10px;background:rgba(180,215,160,0.3);border:none;font-size:12px">🌿 施肥</button></div></div>';
        }
    }
    html+='</div>';
    return html;
}
render();
</script>
</body>
</html>
