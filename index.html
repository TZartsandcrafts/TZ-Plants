<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="植物志"/>
<meta name="theme-color" content="#c8dcc0"/>
<title>植物志</title>

<!-- React + Babel (CDN, 无需 npm) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: linear-gradient(150deg, #dce8d8 0%, #c8dcc0 50%, #d4e4cc 100%);
  background-attachment: fixed;
  color: #2e4a22;
  min-height: 100vh;
}

/* ── CSS 变量 ── */
:root {
  --green-dark:   #2e4a22;
  --green-mid:    #5a8040;
  --green-light:  #7a9e7e;
  --green-pale:   #c8dcc0;
  --bg-card:      rgba(255,255,255,0.58);
  --border-card:  rgba(150,185,130,0.35);
  --safe-bottom:  max(env(safe-area-inset-bottom, 0px), 16px);
  --nav-height:   58px;
}

/* ── App 容器 ── */
#root {
  max-width: 460px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ── 底部导航 ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 460px;
  z-index: 100;
  background: rgba(235, 244, 230, 0.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid rgba(140, 185, 120, 0.3);
  display: flex;
  padding-bottom: var(--safe-bottom);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 4px 6px;
  background: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.12s;
}
.nav-item:active { opacity: 0.6; }

.nav-icon {
  font-size: 22px;
  line-height: 1;
  position: relative;
}

/* 徽标（待办数量） */
.nav-badge {
  position: absolute;
  top: -4px; right: -8px;
  background: #e05030;
  color: white;
  font-size: 9px;
  font-weight: 700;
  border-radius: 8px;
  padding: 1px 4px;
  min-width: 16px;
  text-align: center;
  line-height: 14px;
}

.nav-label {
  font-size: 10px;
  color: #8aaa78;
  font-weight: 500;
  letter-spacing: 0.2px;
}

.nav-item.active .nav-label {
  color: var(--green-dark);
  font-weight: 700;
}

.nav-active-bar {
  width: 20px; height: 2.5px;
  background: var(--green-mid);
  border-radius: 2px;
  margin-top: 1px;
}

/* ── 页面内容区 ── */
.page-content {
  padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 8px);
  min-height: 100vh;
}

/* ── 粘性顶栏 ── */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(215, 230, 210, 0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(140, 185, 120, 0.25);
  padding: 14px 16px 11px;
  padding-top: max(14px, env(safe-area-inset-top, 14px));
}

.header-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--green-dark);
  letter-spacing: -0.3px;
}
.header-sub {
  font-size: 11px;
  color: var(--green-light);
  margin-top: 2px;
}

/* ── 通用卡片 ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: 14px;
  padding: 13px 14px;
}

/* ── 占位页面 ── */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 80px 32px;
  text-align: center;
}
.placeholder-emoji { font-size: 60px; opacity: 0.55; }
.placeholder-title { font-size: 18px; font-weight: 700; color: #3a5828; }
.placeholder-desc  { font-size: 13px; color: #7a9060; line-height: 1.7; }

/* ── Toast ── */
.toast-wrap {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  z-index: 999;
  pointer-events: none;
  transition: transform 0.28s cubic-bezier(0.34, 1.3, 0.64, 1);
}
.toast-wrap.show {
  transform: translateX(-50%) translateY(0);
}
.toast-inner {
  background: rgba(30, 60, 18, 0.92);
  color: white;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 24px;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}

/* ── 通用按钮 ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 11px 16px;
  border-radius: 12px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.12s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.7; transform: scale(0.97); }
.btn-primary {
  background: rgba(100, 160, 70, 0.88);
  color: white;
}
.btn-secondary {
  background: rgba(200, 218, 190, 0.45);
  border: 1px solid rgba(160, 190, 140, 0.4);
  color: #4a6a38;
}
.btn-ghost {
  background: transparent;
  color: var(--green-mid);
  font-size: 13px;
  padding: 8px 12px;
}

/* ── Chip / Tag ── */
.chip {
  display: inline-block;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 20px;
  background: rgba(150, 200, 120, 0.22);
  border: 1px solid rgba(130, 180, 100, 0.3);
  color: #3a5828;
}

/* ── 输入框 ── */
.input {
  width: 100%;
  padding: 9px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(150, 185, 130, 0.45);
  font-family: inherit;
  font-size: 14px;
  color: var(--green-dark);
  outline: none;
  -webkit-appearance: none;
}
.input:focus {
  border-color: rgba(90, 128, 64, 0.7);
  background: rgba(255,255,255,0.88);
}
.input::placeholder { color: #9aaa88; }

/* ── 页面切换动画 ── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter { animation: slideUp 0.22s ease both; }

/* ── 全屏子页面 ── */
.fullpage {
  position: fixed;
  inset: 0;
  z-index: 80;
  background: linear-gradient(150deg, #dce8d8 0%, #c8dcc0 50%, #d4e4cc 100%);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.fullpage > div:last-of-type {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── 返回按钮 ── */
.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 30px;
  color: var(--green-mid);
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}

/* ── 表单 label ── */
.field-label {
  display: block;
  font-size: 11px;
  color: #6a8858;
  margin-bottom: 3px;
  font-weight: 500;
}

/* ── 植物卡片 ── */
.plant-card {
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(150,185,130,0.45);
  border-radius: 16px;
  padding: 14px 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── 护理按钮 ── */
.care-btn {
  flex: 1;
  padding: 8px 4px;
  border-radius: 9px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  text-align: center;
  border: 1px solid rgba(150,185,130,0.45);
  background: rgba(180,215,160,0.2);
  color: #4a7040;
  transition: opacity 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.care-btn:active { opacity: 0.65; }

/* ── 图标按钮（编辑/删除） ── */
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  padding: 3px 5px;
  border-radius: 6px;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { opacity: 0.6; }

/* ── 分类筛选条 ── */
.cat-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 8px 16px 10px;
  scrollbar-width: none;
}
.cat-strip::-webkit-scrollbar { display: none; }

.cat-chip {
  white-space: nowrap;
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: rgba(180,210,160,0.2);
  border: 1px solid rgba(150,185,130,0.3);
  color: #5a7848;
  font-family: inherit;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.cat-chip.active {
  background: rgba(80,120,54,0.82);
  border-color: rgba(60,100,34,0.8);
  color: white;
  font-weight: 700;
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 14px);
  right: max(calc(50% - 230px + 16px), 16px);
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6aaa44, #4a8a30);
  border: none;
  cursor: pointer;
  font-size: 26px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(50,90,30,0.32);
  z-index: 60;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(50,90,30,0.22); }

/* ── 确认弹窗 overlay ── */
.confirm-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(40,65,25,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.confirm-box {
  background: #f5f8f2;
  border-radius: 18px;
  padding: 24px 20px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.16);
}

/* ── Bottom sheet (表单 modal) ── */
.sheet-panel {
  background: #f0f5ec;
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-bottom: var(--safe-bottom);
  /* 让 overlay 底部对齐 */
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 201;
}
.sheet-handle {
  width: 36px;
  height: 4px;
  background: rgba(120,160,90,0.35);
  border-radius: 2px;
  margin: 12px auto 4px;
  flex-shrink: 0;
}
.sheet-scroll {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-top: 4px;
  padding-bottom: 8px;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ═══════════════════════════════════════════════════════
// 1.  STORAGE KEYS（与旧版完全兼容）
// ═══════════════════════════════════════════════════════
const SK = {
  plants:  'plants_v9',
  cats:    'plant_cats',
  fert:    'lib_fert',
  med:     'lib_med',
  soil:    'lib_soil',
  archive: 'plant_archive',
  prop:    'lib_prop',
};

// ═══════════════════════════════════════════════════════
// 2.  DEFAULT VALUES
// ═══════════════════════════════════════════════════════
const DEFAULT_CATS = ['🍎 水果', '🌿 调味', '🌺 花木', '🥬 蔬菜'];

const BLANK_PLANT = () => ({
  id: '', name: '', variety: '', type: '', category: '', notes: '', photo: '',
  status: 'healthy',
  source: 'sapling',
  indoorStart: '',
  buyDate: '', buyFrom: '', buySpec: '', buyPrice: '',
  sowDate: '', sowMethod: '', seedSource: '',
  germDate: '', germNotes: '',
  opDate: '', opNotes: '', rootDate: '',
  hardeningDate: '', hardeningDays: 7, hardeningNotes: '',
  prePlantDate: '', prePlantNotes: '',
  transplantDate: '', transplantNotes: '',
  finalPlantDate: '', finalPlantNotes: '', finalPlantLocation: '',
  wi: 7, fi: 14, mi: 30,
  medMode: 'symptom',
  waterLog: [], fertLog: [], medLog: [], noteLog: [],
});

// ═══════════════════════════════════════════════════════
// 3.  STORAGE HELPERS
// ═══════════════════════════════════════════════════════
function readLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function writeLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function loadAll() {
  const archive = readLS(SK.archive, { plants: [], batches: [] });
  return {
    plants:  readLS(SK.plants,  []),
    cats:    readLS(SK.cats,    DEFAULT_CATS),
    lib: {
      fert:  readLS(SK.fert,   []),
      med:   readLS(SK.med,    []),
      soil:  readLS(SK.soil,   []),
    },
    archive: { plants: archive.plants || [], batches: archive.batches || [] },
    prop:    readLS(SK.prop,    []),
  };
}

function saveAll(db) {
  writeLS(SK.plants,  db.plants);
  writeLS(SK.cats,    db.cats);
  writeLS(SK.fert,    db.lib.fert);
  writeLS(SK.med,     db.lib.med);
  writeLS(SK.soil,    db.lib.soil);
  writeLS(SK.archive, db.archive);
  writeLS(SK.prop,    db.prop);
}

// ═══════════════════════════════════════════════════════
// 4.  UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════
function uid() {
  return 'p' + Date.now() + Math.random().toString(36).slice(2, 6);
}

function toDay() {
  const d = new Date();
  return [d.getFullYear(), String(d.getMonth() + 1).padStart(2, '0'), String(d.getDate()).padStart(2, '0')].join('-');
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  const dt = new Date(+m[1], +m[2] - 1, +m[3]);
  return Math.floor((Date.now() - dt) / 86400000);
}

function fmtDate(s) {
  if (!s) return '—';
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[1]}/${m[2]}/${m[3]}` : s;
}

function lastLog(log) {
  return log?.length ? log[log.length - 1].date : null;
}

// 自动推断浇水/施肥间隔
const AUTO_INT = [
  { k: ['多肉', '仙人掌'],  w: 10, f: 30 },
  { k: ['玫瑰', '月季'],    w: 2,  f: 10 },
  { k: ['薄荷', '香草'],    w: 2,  f: 14 },
  { k: ['蝴蝶兰', '兰花'],  w: 7,  f: 14 },
  { k: ['橡皮树', '龟背竹'],w: 5,  f: 21 },
  { k: ['绿萝', '吊兰'],    w: 3,  f: 14 },
  { k: ['番茄', '辣椒'],    w: 1,  f: 7  },
];
function autoInterval(name) {
  for (const r of AUTO_INT) {
    if (r.k.some(k => name.includes(k))) return { wi: r.w, fi: r.f };
  }
  return { wi: 7, fi: 14 };
}

// 植物护理到期检查
function careAlerts(plant) {
  const alerts = [];
  const lw = lastLog(plant.waterLog);
  const dw = lw != null ? daysSince(lw) : 999;
  if (dw >= (plant.wi || 7))
    alerts.push({ type: 'water', icon: '💧', label: `浇水（已 ${dw} 天）`, color: '#1a5a99' });

  const lf = lastLog(plant.fertLog);
  const df = lf != null ? daysSince(lf) : 999;
  if (df >= (plant.fi || 14))
    alerts.push({ type: 'fert', icon: '🌿', label: `施肥（已 ${df} 天）`, color: '#2a7020' });

  if (plant.medMode === 'scheduled') {
    const lm = lastLog(plant.medLog);
    const dm = lm != null ? daysSince(lm) : 999;
    if (dm >= (plant.mi || 30))
      alerts.push({ type: 'med', icon: '💊', label: `给药（已 ${dm} 天）`, color: '#882010' });
  }
  return alerts;
}

// 植物 emoji 推断
function plantEmoji(p) {
  const s = (p.name + p.variety + p.category).toLowerCase();
  if (/多肉|仙人/.test(s)) return '🌵';
  if (/玫瑰|月季|蔷薇/.test(s)) return '🌹';
  if (/兰/.test(s)) return '🌸';
  if (/苹果|梨|桃|李|橙|柠檬/.test(s)) return '🍎';
  if (/番茄|辣椒/.test(s)) return '🍅';
  if (/黄瓜|瓜/.test(s)) return '🥒';
  if (/薄荷|罗勒|香草/.test(s)) return '🌿';
  if (/树|木/.test(s)) return '🌳';
  return '🪴';
}

// ═══════════════════════════════════════════════════════
// 5.  APP CONTEXT（全局状态）
// ═══════════════════════════════════════════════════════
const AppCtx = createContext(null);

function useApp() { return useContext(AppCtx); }

// ═══════════════════════════════════════════════════════
// 6.  TOAST HOOK
// ═══════════════════════════════════════════════════════
function useToast() {
  const [state, setState] = useState({ msg: '', show: false });
  const timerRef = useRef(null);

  const showToast = useCallback((msg, ms = 2200) => {
    clearTimeout(timerRef.current);
    setState({ msg, show: true });
    timerRef.current = setTimeout(() => setState(s => ({ ...s, show: false })), ms);
  }, []);

  const Toast = (
    <div className={`toast-wrap ${state.show ? 'show' : ''}`}>
      <div className="toast-inner">{state.msg}</div>
    </div>
  );

  return { showToast, Toast };
}

// ═══════════════════════════════════════════════════════
// 7.  BOTTOM NAV
// ═══════════════════════════════════════════════════════
const NAV_ITEMS = [
  { id: 'calendar',  icon: '📅', label: '日历'  },
  { id: 'plants',    icon: '🪴', label: '植物'  },
  { id: 'breeding',  icon: '🌱', label: '繁育'  },
  { id: 'inventory', icon: '📦', label: '库存'  },
];

function BottomNav({ tab, onNav, urgentCount }) {
  return (
    <nav className="bottom-nav">
      {NAV_ITEMS.map(item => (
        <button
          key={item.id}
          className={`nav-item ${tab === item.id ? 'active' : ''}`}
          onClick={() => onNav(item.id)}
        >
          <span className="nav-icon">
            {item.icon}
            {item.id === 'plants' && urgentCount > 0 && (
              <span className="nav-badge">{urgentCount > 9 ? '9+' : urgentCount}</span>
            )}
          </span>
          <span className="nav-label">{item.label}</span>
          {tab === item.id && <div className="nav-active-bar" />}
        </button>
      ))}
    </nav>
  );
}

// ═══════════════════════════════════════════════════════
// 8.  TAB VIEWS
// ═══════════════════════════════════════════════════════

// ── 日历 Tab ──
function CalendarTab() {
  return (
    <div className="page-content page-enter">
      <div className="sticky-header">
        <div className="header-title">📅 日历</div>
        <div className="header-sub">护理日历与提醒</div>
      </div>
      <div className="placeholder">
        <div className="placeholder-emoji">📅</div>
        <div className="placeholder-title">日历</div>
        <div className="placeholder-desc">即将迁移：月历视图 · 每日护理提醒 · 天气建议</div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// ── 植物 Tab ──
// ════════════════════════════════════════════════════════

const STATUS_MAP = {
  healthy: { label: '✅ 健康',  color: '#2a6a35', bg: 'rgba(80,190,80,0.15)'   },
  watch:   { label: '👀 观察中', color: '#7a6010', bg: 'rgba(220,185,60,0.18)'  },
  treat:   { label: '💊 治疗中', color: '#8a2818', bg: 'rgba(210,90,70,0.18)'   },
};

const SRCS = [
  { key:'seed',     icon:'🌱', label:'种子自播'    },
  { key:'sapling',  icon:'🌿', label:'购入苗木'    },
  { key:'mature',   icon:'🪴', label:'购入成株'    },
  { key:'bulb',     icon:'🧅', label:'购入球根/种球'},
  { key:'cutting',  icon:'✂️', label:'扦插繁殖'    },
  { key:'graft',    icon:'🔗', label:'嫁接'        },
  { key:'division', icon:'🌾', label:'分株'        },
  { key:'other',    icon:'📦', label:'其他'        },
];

// ── 生长档案 timeline ──
function buildTimeline(p) {
  const items = [];
  const add = (icon, label, date, note, color) => {
    if (date) items.push({ icon, label, date, note, color });
  };
  const src = SRCS.find(s => s.key === p.source);

  if (p.source === 'seed') {
    add('🌱','播种', p.sowDate,
      [p.indoorStart ? `环境：${p.indoorStart==='indoor'?'室内':'室外'}` : '',
       p.sowMethod   ? `方式：${p.sowMethod}` : '',
       p.seedSource  ? `种子来源：${p.seedSource}` : ''].filter(Boolean).join('\n'),
      '#5a8040');
    add('🌿','发芽', p.germDate, p.germNotes||'', '#6a9040');
  }
  if (['sapling','mature','bulb','other'].includes(p.source)) {
    add(src?.icon||'🛒','购入', p.buyDate,
      [p.buyFrom  ? `来源：${p.buyFrom}`  : '',
       p.buySpec  ? `规格：${p.buySpec}`  : '',
       p.buyPrice ? `价格：${p.buyPrice}` : ''].filter(Boolean).join('\n'),
      '#5a7898');
  }
  if (p.source === 'cutting') {
    add('✂️','扦插', p.opDate,
      [p.indoorStart ? `环境：${p.indoorStart==='indoor'?'室内':'室外'}` : '',
       p.buyFrom  ? `插穗来源：${p.buyFrom}` : '',
       p.opNotes  ? `备注：${p.opNotes}`     : ''].filter(Boolean).join('\n'),
      '#7a6848');
    add('🌱','生根/成活', p.rootDate, '', '#5a8040');
  }
  if (p.source === 'graft') {
    add('🔗','嫁接', p.opDate,
      [p.indoorStart ? `环境：${p.indoorStart==='indoor'?'室内':'室外'}` : '',
       p.buyFrom  ? `砧木来源：${p.buyFrom}` : '',
       p.opNotes  ? `备注：${p.opNotes}`     : ''].filter(Boolean).join('\n'),
      '#7a6848');
    add('✅','成活确认', p.rootDate, '', '#5a8040');
  }
  if (p.source === 'division') {
    add('🌾','分株', p.opDate,
      [p.buyFrom ? `母株：${p.buyFrom}` : '',
       p.opNotes ? `备注：${p.opNotes}` : ''].filter(Boolean).join('\n'),
      '#7a6848');
  }
  if (p.hardeningDate && p.indoorStart === 'indoor') {
    const hd = daysSince(p.hardeningDate);
    const tgt = p.hardeningDays || 7;
    const done = hd >= tgt;
    add('🌤️', `炼苗${done?'（完成）':'（进行中）'}`, p.hardeningDate,
      [`计划${tgt}天${done ? '' : `，已${hd}天`}`,
       p.hardeningNotes ? `备注：${p.hardeningNotes}` : ''].filter(Boolean).join('\n'),
      '#8a7a30');
  }
  add('🪴','假植',   p.prePlantDate,  p.prePlantNotes||'',                              '#5a9068');
  add('🔄','移栽',   p.transplantDate, p.transplantNotes ? `备注：${p.transplantNotes}` : '', '#5a9888');
  add('📍','定植',   p.finalPlantDate,
    [p.finalPlantLocation ? `位置：${p.finalPlantLocation}` : '',
     p.finalPlantNotes    ? `备注：${p.finalPlantNotes}`    : ''].filter(Boolean).join('\n'),
    '#5a7898');
  return items;
}

// ── 日志管理页（全屏） ──
const LOG_META = {
  water: { icon:'💧', label:'浇水', key:'waterLog', ph:'浇水量、方式…'   },
  fert:  { icon:'🌿', label:'施肥', key:'fertLog',  ph:'施肥观察…'        },
  med:   { icon:'💊', label:'给药', key:'medLog',   ph:'用药后观察…'      },
};

function LogPage({ plantId, logType, onClose }) {
  const { db, updateDb, showToast } = useApp();
  const plant = db.plants.find(p => p.id === plantId);
  const meta  = LOG_META[logType];
  const log   = plant?.[meta.key] || [];

  const blankForm = () => ({ date: toDay(), note: '', name: '', reason: '', amount: '' });
  const [form,     setForm]     = useState(blankForm);
  const [editIdx,  setEditIdx]  = useState(null);
  const [delIdx,   setDelIdx]   = useState(null);   // 待确认删除的索引

  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));

  function handleSave() {
    if (!form.date) { showToast('⚠️ 请选择日期'); return; }
    updateDb(prev => {
      const plants = prev.plants.map(p => {
        if (p.id !== plantId) return p;
        const arr = [...(p[meta.key] || [])];
        const rec = { date: form.date };
        if (logType === 'fert') { rec.name = form.name; rec.amount = form.amount; rec.note = form.note; }
        else if (logType === 'med') { rec.name = form.name; rec.reason = form.reason; rec.amount = form.amount; rec.note = form.note; }
        else { rec.note = form.note; }
        if (editIdx !== null) arr[editIdx] = rec;
        else { arr.push(rec); arr.sort((a, b) => a.date.localeCompare(b.date)); }
        return { ...p, [meta.key]: arr };
      });
      return { ...prev, plants };
    });
    setEditIdx(null);
    setForm(blankForm());
    showToast(editIdx !== null ? '✅ 已保存修改' : `${meta.icon} 已记录${meta.label}`);
  }

  function handleStartEdit(idx) {
    const r = log[idx];
    setForm({ date: r.date, note: r.note||'', name: r.name||'', reason: r.reason||'', amount: r.amount||'' });
    setEditIdx(idx);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function handleDelete() {
    updateDb(prev => {
      const plants = prev.plants.map(p => {
        if (p.id !== plantId) return p;
        const arr = [...(p[meta.key] || [])];
        arr.splice(delIdx, 1);
        return { ...p, [meta.key]: arr };
      });
      return { ...prev, plants };
    });
    setDelIdx(null);
    showToast('🗑 已删除');
  }

  if (!plant) return null;

  return (
    <div className="fullpage page-enter">
      {/* 顶栏 */}
      <div className="sticky-header" style={{ display:'flex', alignItems:'center', gap:12 }}>
        <button className="back-btn" onClick={onClose}>‹</button>
        <div>
          <div className="header-title" style={{ fontSize:17 }}>
            {meta.icon} {plant.name}{plant.variety ? <span style={{ fontWeight:400, color:'#5a7848', marginLeft:6, fontSize:14 }}>{plant.variety}</span> : ''} · {meta.label}记录
          </div>
          <div className="header-sub">{meta.label}日志管理</div>
        </div>
      </div>

      <div style={{ padding:'14px 16px', paddingBottom: 40 }}>
        {/* 表单 */}
        <div className="card" style={{ marginBottom:14 }}>
          <div style={{ fontSize:12, color:'#6a8858', fontWeight:700, marginBottom:10 }}>
            {editIdx !== null ? '修改记录' : '新增记录'}
          </div>

          <label className="field-label">日期</label>
          <input type="date" className="input" style={{ marginBottom:8, colorScheme:'light' }}
            value={form.date} max={toDay()}
            onChange={e => setF('date', e.target.value)} />

          {logType === 'fert' && <>
            <label className="field-label">肥料名称</label>
            <input className="input" style={{ marginBottom:8 }} placeholder="复合肥、磷酸二氢钾…"
              value={form.name} onChange={e => setF('name', e.target.value)} />
            <label className="field-label">用量/浓度</label>
            <input className="input" style={{ marginBottom:8 }} placeholder="5g/L…"
              value={form.amount} onChange={e => setF('amount', e.target.value)} />
          </>}

          {logType === 'med' && <>
            <label className="field-label">药品名称</label>
            <input className="input" style={{ marginBottom:8 }} placeholder="多菌灵、吡虫啉…"
              value={form.name} onChange={e => setF('name', e.target.value)} />
            <label className="field-label">病症/原因</label>
            <input className="input" style={{ marginBottom:8 }} placeholder="白粉病、蚜虫…"
              value={form.reason} onChange={e => setF('reason', e.target.value)} />
            <label className="field-label">用量/浓度</label>
            <input className="input" style={{ marginBottom:8 }} placeholder="稀释800倍…"
              value={form.amount} onChange={e => setF('amount', e.target.value)} />
          </>}

          <label className="field-label">{logType === 'water' ? '备注（可选）' : '备注'}</label>
          <textarea className="input" rows={2} style={{ marginBottom:10, resize:'vertical', lineHeight:1.6 }}
            placeholder={meta.ph}
            value={form.note} onChange={e => setF('note', e.target.value)} />

          <div style={{ display:'flex', gap:8 }}>
            <button className="btn btn-primary" style={{ flex:1 }} onClick={handleSave}>
              ✓ {editIdx !== null ? '保存修改' : '添加'}
            </button>
            {editIdx !== null && (
              <button className="btn btn-secondary" onClick={() => { setEditIdx(null); setForm(blankForm()); }}>
                取消
              </button>
            )}
          </div>
        </div>

        {/* 历史列表 */}
        <div style={{ fontSize:12, color:'#6a8858', fontWeight:700, marginBottom:8 }}>
          历史记录（{log.length} 条）
        </div>
        {log.length === 0
          ? <div style={{ textAlign:'center', color:'#9aaa88', fontSize:13, padding:'28px 0' }}>暂无记录</div>
          : [...log].reverse().map((r, ri) => {
              const origIdx = log.length - 1 - ri;
              return (
                <div key={origIdx} className="card" style={{ marginBottom:8 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:'#2e4a22' }}>{fmtDate(r.date)}</span>
                      {r.name   && <span style={{ fontSize:12, color:'#5a7848', marginLeft:8 }}>{r.name}</span>}
                      {r.amount && <span style={{ fontSize:12, color:'#7a9060', marginLeft:6 }}>· {r.amount}</span>}
                      {r.reason && <div style={{ fontSize:11, color:'#9a7040', marginTop:2 }}>病症：{r.reason}</div>}
                      {r.note   && <div style={{ fontSize:12, color:'#6a8858', marginTop:2 }}>{r.note}</div>}
                    </div>
                    <div style={{ display:'flex', gap:2, flexShrink:0, marginLeft:8 }}>
                      <button className="icon-btn" onClick={() => handleStartEdit(origIdx)}>✏️</button>
                      <button className="icon-btn" onClick={() => setDelIdx(origIdx)}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })
        }
      </div>

      {/* 删除确认弹窗 */}
      {delIdx !== null && (
        <div className="confirm-overlay" onClick={() => setDelIdx(null)}>
          <div className="confirm-box" onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:28, marginBottom:10 }}>⚠️</div>
            <div style={{ fontSize:15, fontWeight:600, color:'#2e4a22', marginBottom:18 }}>
              确认删除这条记录吗？
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button className="btn btn-secondary" style={{ flex:1 }} onClick={() => setDelIdx(null)}>取消</button>
              <button className="btn" style={{ flex:1, background:'rgba(210,80,60,0.15)', border:'1px solid rgba(180,60,40,0.4)', color:'#8a2010' }}
                onClick={handleDelete}>确认删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 植物卡片 ──
function PlantCard({ plant, onOpenLog, onEdit, onDelete, onToggleTimeline, showTimeline }) {
  const wd  = daysSince(lastLog(plant.waterLog));
  const fd  = daysSince(lastLog(plant.fertLog));
  const wu  = (wd ?? 999) >= (plant.wi || 7);
  const fu  = (fd ?? 999) >= (plant.fi || 14);
  const st  = STATUS_MAP[plant.status] || STATUS_MAP.healthy;
  const src = SRCS.find(s => s.key === plant.source);
  const timelineItems = buildTimeline(plant);
  const startDate = plant.sowDate || plant.buyDate || plant.opDate;
  const urgent = wu || fu;

  return (
    <div className="plant-card" style={{ borderColor: urgent ? 'rgba(200,140,50,0.5)' : 'rgba(150,185,130,0.45)' }}>

      {/* 头部：名称 + 操作按钮 */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div style={{ flex:1, minWidth:0 }}>
          <span style={{ fontSize:21, fontWeight:700, color:'#2e4a22' }}>{plant.name}</span>
          {plant.variety && <span style={{ fontSize:14, color:'#5a7848', marginLeft:8 }}>{plant.variety}</span>}
        </div>
        <div style={{ display:'flex', gap:5, flexShrink:0, marginLeft:8 }}>
          <button className="btn btn-secondary" style={{ padding:'4px 10px', fontSize:11 }}
            onClick={() => onEdit(plant)}>✏️ 编辑</button>
          <button className="btn" style={{ padding:'4px 10px', fontSize:11, background:'rgba(220,150,140,0.25)', border:'1px solid rgba(190,110,100,0.5)', color:'#7a2818' }}
            onClick={() => onDelete(plant)}>✕</button>
        </div>
      </div>

      {/* 照片 + 状态信息 */}
      <div style={{ display:'flex', gap:10, alignItems:'stretch' }}>
        {/* 照片区 */}
        <PlantPhoto plant={plant} />

        {/* 状态信息 */}
        <div style={{ flex:1, minWidth:0, background:'rgba(180,215,165,0.3)', borderRadius:10, padding:'9px 11px', display:'flex', flexDirection:'column', gap:5 }}>
          <div style={{ fontSize:11, color:'#4a6a38', lineHeight:1.8 }}>
            {[plant.category, plant.type, src ? `${src.icon} ${src.label}` : ''].filter(Boolean).join(' · ') || <span style={{ color:'#aac090' }}>暂无类别信息</span>}
          </div>
          <div style={{ fontSize:11, color:'#4a6a38', display:'flex', alignItems:'center', gap:7, flexWrap:'wrap' }}>
            {plant.finalPlantLocation && <span>📍 {plant.finalPlantLocation}</span>}
            <span style={{ background:st.bg, color:st.color, borderRadius:10, padding:'1px 8px', fontSize:10, fontWeight:600 }}>{st.label}</span>
          </div>
          <div style={{ fontSize:11.5, color: urgent ? '#7a5010' : '#3a5228', lineHeight:1.75, fontWeight: urgent ? 700 : 400 }}>
            {wu
              ? `💧 该浇水了${wd != null ? `（已${wd}天）` : ''}`
              : wd != null ? `💧 ${wd}天前浇水，间隔${plant.wi}天` : `💧 浇水间隔：${plant.wi}天`}
            {'\n'}
            {fu
              ? `🌿 可以施肥了${fd != null ? `（已${fd}天）` : ''}`
              : fd != null ? `🌿 ${fd}天前施肥，间隔${plant.fi}天` : `🌿 施肥间隔：${plant.fi}天`}
          </div>
        </div>
      </div>

      {/* 护理按钮行 */}
      <div style={{ display:'flex', gap:6 }}>
        {[
          { type:'water', icon:'💧', days:wd, urgent:wu, count:plant.waterLog?.length||0 },
          { type:'fert',  icon:'🌿', days:fd, urgent:fu, count:plant.fertLog?.length||0  },
          { type:'med',   icon:'💊', days:daysSince(lastLog(plant.medLog)), urgent:false, count:plant.medLog?.length||0 },
        ].map(item => (
          <button key={item.type}
            className="care-btn"
            style={{
              borderColor: item.urgent ? 'rgba(200,140,50,0.5)' : 'rgba(150,185,130,0.45)',
              background:  item.urgent ? 'rgba(240,190,100,0.25)' : 'rgba(180,215,160,0.2)',
              color:       item.urgent ? '#7a5010' : '#4a7040',
            }}
            onClick={() => onOpenLog(plant.id, item.type)}>
            <div style={{ fontSize:15, marginBottom:1 }}>{item.icon}</div>
            <div>{item.urgent ? '⚠️ ' : ''}{item.days != null ? `${item.days}天前` : LOG_META[item.type].label}</div>
            <div style={{ fontSize:10, color:'#8aaa78' }}>{item.count}条记录</div>
          </button>
        ))}
      </div>

      {/* 底部按钮行 */}
      <div style={{ display:'flex', gap:6 }}>
        {timelineItems.length > 0 && (
          <button className="btn btn-secondary" style={{ flex:1, padding:'6px', fontSize:11 }}
            onClick={() => onToggleTimeline(plant.id)}>
            {showTimeline ? '▲ 收起档案' : '▼ 生长档案'}
            {startDate && <span style={{ marginLeft:6, color:'#8aaa68' }}>{daysSince(startDate)}天</span>}
          </button>
        )}
      </div>

      {/* 生长档案 timeline */}
      {showTimeline && timelineItems.length > 0 && (
        <div style={{ background:'rgba(180,210,160,0.2)', borderRadius:10, padding:'10px 13px' }}>
          <div style={{ fontSize:11, color:'#6a8858', marginBottom:8 }}>📋 生长档案</div>
          {timelineItems.map((item, idx) => (
            <div key={idx} style={{ display:'flex', gap:10, alignItems:'flex-start', padding:'6px 0', borderBottom: idx < timelineItems.length-1 ? '1px solid rgba(150,185,130,0.15)' : 'none' }}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
                  <span style={{ fontSize:11, color:item.color, fontWeight:700 }}>{item.label}</span>
                  <span style={{ fontSize:11, color:'#7a9868' }}>{fmtDate(item.date)}</span>
                </div>
                {item.note && <div style={{ fontSize:11, color:'#7a9060', marginTop:3, lineHeight:1.7, whiteSpace:'pre-line' }}>{item.note}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 照片组件 ──
function PlantPhoto({ plant }) {
  const { updateDb, showToast } = useApp();

  function handlePhoto(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('⚠️ 图片超过 5MB，请压缩后再上传'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      updateDb(prev => ({
        ...prev,
        plants: prev.plants.map(p => p.id === plant.id ? { ...p, photo: ev.target.result } : p)
      }));
    };
    reader.readAsDataURL(file);
  }

  return (
    <div style={{ position:'relative', flexShrink:0 }}>
      {plant.photo
        ? <img src={plant.photo} style={{ width:85, height:85, objectFit:'cover', borderRadius:12, border:'1px solid rgba(150,185,130,0.4)', display:'block' }} />
        : <label style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', width:85, height:85, borderRadius:12, border:'1.5px dashed rgba(150,185,130,0.5)', background:'rgba(180,210,160,0.15)', cursor:'pointer', gap:3 }}>
            <span style={{ fontSize:24 }}>📷</span>
            <span style={{ fontSize:9, color:'#8aaa78' }}>添加照片</span>
            <input type="file" accept="image/*" style={{ display:'none' }} onChange={handlePhoto} />
          </label>
      }
      {plant.photo && (
        <label style={{ position:'absolute', bottom:3, right:3, background:'rgba(0,0,0,0.45)', borderRadius:'50%', width:22, height:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, color:'white' }}>
          📷<input type="file" accept="image/*" style={{ display:'none' }} onChange={handlePhoto} />
        </label>
      )}
    </div>
  );
}

    ...BLANK_PLANT(),

    if (!isEdit) {
      const { wi, fi } = autoInterval(v);
      setForm(f => ({ ...f, name: v, wi, fi }));
    }

      const plants = isEdit
        ? prev.plants.map(p => p.id === form.id ? { ...p, ...form } : p)

      return { ...prev, plants, cats };
    });

      <div className="sheet-panel" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-scroll">
          <div style={{ fontSize:16, fontWeight:800, color:'#2e4a22', padding:'0 16px 12px' }}>
            {isEdit ? `✏️ 编辑：${initPlant.name}` : '🌱 添加新植物'}
          </div>

          <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:10 }}>
            <div>
              <label className="field-label">植物名称 *</label>
              <input className="input" placeholder="如：玫瑰、番茄…"
                value={form.name} onChange={e => handleNameChange(e.target.value)} />
            </div>

            <div style={{ display:'flex', gap:8 }}>
              <div style={{ flex:1 }}>
                <label className="field-label">品种</label>
                <input className="input" placeholder="品种名…" value={form.variety} onChange={e => setF('variety', e.target.value)} />
              </div>
              <div style={{ flex:1 }}>
                <label className="field-label">类别</label>
                <input className="input" placeholder="果树、蔬菜…" value={form.category}
                  onChange={e => setF('category', e.target.value)} list="form-cats" />
                <datalist id="form-cats">{allCats.map(c => <option key={c} value={c} />)}</datalist>
              </div>
            </div>

            {/* 健康状态 */}
            <div>
              <label className="field-label">健康状态</label>
              <div style={{ display:'flex', gap:6 }}>
                {Object.entries(STATUS_MAP).map(([k, v]) => (
                  <button key={k}
                    style={{ flex:1, padding:'7px 4px', borderRadius:9, cursor:'pointer', fontFamily:'inherit', fontSize:11,
                      background: form.status===k ? v.bg : 'rgba(180,210,160,0.1)',
                      border: `1px solid ${form.status===k ? v.color+'88' : 'rgba(150,185,130,0.25)'}`,
                      color: form.status===k ? v.color : '#6a8858' }}
                    onClick={() => setF('status', k)}>
                    {v.label}
                  </button>
                ))}
              </div>
            </div>

            {/* 护理周期 */}
            <div className="card" style={{ background:'rgba(185,220,160,0.15)' }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#3a5828', marginBottom:10 }}>⏱ 护理周期</div>
              <div style={{ display:'flex', gap:12, textAlign:'center' }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11, color:'#6a8858', marginBottom:4 }}>💧 浇水间隔（天）</div>
                  <input type="number" min={1} className="input" style={{ width:70, textAlign:'center', fontSize:15, fontWeight:700, color:'#2266aa' }}
                    value={form.wi} onChange={e => setF('wi', +e.target.value||7)} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11, color:'#6a8858', marginBottom:4 }}>🌿 施肥间隔（天）</div>
                  <input type="number" min={1} className="input" style={{ width:70, textAlign:'center', fontSize:15, fontWeight:700, color:'#3a7a28' }}
                    value={form.fi} onChange={e => setF('fi', +e.target.value||14)} />
                </div>
              </div>
            </div>

            <div>
              <label className="field-label">备注</label>
              <textarea className="input" rows={2} style={{ resize:'vertical', lineHeight:1.6 }}
                placeholder="特殊说明…" value={form.notes} onChange={e => setF('notes', e.target.value)} />
            </div>

            <div style={{ display:'flex', gap:8, paddingBottom:16 }}>
              <button className="btn btn-primary" style={{ flex:1 }} onClick={handleSave}>✓ 保存</button>
              <button className="btn btn-secondary" style={{ flex:1 }} onClick={onClose}>取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 删除确认 Modal ──
function DeleteConfirm({ plant, onConfirm, onCancel }) {
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-box" onClick={e => e.stopPropagation()}>
        <div style={{ fontSize:28, marginBottom:10 }}>⚠️</div>
        <div style={{ fontSize:15, fontWeight:600, color:'#2e4a22', marginBottom:6 }}>
          确认删除「{plant.name}」吗？
        </div>
        <div style={{ fontSize:12, color:'#9aaa88', marginBottom:18 }}>此操作不可撤销</div>
        <div style={{ display:'flex', gap:10 }}>
          <button className="btn btn-secondary" style={{ flex:1 }} onClick={onCancel}>取消</button>
          <button className="btn" style={{ flex:1, background:'rgba(210,80,60,0.15)', border:'1px solid rgba(180,60,40,0.4)', color:'#8a2010' }}
            onClick={onConfirm}>确认删除</button>
        </div>
      </div>
    </div>
  );
}

// ── 主植物 Tab ──
function PlantsTab() {
  const { db, updateDb, showToast } = useApp();
  const [search,       setSearch]       = useState('');
  const [filterCat,    setFilterCat]    = useState('all');
  const [logState,     setLogState]     = useState(null);   // { plantId, logType }
  const [editPlant,    setEditPlant]    = useState(null);   // plant obj 或 'new'
  const [deletePlant,  setDeletePlant]  = useState(null);   // plant obj
  const [openTimelines,setOpenTimelines]= useState({});     // { [id]: bool }

  // 分类列表
  const usedCats = [...new Set(db.plants.map(p => p.category).filter(Boolean))];
  const allCats  = [...new Set([...db.cats, ...usedCats])];

  // 过滤
  const q = search.trim().toLowerCase();
  const filtered = db.plants.filter(p => {
    const matchQ   = !q || p.name.toLowerCase().includes(q) || (p.variety||'').toLowerCase().includes(q);
    const matchCat = filterCat === 'all'
      || (filterCat === '__none__' && !p.category)
      || p.category === filterCat;
    return matchQ && matchCat;
  });

  function handleDelete() {
    updateDb(prev => ({ ...prev, plants: prev.plants.filter(p => p.id !== deletePlant.id) }));
    showToast('🗑 已删除');
    setDeletePlant(null);
  }

  function toggleTimeline(id) {
    setOpenTimelines(prev => ({ ...prev, [id]: !prev[id] }));
  }

  // 日志页
  if (logState) {
    return <LogPage plantId={logState.plantId} logType={logState.logType} onClose={() => setLogState(null)} />;
  }

  return (
    <div className="page-content page-enter">
      {/* 顶栏 */}
      <div className="sticky-header">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
          <div>
            <div className="header-title">🪴 植物</div>
          </div>
          <span className="chip">{db.plants.length} 株</span>
        </div>
        <input className="input" placeholder="搜索植物名称…"
          value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      {/* 分类筛选条 */}
      <div className="cat-strip">
        {[
          { id:'all', label:`全部 (${db.plants.length})` },
          ...allCats.filter(c => db.plants.some(p => p.category === c))
            .map(c => ({ id:c, label:`${c} (${db.plants.filter(p => p.category===c).length})` })),
          db.plants.some(p => !p.category)
            ? { id:'__none__', label:`未分类 (${db.plants.filter(p=>!p.category).length})` }
            : null,
        ].filter(Boolean).map(item => (
          <button key={item.id}
            className={`cat-chip ${filterCat === item.id ? 'active' : ''}`}
            onClick={() => setFilterCat(item.id)}>
            {item.label}
          </button>
        ))}
      </div>

      {/* 植物列表 */}
      <div style={{ padding:'4px 16px 80px', display:'flex', flexDirection:'column', gap:12 }}>
        {filtered.length === 0
          ? <div className="placeholder">
              <div className="placeholder-emoji">🪴</div>
              <div className="placeholder-title">{db.plants.length ? '没有匹配的植物' : '还没有植物'}</div>
              <div className="placeholder-desc">{db.plants.length ? '换个搜索词试试？' : '点击右下角 ＋ 添加第一株植物！'}</div>
            </div>
          : filtered.map(p => (
              <PlantCard key={p.id} plant={p}
                showTimeline={!!openTimelines[p.id]}
                onOpenLog={(plantId, logType) => setLogState({ plantId, logType })}
                onEdit={plant => setEditPlant(plant)}
                onDelete={plant => setDeletePlant(plant)}
                onToggleTimeline={toggleTimeline} />
            ))
        }
      </div>

      {/* FAB 添加 */}
      <button className="fab" onClick={() => setEditPlant('new')}>＋</button>

      {/* 编辑/新增 Modal */}
      {editPlant && (
        <PlantFormModal
          plant={editPlant === 'new' ? null : editPlant}
          onClose={() => setEditPlant(null)} />
      )}

      {/* 删除确认 */}
      {deletePlant && (
        <DeleteConfirm plant={deletePlant} onConfirm={handleDelete} onCancel={() => setDeletePlant(null)} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// 9.  APP ROOT
// ═══════════════════════════════════════════════════════
function App() {
  // ── 全局数据库（单一数据源）──
  const [db, setDb] = useState(() => loadAll());

  // ── 更新 db 并持久化 ──
  const updateDb = useCallback((updater) => {
    setDb(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveAll(next);
      return next;
    });
  }, []);

  // ── 当前 Tab ──
  const [tab, setTab] = useState('calendar');

  // ── Toast ──
  const { showToast, Toast } = useToast();

  // ── 导航到某 Tab（带 key 触发重新挂载动画）──
  const [tabKey, setTabKey] = useState(0);
  const navTo = useCallback((id) => {
    setTab(id);
    setTabKey(k => k + 1);
  }, []);

  // ── 植物护理紧急数 ──
  const urgentCount = db.plants.filter(p => careAlerts(p).length > 0).length;

  // ── Context value ──
  const ctx = { db, updateDb, showToast };

  // ── 渲染当前 Tab ──
  const renderTab = () => {
    switch (tab) {
      case 'calendar':  return <CalendarTab  key={tabKey} />;
      case 'plants':    return <PlantsTab    key={tabKey} />;
      case 'breeding':  return <BreedingTab  key={tabKey} />;
      case 'inventory': return <InventoryTab key={tabKey} />;
      default:          return <CalendarTab  key={tabKey} />;
    }
  };

  return (
    <AppCtx.Provider value={ctx}>
      {renderTab()}
      <BottomNav tab={tab} onNav={navTo} urgentCount={urgentCount} />
      {Toast}
    </AppCtx.Provider>
  );
}

// ═══════════════════════════════════════════════════════
// 10. MOUNT
// ═══════════════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
