function lookupGenus(name){
  if(!name)return "";
  var nl=name.trim().toLowerCase();
  var keys=Object.keys(GENUS_DB);
  // exact match first
  for(var i=0;i<keys.length;i++){if(keys[i].toLowerCase()===nl)return GENUS_DB[keys[i]];}
  // longest-key substring match (avoids "桃" matching inside "猕猴桃")
  var sorted=keys.slice().sort(function(a,b){return b.length-a.length;});
  for(var j=0;j<sorted.length;j++){
    var k=sorted[j].toLowerCase();
    if(nl.indexOf(k)>=0||k.indexOf(nl)>=0)return GENUS_DB[sorted[j]];
  }
  return "";
}

function autoFill(name,isF){
  if(!name)return{};
  var nl=name.toLowerCase();
  var db=isF?REF_FERT:REF_MED;
  var keys=Object.keys(db);
  for(var i=0;i<keys.length;i++){
    var k=keys[i].toLowerCase();
    if(nl.indexOf(k)>=0||k.indexOf(nl)>=0)return JSON.parse(JSON.stringify(db[keys[i]]));
  }
  return{};
}
function suggest(name,isF){
  var s=[];if(!name)return s;
  var nl=name.toLowerCase();
  if(isF){
    if(nl.indexOf("氮")>=0)s.push("尿素","复合肥");
    else if(nl.indexOf("磷")>=0||nl.indexOf("钾")>=0)s.push("磷酸二氢钾");
    else if(nl.indexOf("有机")>=0)s.push("有机肥","鱼腥水");
    else if(nl.indexOf("缓释")>=0)s.push("奥绿","魔肥");
    else s.push("复合肥","有机肥","缓释肥");
  } else {
    if(nl.indexOf("菌")>=0||nl.indexOf("病")>=0)s.push("多菌灵","百菌清");
    else if(nl.indexOf("虫")>=0||nl.indexOf("蚜")>=0)s.push("吡虫啉","苦参碱");
    else if(nl.indexOf("螨")>=0)s.push("阿维菌素","螺螨酯");
    else s.push("多菌灵","吡虫啉","阿维菌素");
  }
  return s.filter(function(x,i,a){return a.indexOf(x)===i;}).slice(0,3);
}

function q(s){

}
function td(){return new Date().toISOString().slice(0,10);}
function ds(d){
  if(!d)return null;
  var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  var dt=m?new Date(+m[1],+m[2]-1,+m[3]):new Date(d);
  return Math.floor((Date.now()-dt)/86400000);
}
function fmt(d){
  if(!d)return "—";

}

// ── Stage & Advice ──
function getStage(p){
  if(p.finalPlantDate)return "established";
  if(p.transplantDate)return "transplanted";
  if(p.hardeningDate&&p.indoorStart==="indoor")return "hardening";
  if(p.source==="seed"){if(p.germDate)return "seedling";if(p.sowDate)return "germinating";}
  if(p.source==="cutting"||p.source==="graft"){if(p.rootDate)return "rooted";if(p.opDate)return "rooting";}
  if(p.source==="division"&&p.opDate&&!p.prePlantDate)return "recovering";
  return "established";
}
function buildAdvice(p){
  var temp=W.temp,hum=W.hum,pre=W.pre,rain=W.rain;
  var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
  var st=getStage(p);var L=[];
  var SL={germinating:"📍 播种期",rooting:"📍 扦插/嫁接生根期",rooted:"📍 已生根待移栽",
    seedling:"📍 幼苗期",recovering:"📍 分株恢复期",transplanted:"📍 移栽适应期",hardening:"📍 炼苗期"};
  if(SL[st])L.push(SL[st]);
  if(st==="germinating")L.push("💧 保持基质微湿，用喷壶轻喷");
  else if(st==="rooting")L.push(hum>75?"💧 湿度偏高，基质微湿即可":"💧 保持基质湿润不积水，可叶面喷雾");
  else if(st==="hardening"){var hd=p.hardeningDate?ds(p.hardeningDate):0;L.push("💧 炼苗期适度控水（第"+hd+"/"+(p.hardeningDays||7)+"天）");}
  else if(st==="seedling"||st==="recovering"||st==="transplanted")L.push(getN(wd)>=p.wi?"💧 适量浇水，表土略干再浇":"💧 距下次浇水约"+(p.wi-wd)+"天");
  else if(getN(wd)>=p.wi)L.push(rain||pre>3?"💧 今日有雨，可少量补水":hum>80?"💧 湿度"+hum+"%，建议减少浇水":temp>28?"💧 气温"+temp+"°C偏高，避开正午浇水":"💧 该浇水了"+(wd!=null?"（已"+wd+"天）":"")+"，今天合适");
  else L.push("💧 距下次浇水约"+(p.wi-wd)+"天");
  if(st==="germinating")L.push("🌿 发芽前禁止施肥");
  else if(st==="rooting")L.push("🌿 生根前禁止施肥，会灼伤切口");
  else if(st==="rooted")L.push(getN(fd)>=p.fi?"🌿 已生根，可施1/2浓度稀薄液肥":"🌿 距下次施肥约"+(p.fi-fd)+"天");
  else if(st==="seedling"){var sd=p.germDate?ds(p.germDate):null;L.push(sd!==null&&sd<14?"🌿 出芽"+sd+"天，待2片真叶后施1/4浓度液肥":getN(fd)>=p.fi?"🌿 可施1/4浓度极稀薄液肥":"🌿 距下次施肥约"+(p.fi-fd)+"天");}
  else if(st==="recovering"||st==="transplanted")L.push(st==="recovering"?"🌿 分株恢复期暂缓施肥":"🌿 移栽适应期暂缓施肥，约2周后再施");
  else if(st==="hardening")L.push("🌿 炼苗期停止施肥");
  else if(getN(fd)>=p.fi)L.push(temp<10?"🌿 气温偏低，可暂缓施肥":rain||pre>8?"🌿 雨天施肥易流失，雨后再施":"🌿 可以施肥了"+(fd!=null?"（已"+fd+"天）":"")+"，晴天效果好");
  else L.push("🌿 距下次施肥约"+(p.fi-fd)+"天");
  var lm=ld(p.medLog);
  if(p.medMode==="symptom"){if(lm)L.push("💊 上次给药："+ds(lm)+"天前（点击记录新症状）");else L.push("💊 出现病虫害时点击记录给药");}
  if(st==="hardening"){var hd2=p.hardeningDate?ds(p.hardeningDate):0;var left=Math.max(0,(p.hardeningDays||7)-hd2);L.push(left>0?"🌤️ 炼苗进度："+hd2+"/"+(p.hardeningDays||7)+"天，还需约"+left+"天":"✅ 炼苗完成，可移栽或定植！");}
  if(hum<30)L.push("💦 空气干燥，可向叶面喷水");
  if(temp>32)L.push("🌡️ 高温，注意遮阴");
  if(temp<5)L.push("🧣 低温，移入室内防冻");
  return L.join("\n");
}

function buildCalendarTab(){
  var today=td();
  var todayDate=new Date(); todayDate.setHours(0,0,0,0);

  // Compute tasks for each plant
  function getPlantTasks(p){
    var tasks=[];
    var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
    var wOver=getN(wd)-parseIntervalMin(p.wi); // positive = overdue by wOver days
    var fOver=getN(fd)-parseIntervalMin(p.fi);
    if(wOver>=0)tasks.push({type:"water",overdueDays:wOver,plant:p});
    if(fOver>=0)tasks.push({type:"fert",overdueDays:fOver,plant:p});
    return tasks;
  }

  var overdueTasks=[],todayTasks=[],soon1=[],soon2=[],soon3=[],unloggedTasks=[];
  S.plants.forEach(function(p){
    var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
    var wi=parseIntervalMin(p.wi),fi=parseIntervalMin(p.fi);
    // Only calculate due if interval is meaningful (not 999 = unset)
    function push(type,daysSince,interval){
      var obj={type:type,plant:p};
      if(daysSince===null){
        // Never logged - treat as needs attention but not "overdue"
        unloggedTasks.push(obj);
        return;
      }
      var due=interval-daysSince;
      if(due<=0)overdueTasks.push(Object.assign({},obj,{overdueDays:-due}));
      else if(due===1)todayTasks.push(obj);
      else if(due===2)soon1.push(obj);
      else if(due===3)soon2.push(obj);
      else if(due===4)soon3.push(obj);
    }
    if(wi<900)push("water",wd,wi);
    if(fi<900)push("fert",fd,fi);
  });
  overdueTasks.sort(function(a,b){return b.overdueDays-a.overdueDays;});

// ── Plants Tab ──
function buildPlantsTab(){
  var usedCats=[];S.plants.forEach(function(p){if(p.category&&usedCats.indexOf(p.category)<0)usedCats.push(p.category);});
  var list=S.plants.slice();
  if(S.filterCat!=="all")list=list.filter(function(p){return p.category===S.filterCat;});
  if(S.search.trim()){var sq=S.search.toLowerCase();list=list.filter(function(p){return[p.name,p.variety,p.type,p.notes,p.finalPlantLocation].some(function(s){return s&&s.toLowerCase().indexOf(sq)>=0;});});}
  list.sort(function(a,b){if(S.sortBy==="name")return a.name.localeCompare(b.name,"zh");if(S.sortBy==="category")return(a.category||"").localeCompare(b.category||"");if(S.sortBy==="planted")return(b.finalPlantDate||"").localeCompare(a.finalPlantDate||"");if(S.sortBy==="location")return(a.finalPlantLocation||"").localeCompare(b.finalPlantLocation||"","zh");return a.id.localeCompare(b.id);});

  var catFilter=usedCats.length>0?('<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:8px">'+
    '<button onclick="S.filterCat=\'all\';render()" style="'+gbtn(S.filterCat==="all")+'">全部</button>'+
    usedCats.slice().sort(function(a,b){return a.localeCompare(b,"zh");}).map(function(c){return '<button onclick="S.filterCat=\''+q(c)+'\';render()" style="'+gbtn(S.filterCat===c)+'">'+q(c)+'</button>';}).join("")+
    '</div>'):"";

  function buildCompactCard(p){
    var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
    var wu=getN(wd)>=parseIntervalMin(p.wi),fu=getN(fd)>=parseIntervalMin(p.fi);
    var urgent=wu||fu;
    return '<div onclick="openPlantDetail(\''+p.id+'\')" style="background:rgba(255,255,255,0.65);border:1.5px solid '+(urgent?"rgba(200,140,50,0.5)":"rgba(150,185,130,0.4)")+';border-radius:16px;padding:13px 14px;cursor:pointer;display:flex;gap:11px;align-items:center">'+
      (p.photo?'<img src="'+p.photo+'" style="width:56px;height:56px;object-fit:cover;border-radius:10px;flex-shrink:0"/>':
        '<div style="width:56px;height:56px;border-radius:10px;background:rgba(180,210,160,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🪴</div>')+
      '<div style="flex:1;min-width:0">'+
      '<div style="font-size:18px;font-weight:700;color:#2e4a22;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+q(p.name)+(p.variety?'<span style="font-size:14px;font-weight:400;color:#5a7848;margin-left:6px">'+q(p.variety)+'</span>':'')+'</div>'+
      '<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">'+
      '<span style="font-size:11px;color:'+(wu?"#b04010":"#4a7040")+';font-weight:'+(wu?700:400)+'">💧'+(wu?"⚠":(wd!=null?wd+"天":"—"))+'</span>'+
      '<span style="font-size:11px;color:'+(fu?"#b04010":"#4a7040")+';font-weight:'+(fu?700:400)+'">🌿'+(fu?"⚠":(fd!=null?fd+"天":"—"))+'</span>'+
      (p.category?'<span style="font-size:11px;color:#7a9060">'+q(p.category)+'</span>':'')+
      (p.finalPlantLocation?'<span style="font-size:11px;color:#8aaa78">📍'+q(p.finalPlantLocation)+'</span>':'')+
      '</div></div>'+
      '<span style="font-size:18px;color:#9aaa88;flex-shrink:0">›</span>'+
      '</div>';
  }

  return '<div style="min-height:100vh;padding-bottom:100px">'+
    // Sticky header
    '<div style="position:sticky;top:0;z-index:10;background:linear-gradient(150deg,rgba(222,234,218,0.98),rgba(204,222,196,0.98));padding:12px 16px 10px;border-bottom:1px solid rgba(150,185,130,0.3)">'+
    '<div style="max-width:460px;margin:0 auto">'+
    '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'+
    '<div style="flex:1;position:relative"><span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#8aaa78">🔍</span>'+
    '<input id="search_inp" type="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="名称、品种、位置…" style="'+FS+'padding-left:32px;padding-right:'+(S.search?"36px":"12px")+';font-size:14px;" onkeydown="if(event.key===\'Enter\'){S.search=this.value;this.blur();render();}"/>'+
    (S.search?'<button onclick="S.search=\'\';render()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#8aaa78">✕</button>':"")+
    '</div></div>'+
    catFilter+
    '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#8aaa78;white-space:nowrap">排序：</span>'+
    '<div style="display:flex;gap:5px;overflow-x:auto">'+
    [{key:"entry",label:"录入"},{key:"name",label:"名称"},{key:"category",label:"类别"},{key:"planted",label:"定植"},{key:"location",label:"位置"}].map(function(s){return '<button onclick="S.sortBy=\''+s.key+'\';render()" style="'+gbtn(S.sortBy===s.key)+'padding:3px 10px;">'+s.label+'</button>';}).join("")+
    '</div></div>'+
    '</div></div>'+
    // Plant list
    '<div style="max-width:460px;margin:0 auto;padding:14px 16px">'+
    (S.plants.length===0?'<div style="text-align:center;padding:60px 0"><div style="font-size:48px;margin-bottom:12px">🪴</div><div style="font-size:14px;color:#8a9e78;line-height:2.2">还没有植物<br/>点击右下角 + 开始添加</div></div>':
    list.length===0?'<div style="text-align:center;padding:40px 0;color:#8aaa78;font-size:13px">没有符合条件的植物</div>':
    '<div style="display:flex;flex-direction:column;gap:9px">'+list.map(buildCompactCard).join("")+'</div>'+
    '<div style="font-size:11px;color:#9aaa88;text-align:center;margin-top:14px">共 '+list.length+(list.length<S.plants.length?"/"+S.plants.length:"")+" 株植物</div>")+
    '</div>'+
    // FAB
    '<button onclick="startAdd()" style="position:fixed;bottom:calc(env(safe-area-inset-bottom,16px) + 70px);right:max(16px,calc(50vw - 214px));width:54px;height:54px;border-radius:50%;background:rgba(90,160,60,0.9);border:none;cursor:pointer;font-size:26px;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(50,120,30,0.35)">+</button>'+
    '</div>';
}

// ── Render ──
function render(){
  var el=document.getElementById("root");
  if(!el)return;
  // Swipe right to go back
  if(!window._swipeInited){
    window._swipeInited=true;
    var _tx=0,_ty=0;
    document.addEventListener("touchstart",function(e){_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
    document.addEventListener("touchend",function(e){
      var dx=e.changedTouches[0].clientX-_tx;
      var dy=Math.abs(e.changedTouches[0].clientY-_ty);
      if(dx>60&&dy<40){
        if(S.plantDetailId){S.plantDetailId=null;render();}
        else if(S.showAdd||S.editId){cancelForm();}
        else if(S.invSubTab){S.invSubTab=null;S.libAdding=false;S.libExpanded=null;S.libSearch='';render();}
        else if(S.propAdding){S.propAdding=false;S.propEditId=null;render();}
        else if(S.propBatchId){S.propBatchId=null;render();}
      }
    },{passive:true});
  }
  var winSY=window.scrollY||window.pageYOffset||0;
  var scrollMap={};
  var scrollEls=document.querySelectorAll("[data-scrollkey]");
  for(var i=0;i<scrollEls.length;i++){scrollMap[scrollEls[i].getAttribute("data-scrollkey")]=scrollEls[i].scrollTop;}

  var html="";
  // Full-screen form takes over entirely
  if(S.showAdd||S.editId){
    html='<div style="min-height:100vh;background:linear-gradient(150deg,#dce8d8,#c8dcc0,#d4e4cc);padding-bottom:30px">'+
      '<div style="padding:14px 16px 10px;border-bottom:1px solid rgba(90,120,70,0.2);background:rgba(220,232,216,0.95);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10">'+
      '<button onclick="cancelForm()" style="background:none;border:none;cursor:pointer;font-size:22px;color:#5a8040;padding:0;line-height:1">‹</button>'+
      '<div style="font-size:18px;font-weight:700;color:#2e4a22">'+(S.editId?"✏️ 编辑植物":"+ 添加植物")+'</div>'+
      '</div>'+
      '<div style="max-width:460px;margin:0 auto;padding:16px">'+buildPlantForm()+'</div>'+
      '</div>';
  } else if(S.plantDetailId){
    var dp=null;for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===S.plantDetailId){dp=S.plants[i];break;}}
    if(dp)html=buildPlantDetail(dp);
    else{S.plantDetailId=null;html=buildTabLayout();}
  } else {
    html=buildTabLayout();
  }

  // Modals on top
  if(S.showLib)html+=buildLibModal();
  if(S.logPlantId)html+=buildLogModal();
  if(S.calPlantId)html+=buildCalModal();
  if(S.confirmCb)html+=buildConfirmModal();

  el.innerHTML=html;
  window.scrollTo(0,winSY);
  var newScrollEls=document.querySelectorAll("[data-scrollkey]");
  for(var j=0;j<newScrollEls.length;j++){var k=newScrollEls[j].getAttribute("data-scrollkey");if(scrollMap[k]!=null)newScrollEls[j].scrollTop=scrollMap[k];}
}

function buildTabLayout(){
  var tabContent="";
  if(S.tab==="calendar")tabContent=buildCalendarTab();
  else if(S.tab==="plants")tabContent=buildPlantsTab();
  else if(S.tab==="breeding")tabContent=buildBreedingTab();
  else if(S.tab==="inventory"){tabContent=buildInventoryTab();}
  return '<div style="min-height:100vh;background:linear-gradient(150deg,#dce8d8,#c8dcc0,#d4e4cc)">'+
    '<div style="max-width:460px;margin:0 auto">'+tabContent+'</div>'+
    buildBottomNav()+'</div>';
}

// Override startEdit to navigate to plants tab
var _origStartEdit=typeof startEdit==='function'?startEdit:null;
function startEdit(id){
  var p=null;for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===id){p=S.plants[i];break;}}
  if(!p)return;
  S.formData=JSON.parse(JSON.stringify(p));S.formTab="basic";S.editId=id;S.showAdd=false;S.plantDetailId=null;render();
}
function setFormTab(t){S.formTab=t;render();}
function setFormField(k,v){
  if(!S.formData)return;
  S.formData[k]=v;
  if(k==="name"){
    var ai=autoInt(v);S.formData.wi=ai.wi;S.formData.fi=ai.fi;
  }
  render();
}
function saveForm(){
  if(!S.formData||!S.formData.name.trim())return;
  if(S.editId){
    for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===S.editId){S.plants[i]=S.formData;break;}}
    S.editId=null;
  } else {
    S.formData.id=Date.now().toString();
    S.formData.waterLog=S.formData.waterLog||[];
    S.formData.fertLog=S.formData.fertLog||[];
    S.formData.medLog=S.formData.medLog||[];
    S.plants.push(S.formData);
    if(window._propGradRef){
      var gr=window._propGradRef;
      var gb=PROP.find(function(x){return x.id===gr.batchId;});
      if(gb&&gb.seedlings[gr.sIdx]){gb.seedlings[gr.sIdx].plantId=S.formData.id;saveProp();}
      window._propGradRef=null;
    }
  }
  S.formData=null;S.showAdd=false;S.editId=null;S.filterCat="all";S.search="";storePlants();render();
}
function cancelForm(){S.formData=null;S.showAdd=false;S.editId=null;render();}

// ── Photo Upload ──
function triggerPhotoUpload(pid){
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(evt){
      var img=new Image();
      img.onload=function(){
        var canvas=document.createElement("canvas");
        var maxSize=320,w=img.width,h=img.height;
        if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}}
        else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        var dataUrl=canvas.toDataURL("image/jpeg",0.72);
        if(pid==="__form__"){if(S.formData){S.formData.photo=dataUrl;render();}}
        else{for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===pid){S.plants[i].photo=dataUrl;break;}}storePlants();render();}
      };
      img.src=evt.target.result;
    };
    reader.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
}

function buildPlantCard(p){
  var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog)),md=ds(ld(p.medLog));
  var wu=getN(wd)>=parseIntervalMin(p.wi),fu=getN(fd)>=parseIntervalMin(p.fi);
  var src=null;for(var i=0;i<SRCS.length;i++){if(SRCS[i].key===p.source){src=SRCS[i];break;}}
  var startDate=p.sowDate||p.buyDate||p.opDate;
  var showInfo=S["info_"+p.id]===true;
  var pid=p.id;
  // Status
  var statusMap={healthy:{label:"✅ 健康",color:"#2a6a35",bg:"rgba(80,190,80,0.15)"},watch:{label:"👀 观察中",color:"#7a6010",bg:"rgba(220,185,60,0.18)"},treat:{label:"💊 治疗中",color:"#8a2818",bg:"rgba(210,90,70,0.18)"}};
  var stObj=statusMap[p.status]||statusMap.healthy;
  // Compact advice lines
  var advLines=[];
  if(wu)advLines.push("💧 该浇水了"+(wd!=null?"（已"+wd+"天）":""));
  else if(wd!=null)advLines.push("💧 "+wd+"天前浇水，间隔"+p.wi+"天");
  else advLines.push("💧 浇水间隔："+p.wi+"天");
  if(fu)advLines.push("🌿 可以施肥了"+(fd!=null?"（已"+fd+"天）":""));
  else if(fd!=null)advLines.push("🌿 "+fd+"天前施肥，间隔"+p.fi+"天");
  else advLines.push("🌿 施肥间隔："+p.fi+"天");
  // Info row 1
  var infoR1=[];
  if(p.category)infoR1.push(q(p.category));
  if(p.type)infoR1.push(q(p.type));
  if(src)infoR1.push(src.icon+" "+src.label);
  // Build timeline items
  var items=[];
  function pT(icon,label,date,note,color){if(date)items.push({icon:icon,label:label,date:date,note:note,color:color});}
  if(p.source==="seed"){pT("🌱","播种",p.sowDate,[p.indoorStart?"环境："+(p.indoorStart==="indoor"?"室内":"室外"):"",p.sowMethod?"方式："+p.sowMethod:"",p.seedSource?"种子来源："+p.seedSource:""].filter(Boolean).join("\n"),"#5a8040");pT("🌿","发芽",p.germDate,p.germNotes||"","#6a9040");}
  if(p.source==="sapling"||p.source==="mature"||p.source==="bulb"||p.source==="other")pT(src?src.icon:"🛒","购入",p.buyDate,[p.buyFrom?"来源："+p.buyFrom:"",p.buySpec?"规格："+p.buySpec:"",p.buyPrice?"价格："+p.buyPrice:""].filter(Boolean).join("\n"),"#5a7898");
  if(p.source==="cutting"){pT("✂️","扦插",p.opDate,[p.indoorStart?"环境："+(p.indoorStart==="indoor"?"室内":"室外"):"",p.buyFrom?"插穗来源："+p.buyFrom:"",p.opNotes?"备注："+p.opNotes:""].filter(Boolean).join("\n"),"#7a6848");pT("🌱","生根/成活",p.rootDate,"","#5a8040");}
  if(p.source==="graft"){pT("🔗","嫁接",p.opDate,[p.indoorStart?"环境："+(p.indoorStart==="indoor"?"室内":"室外"):"",p.buyFrom?"砧木来源："+p.buyFrom:"",p.opNotes?"备注："+p.opNotes:""].filter(Boolean).join("\n"),"#7a6848");pT("✅","成活确认",p.rootDate,"","#5a8040");}
  if(p.source==="division")pT("🌾","分株",p.opDate,[p.buyFrom?"母株："+p.buyFrom:"",p.opNotes?"备注："+p.opNotes:""].filter(Boolean).join("\n"),"#7a6848");
  if(p.hardeningDate&&p.indoorStart==="indoor"){var hd3=ds(p.hardeningDate),tgt=p.hardeningDays||7,done=hd3>=tgt;pT("🌤️","炼苗"+(done?"（完成）":"（进行中）"),p.hardeningDate,["计划"+tgt+"天"+(done?"":"，已"+hd3+"天"),p.hardeningNotes?"备注："+p.hardeningNotes:""].filter(Boolean).join("\n"),"#8a7a30");}
  pT("🪴","假植",p.prePlantDate,p.prePlantNotes||"","#5a9068");
  pT("🔄","移栽",p.transplantDate,p.transplantNotes?"备注："+p.transplantNotes:"","#5a9888");
  pT("📍","定植",p.finalPlantDate,[p.finalPlantLocation?"位置："+p.finalPlantLocation:"",p.finalPlantNotes?"备注："+p.finalPlantNotes:""].filter(Boolean).join("\n"),"#5a7898");
  var timelineHtml=items.map(function(item,idx){return '<div style="display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:'+(idx<items.length-1?"1px solid rgba(150,185,130,0.15)":"none")+'">'+'<span style="font-size:16px">'+item.icon+'</span><div style="flex:1"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="font-size:11px;color:'+item.color+';font-weight:700">'+q(item.label)+'</span><span style="font-size:11px;color:#7a9868">'+fmt(item.date)+'</span></div>'+(item.note?'<div style="font-size:11px;color:#7a9060;margin-top:3px;line-height:1.7;white-space:pre-line">'+q(item.note)+'</div>':"")+"</div></div>";}).join("");
  // Photo HTML

// ── Log Modal ──
var logEditIdx=null;
var logForm={date:"",note:"",name:"",reason:"",amount:""};
function openLog(pid,type){S.logPlantId=pid;S.logType=type;logEditIdx=null;logForm={date:td(),note:"",name:"",reason:"",amount:""};render();}
function closeLog(){S.logPlantId=null;S.logType=null;logEditIdx=null;render();}
function startLogEdit(idx){
  var p=null;for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===S.logPlantId){p=S.plants[i];break;}}
  if(!p)return;
  var log=S.logType==="water"?(p.waterLog||[]):S.logType==="fert"?(p.fertLog||[]):(p.medLog||[]);
  if(idx<0||idx>=log.length)return;
  var r=log[idx];logEditIdx=idx;logForm={date:r.date,note:r.note||"",name:r.name||"",reason:r.reason||"",amount:r.amount||""};render();
}
function saveLog(){
  var p=null;for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===S.logPlantId){p=S.plants[i];break;}}
  if(!p)return;
  var rec={date:logForm.date};
  if(S.logType==="fert"){rec.name=logForm.name;rec.amount=logForm.amount;rec.note=logForm.note;}
  else if(S.logType==="med"){rec.name=logForm.name;rec.reason=logForm.reason;rec.amount=logForm.amount;rec.note=logForm.note;}
  else{rec.note=logForm.note;}
  var log=S.logType==="water"?(p.waterLog||(p.waterLog=[])):S.logType==="fert"?(p.fertLog||(p.fertLog=[])):(p.medLog||(p.medLog=[]));
  if(logEditIdx!==null)log[logEditIdx]=rec;
  else{log.push(rec);log.sort(function(a,b){return a.date.localeCompare(b.date);});}
  logEditIdx=null;logForm={date:td(),note:"",name:"",reason:"",amount:""};storePlants();render();
}
function delLog(idx){
  var p=null;for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===S.logPlantId){p=S.plants[i];break;}}
  if(!p)return;
  var log=S.logType==="water"?(p.waterLog||[]):S.logType==="fert"?(p.fertLog||[]):(p.medLog||[]);
  log.splice(idx,1);storePlants();render();
}

  }

  var histHtml=[].concat(log).reverse().map(function(r,ri){var oi=log.length-1-ri;return '<div style="background:rgba(255,255,255,0.6);border-radius:10px;padding:10px 12px;margin-bottom:7px;border:1px solid rgba(150,185,130,0.3)"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><span style="font-size:12px;font-weight:700;color:#3a5228">'+fmt(r.date)+'</span>'+(r.name?'<span style="font-size:11px;color:#5a7848;margin-left:8px">'+q(r.name)+'</span>':'')+(r.amount?'<span style="font-size:11px;color:#7a9060;margin-left:6px">· '+q(r.amount)+'</span>':'')+(r.reason?'<div style="font-size:11px;color:#9a7040;margin-top:2px">病症：'+q(r.reason)+'</div>':'')+(r.note?'<div style="font-size:11px;color:#7a9060;margin-top:2px">'+q(r.note)+'</div>':'')+'</div><div style="display:flex;gap:5px"><button onclick="startLogEdit('+oi+')" style="background:none;border:none;cursor:pointer;font-size:13px;color:#7a9868">✏️</button><button onclick="confirm2(\'确认删除这条记录吗？\',function(){delLog('+oi+');})" style="background:none;border:none;cursor:pointer;font-size:13px;color:#b07060">🗑</button></div></div></div>';}).join("");

// ── Calendar Modal ──
function openCal(pid){S.calPlantId=pid;S.calYr=new Date().getFullYear();S.calMo=new Date().getMonth();S.calSel=null;render();}
function closeCal(){S.calPlantId=null;render();}
function calPrev(){if(S.calMo===0){S.calYr--;S.calMo=11;}else S.calMo--;S.calSel=null;render();}
function calNext(){if(S.calMo===11){S.calYr++;S.calMo=0;}else S.calMo++;S.calSel=null;render();}
function calClick(d){S.calSel=S.calSel===d?null:d;render();}
function buildCalModal(){
  var p=null;for(var i=0;i<S.plants.length;i++){if(S.plants[i].id===S.calPlantId){p=S.plants[i];break;}}
  if(!p)return "";
  var TC={water:"#5090d0",fert:"#5a9848",med:"#d07050",milestone:"#8060a0"};
  var TL={water:"💧浇水",fert:"🌿施肥",med:"💊给药",milestone:"📌里程碑"};
  var evMap={};
  function addEv(type,log){(log||[]).forEach(function(r){if(!evMap[r.date])evMap[r.date]=[];evMap[r.date].push(Object.assign({type:type},r));});}
  addEv("water",p.waterLog);addEv("fert",p.fertLog);addEv("med",p.medLog);
  [[p.sowDate,"🌱播种"],[p.germDate,"🌿发芽"],[p.buyDate,"🛒购入"],[p.opDate,"✂️扦插/嫁接"],[p.rootDate,"🌱生根"],[p.hardeningDate,"🌤️炼苗"],[p.prePlantDate,"🪴假植"],[p.transplantDate,"🔄移栽"],[p.finalPlantDate,"📍定植"]].forEach(function(x){if(x[0]){if(!evMap[x[0]])evMap[x[0]]=[];evMap[x[0]].push({type:"milestone",label:x[1],date:x[0]});}});
  var fd=new Date(S.calYr,S.calMo,1).getDay();
  var dm=new Date(S.calYr,S.calMo+1,0).getDate();
  var tod=td();
  var MN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  var cells="";
  for(var i=0;i<fd;i++)cells+="<div></div>";
  for(var d=1;d<=dm;d++){
    var mo2=S.calMo+1;var dStr=S.calYr+"-"+(mo2<10?"0"+mo2:mo2)+"-"+(d<10?"0"+d:d);
    var evts=evMap[dStr]||[];var isT=dStr===tod,isS=S.calSel===dStr;

  }
  var selEvts=S.calSel?(evMap[S.calSel]||[]):[];
  return '<div class="modal-overlay" onclick="if(event.target===this)closeCal()">'+
    '<div class="modal-panel">'+
    '<div style="padding:14px 18px 10px;border-bottom:1px solid rgba(150,185,130,0.3);display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:700;color:#2e4a22">📅 '+q(p.name)+' · 操作日历</span><button onclick="closeCal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#7a9868">✕</button></div>'+
    '<div class="modal-scroll" style="flex:1">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 18px"><button onclick="calPrev()" style="background:none;border:none;cursor:pointer;font-size:24px;color:#5a8040;padding:0 8px">‹</button><span style="font-size:14px;font-weight:700;color:#2e4a22">'+S.calYr+'年 '+MN[S.calMo]+'</span><button onclick="calNext()" style="background:none;border:none;cursor:pointer;font-size:24px;color:#5a8040;padding:0 8px">›</button></div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;margin-bottom:4px">'+["日","一","二","三","四","五","六"].map(function(d2){return '<div style="text-align:center;font-size:10px;color:#8aaa78;padding:2px 0">'+d2+'</div>';}).join("")+'</div>'+

var propForm={method:"cutting",parentId:"",parentName:"",date:"",total:1,medium:"",note:""};

function setPropMethod(key){

}
function setPropParent(id){
  propForm.parentId=id;
  var p=S.plants.find(function(x){return x.id===id;});
  propForm.parentName=p?p.name:'';
  var wrap=document.getElementById('prop_parent_name_wrap');
  if(wrap){
    wrap.innerHTML=id===''?'<input value="'+q(propForm.parentName)+'" placeholder="或手填母株名称…" onchange="propForm.parentName=this.value" style="width:100%;margin-top:5px;padding:8px 10px;border-radius:9px;background:rgba(255,255,255,0.6);border:1px solid rgba(150,185,130,0.35);font-family:inherit;font-size:13px;color:#3a5030;box-sizing:border-box"/>':'';

function savePropBatch(){
  if(!propForm.date){alert("请填写操作日期");return;}
  if(S.propEditId){
    var eb=PROP.find(function(x){return x.id===S.propEditId;});
    if(eb){eb.method=propForm.method;eb.parentId=propForm.parentId;eb.parentName=propForm.parentName;eb.date=propForm.date;eb.total=parseInt(propForm.total)||eb.total;eb.medium=propForm.medium;eb.note=propForm.note;}
    var eid=S.propEditId;S.propEditId=null;S.propAdding=false;S.propBatchId=eid;
    propForm={method:"cutting",parentId:"",parentName:"",date:"",total:1,medium:"",note:""};
    saveProp();render();return;
  }
  if(!propForm.total||propForm.total<1){alert("请填写数量");return;}
  var n=parseInt(propForm.total)||1;
  var seedlings=[];
  for(var i=1;i<=n;i++){seedlings.push({id:Date.now().toString(36)+i,label:i+"号苗",status:"waiting",successDate:"",note:"",graduated:false,plantId:null});}
  var batch={id:Date.now().toString(),method:propForm.method,parentId:propForm.parentId,parentName:propForm.parentName,date:propForm.date,total:n,medium:propForm.medium,note:propForm.note,seedlings:seedlings};
  PROP.push(batch);
  saveProp();
  S.propAdding=false;S.propBatchId=batch.id;
  propForm={method:"cutting",parentId:"",parentName:"",date:"",total:1,medium:"",note:""};
  render();
}

function delPropBatch(id){
  if(!confirm("确认删除此繁育批次？此操作不可撤销。"))return;
  for(var i=0;i<PROP.length;i++){if(PROP[i].id===id){PROP.splice(i,1);break;}}
  saveProp();if(S.propBatchId===id)S.propBatchId=null;render();
}

function startPropEdit(id){
  var b=PROP.find(function(x){return x.id===id;});
  if(!b)return;
  S.propEditId=id;S.propAdding=true;
  propForm={method:b.method,parentId:b.parentId||"",parentName:b.parentName||"",date:b.date,total:b.total,medium:b.medium||"",note:b.note||""};
  render();
}

function archivePropBatch(id){
  var b=PROP.find(function(x){return x.id===id;});
  if(!b)return;
  var today=new Date();
  var ds=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  b.archived=true;b.harvestDate=ds;
  saveProp();render();
}

function setSeedlingStatus(batchId,sIdx,status){
  var b=PROP.find(function(x){return x.id===batchId;});
  if(!b)return;
  b.seedlings[sIdx].status=status;
  if(status==="success"&&!b.seedlings[sIdx].successDate){
    var today=new Date();
    b.seedlings[sIdx].successDate=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  }
  if(status!=="success")b.seedlings[sIdx].successDate="";
  saveProp();render();
  // scroll the edited seedling row back into view
  var row=document.querySelector("[data-seedling-idx='"+sIdx+"']");
  if(row)row.scrollIntoView({block:"nearest",behavior:"auto"});
}

function setSeedlingDate(batchId,sIdx,date){
  var b=PROP.find(function(x){return x.id===batchId;});
  if(!b)return;
  b.seedlings[sIdx].successDate=date;saveProp();render();
  var row=document.querySelector("[data-seedling-idx='"+sIdx+"']");
  if(row)row.scrollIntoView({block:"nearest",behavior:"auto"});
}

function setSeedlingLabel(batchId,sIdx,label){
  var b=PROP.find(function(x){return x.id===batchId;});
  if(!b)return;
  b.seedlings[sIdx].label=label;saveProp();
}

function graduateSeedling(batchId,sIdx){
  var b=PROP.find(function(x){return x.id===batchId;});
  if(!b)return;
  var sl=b.seedlings[sIdx];
  var m=PROP_METHODS.find(function(x){return x.key===b.method;})||PROP_METHODS[0];
  // Pre-fill formData for new plant
  var newP=JSON.parse(JSON.stringify(BLANK));
  newP.name=b.parentName||"";
  newP.source=b.method==="seed"?"seed":b.method==="division"?"division":b.method==="graft"?"graft":"cutting";
  if(b.method==="seed"){newP.sowDate=b.date;}
  else{newP.opDate=b.date;}
  if(b.method==="seed"&&sl.successDate){newP.germDate=sl.successDate;}
  else if(sl.successDate){newP.rootDate=sl.successDate;}
  if(b.parentId){newP.buyFrom=b.parentName||"";}
  sl.graduated=true;
  sl.plantId=null;
  saveProp();
  window._propGradRef={batchId:batchId,sIdx:sIdx};
  S.showLib=false;
  S.showProp=false;
  S.formData=newP;S.formTab="basic";S.showAdd=true;S.editId=null;
  render();
}

function undoGraduate(batchId,sIdx){
  if(!confirm('撤销建卡？该苗将恢复为已成活状态，关联植物卡不会被删除。'))return;
  var b=PROP.find(function(x){return x.id===batchId;});
  if(!b)return;
  b.seedlings[sIdx].graduated=false;
  b.seedlings[sIdx].plantId=null;
  saveProp();render();
}

function propDaysSince(dateStr){
  if(!dateStr)return null;
  var d=new Date(dateStr);var now=new Date();
  var diff=Math.floor((now-d)/86400000);
  return diff>=0?diff:null;
}

}

function buildPropList(arr){
  if(arr.length===0)return '<div style="text-align:center;padding:40px 0;color:#9aaa88;font-size:13px">还没有繁育批次<br/>点击「+ 新建批次」开始记录</div>';
  return arr.slice().reverse().map(function(b){
    var m=PROP_METHODS.find(function(x){return x.key===b.method;})||PROP_METHODS[0];
    var succ=b.seedlings.filter(function(s){return s.status==="success";}).length;
    var fail=b.seedlings.filter(function(s){return s.status==="fail";}).length;
    var wait=b.seedlings.filter(function(s){return s.status==="waiting";}).length;
    var rate=b.total>0?Math.round((succ/b.total)*100):0;
    var days=propDaysSince(b.date);
    var successDays=b.seedlings.filter(function(s){return s.status==="success"&&s.successDate;}).map(function(s){return propDaysSince(b.date)-propDaysSince(s.successDate);}).filter(function(d){return d!==null&&d>=0;});
    var avgDays=successDays.length>0?Math.round(successDays.reduce(function(a,b){return a+b;},0)/successDays.length):null;
    return '<div style="background:'+(b.archived?"rgba(235,242,230,0.55)":"rgba(255,255,255,0.55)")+';border:1px solid '+(b.archived?"rgba(140,175,120,0.3)":"rgba(150,185,130,0.4)")+';border-radius:13px;padding:13px 14px;margin-bottom:9px;cursor:pointer;opacity:'+(b.archived?"0.82":"1")+'" onclick="S.propBatchId=\''+b.id+'\';render()">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div style="flex:1">'+
      '<span style="font-size:15px;font-weight:700;color:#2e4a22">'+m.icon+' '+q(b.parentName||"未命名")+'</span>'+
      '<span style="font-size:11px;color:#7a9060;margin-left:8px">'+m.label+'</span>'+
      (b.archived?'<span style="font-size:10px;background:rgba(140,185,110,0.28);color:#2a6a35;border-radius:6px;padding:1px 8px;margin-left:5px">🌾 已归档</span>':"")+
      '</div>'+
      '<span style="font-size:11px;color:#8aaa78">'+q(b.date)+(days!==null?" · "+days+"天前":"")+'</span>'+
      '</div>'+
      '<div style="margin-top:7px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
      '<span style="font-size:11px;color:#2a6a35;background:rgba(80,180,80,0.12);border-radius:8px;padding:2px 8px">✅ 成活 '+succ+'/'+b.total+(rate>0?" ("+rate+"%)":"")+'</span>'+
      (wait>0?'<span style="font-size:11px;color:#7a6010;background:rgba(220,185,60,0.15);border-radius:8px;padding:2px 8px">⏳ 等待 '+wait+'</span>':"")+
      (fail>0?'<span style="font-size:11px;color:#8a2818;background:rgba(210,90,70,0.12);border-radius:8px;padding:2px 8px">❌ 失败 '+fail+'</span>':"")+
      (avgDays!==null?'<span style="font-size:11px;color:#6a8858;background:rgba(180,210,160,0.2);border-radius:8px;padding:2px 8px">⏱ 平均'+avgDays+'天</span>':"")+
      '</div>'+
      (b.medium?'<div style="margin-top:5px;font-size:11px;color:#8aaa78">基质：'+q(b.medium)+'</div>':"")+
      '</div>';
  }).join("");
}

function buildPropBatchDetail(b){
  var m=PROP_METHODS.find(function(x){return x.key===b.method;})||PROP_METHODS[0];
  var succ=b.seedlings.filter(function(s){return s.status==="success";}).length;
  var fail=b.seedlings.filter(function(s){return s.status==="fail";}).length;
  var rate=b.total>0?Math.round((succ/b.total)*100):0;
  var days=propDaysSince(b.date);
  var successDays=b.seedlings.filter(function(s){return s.status==="success"&&s.successDate;}).map(function(s){
    var opD=propDaysSince(b.date);var sD=propDaysSince(s.successDate);
    return (opD!==null&&sD!==null)?opD-sD:null;
  }).filter(function(d){return d!==null&&d>=0;});
  var avgDays=successDays.length>0?Math.round(successDays.reduce(function(a,b){return a+b;},0)/successDays.length):null;

  var header='<div style="background:rgba(180,210,160,0.25);border-radius:11px;padding:11px 13px;margin-bottom:12px">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
    '<span style="font-size:16px;font-weight:700;color:#2e4a22">'+m.icon+' '+q(b.parentName||"未命名")+' <span style="font-size:12px;font-weight:400;color:#6a8858">'+m.label+'</span></span>'+
    '<div style="display:flex;gap:5px">'+
    '<button onclick="startPropEdit(\''+b.id+'\')" style="padding:4px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:11px;background:rgba(165,195,220,0.28);border:1px solid rgba(140,175,210,0.45);color:#384a68">✏️ 编辑</button>'+
    (b.method==="seed"&&!b.archived?'<button onclick="if(confirm(\'确认采收归档？\')){archivePropBatch(\''+b.id+'\')}" style="padding:4px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:11px;background:rgba(160,200,140,0.28);border:1px solid rgba(130,175,100,0.45);color:#2e5a20">🌾 采收归档</button>':"")+
    '<button onclick="delPropBatch(\''+b.id+'\')" style="padding:4px 9px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:11px;background:rgba(220,150,140,0.22);border:1px solid rgba(190,110,100,0.4);color:#7a2818">删除</button>'+
    '</div>'+
    '</div>'+
    '<div style="font-size:11px;color:#7a9060">操作日期：'+q(b.date)+(days!==null?"（"+days+"天前）":"")+
    (b.medium?"　基质："+q(b.medium):"")+
    (b.note?"　备注："+q(b.note):"")+
    (b.archived?'　<span style="background:rgba(140,185,110,0.25);color:#2a6a35;border-radius:6px;padding:1px 8px;font-weight:600">🌾 已采收归档 '+q(b.harvestDate||"")+"</span>":"")+
    '</div>'+
    '<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">'+
    '<span style="font-size:12px;font-weight:700;color:#2a6a35">成活率：'+rate+'% ('+succ+'/'+b.total+')</span>'+
    (avgDays!==null?'<span style="font-size:12px;color:#6a8858">平均成活：'+avgDays+'天</span>':"")+
    (fail>0?'<span style="font-size:12px;color:#8a2818">失败：'+fail+'株</span>':"")+
    '</div>'+
    '</div>';

  var labelKey=(b.method==="seed")?"发芽":((b.method==="graft")?"愈合确认":"生根/成活");
  var rows=b.seedlings.map(function(sl,idx){
    var st=PROP_STATUS[sl.status]||PROP_STATUS.waiting;
    var sdDays=sl.status==="success"&&sl.successDate?(propDaysSince(b.date)-propDaysSince(sl.successDate)):null;
    return '<div data-seedling-idx="'+idx+'" style="display:flex;flex-direction:column;gap:5px;padding:9px 11px;background:rgba(255,255,255,0.5);border-radius:10px;border:1px solid rgba(150,185,130,0.3);margin-bottom:7px">'+
      '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+
      '<input value="'+q(sl.label)+'" onblur="setSeedlingLabel(\''+b.id+'\','+idx+',this.value)" style="font-size:13px;font-weight:600;color:#2e4a22;background:transparent;border:none;border-bottom:1px dashed rgba(150,185,130,0.5);width:80px;outline:none;padding:1px 3px"/>'+
      '<span style="font-size:12px;font-weight:600;color:'+st.color+'">'+st.icon+' '+st.label+'</span>'+
      (sl.status==="success"&&sl.successDate?'<span style="font-size:11px;color:#8aaa78">'+labelKey+' '+q(sl.successDate)+(sdDays!==null?" (+"+sdDays+"天)":"")+'</span>':"")+
      (sl.graduated?'<span style="font-size:11px;background:rgba(140,185,110,0.3);color:#2a6a35;border-radius:7px;padding:1px 7px">🎓 已建卡</span> <button onclick="undoGraduate(\''+b.id+'\','+idx+')" style="font-size:10px;padding:2px 8px;border-radius:7px;cursor:pointer;font-family:inherit;background:rgba(220,190,150,0.3);border:1px solid rgba(190,150,100,0.4);color:#7a5020">↩ 撤销</button>':"")+
      '</div>'+
      '<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">'+
      ['waiting','success','fail'].map(function(sk){
        var ss=PROP_STATUS[sk];var sel=sl.status===sk;
        return '<button onclick="setSeedlingStatus(\''+b.id+'\','+idx+',\''+sk+'\')" style="padding:4px 9px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;background:'+(sel?"rgba(140,185,110,0.4)":"rgba(180,210,160,0.15)")+';border:1px solid '+(sel?"rgba(120,165,90,0.5)":"rgba(150,185,130,0.25)")+';color:'+(sel?"#2e4a22":"#6a8858")+'">'+ss.icon+' '+ss.label+'</button>';
      }).join("")+
      (sl.status==="success"?'<input type="date" value="'+q(sl.successDate)+'" onchange="setSeedlingDate(\''+b.id+'\','+idx+',this.value)" style="font-size:11px;padding:3px 7px;border-radius:7px;border:1px solid rgba(150,185,130,0.4);background:rgba(255,255,255,0.6);font-family:inherit;color:#3a5030"/>':"")+
      (!sl.graduated&&sl.status==="success"?'<button onclick="graduateSeedling(\''+b.id+'\','+idx+')" style="margin-left:auto;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;background:rgba(140,185,110,0.35);border:1px solid rgba(120,165,90,0.5);color:#2e4a22">🎓 毕业→建卡</button>':"")+
      '</div>'+
      '</div>';
  }).join("");

  return header+rows;
}

// ── Export / Import ──
function exportData(){
  var data={plants:S.plants,fert:LIB.fert,med:LIB.med,soil:LIB.soil,prop:PROP,exportTime:new Date().toISOString()};
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  var now=new Date();
  a.href=url;
  a.download="植物志备份_"+now.getFullYear()+(now.getMonth()+1)+now.getDate()+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importData(){
  var input=document.createElement("input");
  input.type="file";input.accept=".json,application/json";
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(evt){
      try{
        var data=JSON.parse(evt.target.result);
        var pc=0,fc=0,mc=0,sc=0;
        if(Array.isArray(data.plants)){S.plants=data.plants;pc=data.plants.length;}
        if(Array.isArray(data.fert)){LIB.fert=data.fert;fc=data.fert.length;}
        if(Array.isArray(data.med)){LIB.med=data.med;mc=data.med.length;}
        if(Array.isArray(data.soil)){LIB.soil=data.soil;sc=data.soil.length;}
        var brc=0;if(Array.isArray(data.prop)){PROP.splice(0,PROP.length);data.prop.forEach(function(x){PROP.push(x);});brc=PROP.length;saveProp();}
        storePlants();saveLib();render();
        alert("✅ 导入成功！\n植物："+pc+"株\n肥料库："+fc+"种\n药品库："+mc+"种\n盆土库："+sc+"种\n繁育批次："+brc+"批");
      }catch(err){alert("❌ 导入失败，请确认文件是由「植物志」导出的备份。");}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}


function fetchWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=49.1042&longitude=-122.8231&current=temperature_2m,relative_humidity_2m,precipitation,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=America/Vancouver&forecast_days=3")
  .then(function(r){return r.json();})
  .then(function(d){
    var c=d.current;
    var codes=d.daily&&d.daily.weather_code?d.daily.weather_code:[];
    var tMax=d.daily&&d.daily.temperature_2m_max?d.daily.temperature_2m_max:[];
    var tMin=d.daily&&d.daily.temperature_2m_min?d.daily.temperature_2m_min:[];
    function wD(code){if(code<=1)return{cond:"晴天",emo:"☀️",rain:false};if(code<=3)return{cond:"多云",emo:"⛅",rain:false};if(code<=49)return{cond:"有雾",emo:"🌫️",rain:false};if(code<=67)return{cond:"降雨",emo:"🌧️",rain:true};if(code<=77)return{cond:"降雪",emo:"❄️",rain:false};if(code<=82)return{cond:"阵雨",emo:"🌦️",rain:true};return{cond:"雷雨",emo:"⛈️",rain:true};}
    var wi=wD(c.weather_code);
    W.temp=Math.round(c.temperature_2m);W.hum=c.relative_humidity_2m;W.pre=c.precipitation||0;
    W.cond=wi.cond;W.emo=wi.emo;W.rain=wi.rain;
    W.fc=codes.slice(0,3).map(function(code,i){var fi=wD(code);return{d:["今天","明天","后天"][i],e:fi.emo,t:fi.cond,hi:tMax[i]!==undefined?Math.round(tMax[i]):null,lo:tMin[i]!==undefined?Math.round(tMin[i]):null};});
    var tip="";if(wi.rain||W.pre>3)tip="今日有降水，注意减少浇水";else if(W.hum>80)tip="湿度偏高（"+W.hum+"%），浇水适量即可";else if(W.temp>30)tip="气温偏高（"+W.temp+"°C），注意防晒遮阴";else if(W.temp<5)tip="气温偏低，注意防寒保温";else tip="天气适宜，可按常规养护计划进行";
    W.tip=tip;
    var now=new Date();W.upd=now.getFullYear()+"年"+(now.getMonth()+1)+"月"+now.getDate()+"日 "+now.getHours()+":"+(now.getMinutes()<10?"0":"")+now.getMinutes();
    render();
  }).catch(function(){W.upd="天气获取失败，请检查网络";render();});
}

// ── Init ──
render();
fetchWeather();
