<title>植物志</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:linear-gradient(150deg,#dce8d8 0%,#c8dcc0 50%,#d4e4cc 100%);background-attachment:fixed;color:#2e4a22;min-height:100vh}
#root{max-width:460px;margin:0 auto;min-height:100vh}
button{-webkit-tap-highlight-color:transparent}
input::placeholder,textarea::placeholder{color:#9aaa88}
input[type=date]{-webkit-appearance:none;color-scheme:light}

/* 全屏页面 */
.fullpage{
  min-height:100vh;
  background:linear-gradient(150deg,#dce8d8,#c8dcc0,#d4e4cc);
  padding-bottom:calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 20px);
}

/* 顶部导航栏（全屏页面用）*/
.page-header{
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(90,120,70,0.2);
  background:rgba(220,232,216,0.95);
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding-top:max(14px,env(safe-area-inset-top,14px));
}
.page-header-title{font-size:17px;font-weight:700;color:#2e4a22;flex:1}
.back-btn{background:none;border:none;cursor:pointer;font-size:28px;color:#5a8040;padding:0;line-height:1;flex-shrink:0}

/* Tab布局 */
.tab-content{padding-bottom:calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 8px)}

/* 粘性顶栏 */
.sticky-bar{
  position:sticky;top:0;z-index:20;
  background:rgba(215,230,210,0.95);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(140,185,120,0.25);
  padding:14px 16px 11px;
  padding-top:max(14px,env(safe-area-inset-top,14px));
}
.sticky-bar h1{font-size:22px;font-weight:800;color:#2e4a22;letter-spacing:-.3px}
.sticky-bar .sub{font-size:11px;color:#7a9e7e;margin-top:2px}

/* 底部导航 */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:460px;z-index:100;
  background:rgba(235,244,230,0.96);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(140,185,120,0.3);
  display:flex;
  padding-bottom:max(env(safe-area-inset-bottom,0px),16px);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 6px;background:none;border:none;cursor:pointer;font-family:inherit}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;color:#8aaa78;font-weight:500}
.nav-btn.active .nav-label{color:#2e4a22;font-weight:700}
.nav-active-bar{width:20px;height:2.5px;background:#5a8040;border-radius:2px;margin-top:1px}

/* 卡片 */
.card{background:rgba(255,255,255,0.58);border:1px solid rgba(150,185,130,0.35);border-radius:14px;padding:13px 14px}

/* 通用按钮 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:11px 16px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .12s}
.btn:active{opacity:.7}
.btn-green{background:rgba(100,160,70,.88);color:white}
.btn-gray{background:rgba(200,218,190,.45);border:1px solid rgba(160,190,140,.4);color:#4a6a38}
.btn-red{background:rgba(220,100,80,.15);border:1px solid rgba(190,80,60,.4);color:#8a2010}

/* 输入框 */
.input{width:100%;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,.72);border:1px solid rgba(150,185,130,.45);font-family:inherit;font-size:14px;color:#2e4a22;outline:none;-webkit-appearance:none}
.input:focus{border-color:rgba(90,128,64,.7);background:rgba(255,255,255,.88)}
.field-label{display:block;font-size:11px;color:#6a8858;margin-bottom:3px;font-weight:500}

/* 分类筛选条 */
.cat-strip{display:flex;gap:6px;overflow-x:auto;padding:8px 16px 10px;scrollbar-width:none}
.cat-strip::-webkit-scrollbar{display:none}
.cat-chip{white-space:nowrap;flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;background:rgba(180,210,160,.2);border:1px solid rgba(150,185,130,.3);color:#5a7848;font-family:inherit;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.cat-chip.active{background:rgba(80,120,54,.82);border-color:rgba(60,100,34,.8);color:white;font-weight:700}

/* 植物列表 */
.plant-list{padding:4px 16px;display:flex;flex-direction:column;gap:10px}
.plant-card-row{background:rgba(255,255,255,.6);border:1px solid rgba(150,185,130,.45);border-radius:14px;padding:12px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:11px}
.plant-card-row:active{opacity:.85}

/* 占位 */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 32px;text-align:center}
.placeholder-emoji{font-size:56px;opacity:.55}
.placeholder-title{font-size:18px;font-weight:700;color:#3a5828}
.placeholder-desc{font-size:13px;color:#7a9060;line-height:1.7}

/* FAB */
.fab{position:fixed;bottom:calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 14px);right:max(calc(50% - 230px + 16px),16px);width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6aaa44,#4a8a30);border:none;cursor:pointer;font-size:26px;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(50,90,30,.32);z-index:60}
.fab:active{transform:scale(.92)}

/* Toast */
.toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:999;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.3,.64,1)}
.toast-wrap.show{transform:translateX(-50%) translateY(0)}
.toast-inner{background:rgba(30,60,18,.92);color:white;font-size:13px;font-weight:600;padding:10px 20px;border-radius:24px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}

/* 护理状态色块 */
.care-btn-block{flex:1;padding:8px 4px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:11px;text-align:center;transition:opacity .12s}
.care-btn-block:active{opacity:.7}

/* 详情页照片区 */
.photo-upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:160px;border-radius:14px;border:1.5px dashed rgba(150,185,130,.5);background:rgba(180,210,160,.1);cursor:pointer;gap:6px}
.photo-img{width:100%;max-height:200px;object-fit:cover;border-radius:14px;display:block}

/* 日志列表项 */
.log-item{background:rgba(255,255,255,.6);border:1px solid rgba(150,185,130,.3);border-radius:11px;padding:10px 13px;margin-bottom:8px}
</style>
</head>

// 2. 工具函数
// ═══════════════════════════════════════════════
function uid(){return 'p'+Date.now()+Math.random().toString(36).slice(2,6)}
function toDay(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDate(s){if(!s)return '—';const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?`${m[1]}/${m[2]}/${m[3]}`:s}
function daysSince(s){if(!s)return null;const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(!m)return null;return Math.floor((Date.now()-new Date(+m[1],+m[2]-1,+m[3]))/86400000)}
function lastLog(log){return log?.length?log[log.length-1].date:null}
function autoInt(name){for(const r of AUTO_INT)if(r.k.some(k=>name.includes(k)))return{wi:r.w,fi:r.f};return{wi:7,fi:14}}
// ── 暂停状态辅助函数 ──
// 判断某植物的水/肥操作当前是否处于暂停期
function getIsPaused(p,type){
  var pause=type==='water'?p.waterPause:p.fertPause;
  if(!pause)return false;
  if(!pause.end)return true;
  return toDay()<=pause.end;
}
// 获取有效的"上次操作"日期（暂停期内返回null；暂停到期后返回pause.end或实际日志）
function getEffLogDate(p,type){
  var pause=type==='water'?p.waterPause:p.fertPause;
  var log=type==='water'?p.waterLog:p.fertLog;
  if(!pause)return lastLog(log);
  var today=toDay();
  if(!pause.end||today<=pause.end)return null;
  var ld=lastLog(log);
  return(ld&&ld>pause.end)?ld:pause.end;
}
// ── 疗程辅助 ──
// 从激活疗程（p.activeCourse）+给药日志统计当前进度。
// 返回：{active, course, given, total, remain, done}
function medCourseInfo(p){
  const course=p.activeCourse;
  if(!course)return{active:false,course:null,given:0,total:0,remain:0,done:false};
  const total=Math.max(1,parseInt(course.total)||3);
  const given=(p.medLog||[]).filter(r=>!r.skip&&r.courseId===course.id).length;
  return{active:true,course,given,total,remain:Math.max(0,total-given),done:given>=total};
}
// 在 updateDb 的纯更新函数内调用：将疗程归档并清空 activeCourse
// status: 'done'（自动完成）| 'closed'（手动结束）
function archiveCourseInUpdate(prev,plantId,status,today){
  const plant=prev.plants.find(p=>p.id===plantId);
  if(!plant||!plant.activeCourse)return prev;
  const info=medCourseInfo(plant);
  const archived={
    ...plant.activeCourse,
    plantId,plantName:plant.name,
    given:info.given,status,endDate:today,
  };
  const courses=[...(prev.archive?.courses||[]),archived];
  const plants=prev.plants.map(p=>p.id===plantId?{...p,activeCourse:null}:p);
  return{...prev,plants,archive:{...prev.archive,courses}};
}

function careAlerts(p){
  const a=[];
  // 浇水：暂停中则不报警
  if(!getIsPaused(p,'water')){
    const lw=getEffLogDate(p,'water');
    const wd=lw!=null?daysSince(lw):null;
    const wi=parseInt(p.wi)||7;
    if(lw!=null&&wd!=null&&wd>=wi)a.push({type:'water',icon:'💧',label:'浇水（已'+wd+'天）',color:'#1a5a99'});
  }
  // 施肥：暂停中则不报警
  if(!getIsPaused(p,'fert')){
    const lf=getEffLogDate(p,'fert');
    const fd=lf!=null?daysSince(lf):null;
    const fi=parseInt(p.fi)||14;
    if(lf!=null&&fd!=null&&fd>=fi)a.push({type:'fert',icon:'🌿',label:'施肥（已'+fd+'天）',color:'#2a7020'});
  }
  if(p.activeCourse){
    const info=medCourseInfo(p);
    if(!info.done){
      const lm=lastLog(p.medLog);
      const md=lm!=null?daysSince(lm):null;
      const interval=parseInt(info.course.interval)||7;
      if(lm!=null&&md!=null&&md>=interval)
        a.push({type:'med',icon:'💊',label:'给药（已'+md+'天，第'+(info.given+1)+'/'+info.total+'次）',color:'#882010'});
    }
  }
  return a;
}
function plantEmoji(p){
  const s=(p.name+p.variety+p.category).toLowerCase();
  if(/多肉|仙人/.test(s))return '🌵';
  if(/玫瑰|月季/.test(s))return '🌹';
  if(/兰/.test(s))return '🌸';
  if(/番茄|辣椒/.test(s))return '🍅';
  if(/黄瓜|瓜/.test(s))return '🥒';
  if(/薄荷|罗勒/.test(s))return '🌿';
  return '🪴';
}

// ─── IndexedDB 照片存储（防止 localStorage 超限丢数据）───
const PHOTO_IDB={
  _db:null,
  async db(){
    if(this._db)return this._db;
    this._db=await new Promise((res,rej)=>{
      const r=indexedDB.open('plant_photodb',1);
      r.onupgradeneeded=e=>e.target.result.createObjectStore('photos');
      r.onsuccess=e=>res(e.target.result);
      r.onerror=e=>rej(e.target.error);
    });
    return this._db;
  },
  async get(id){
    const db=await this.db();
    return new Promise((res,rej)=>{
      const tx=db.transaction('photos','readonly');
      const r=tx.objectStore('photos').get(id);
      r.onsuccess=e=>res(e.target.result||null);
      r.onerror=e=>rej(e.target.error);
    });
  },
  async put(id,data){
    const db=await this.db();
    return new Promise((res,rej)=>{
      const tx=db.transaction('photos','readwrite');
      const r=tx.objectStore('photos').put(data,id);
      r.onsuccess=()=>res(id);
      r.onerror=e=>rej(e.target.error);
    });
  },
  async del(id){
    if(!id)return;
    const db=await this.db();
    return new Promise((res,rej)=>{
      const tx=db.transaction('photos','readwrite');
      const r=tx.objectStore('photos').delete(id);
      r.onsuccess=()=>res();
      r.onerror=e=>rej(e.target.error);
    });
  },
  isRef(s){return!!(s&&s.startsWith('photo:'));},
};
// 从图片文件生成压缩后的 base64（最大边 640px, jpeg 0.75）
function compressPhoto(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const maxSize=640,w=img.width,h=img.height;
      let nw=w,nh=h;
      if(w>h){if(w>maxSize){nh=Math.round(h*maxSize/w);nw=maxSize;}}
      else{if(h>maxSize){nw=Math.round(w*maxSize/h);nh=maxSize;}}
      const canvas=document.createElement('canvas');
      canvas.width=nw;canvas.height=nh;
      canvas.getContext('2d').drawImage(img,0,0,nw,nh);
      cb(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
// 保存照片到 IndexedDB，返回引用 ID（photo:xxx）
async function savePhotoToIDB(base64){
  const id='photo:'+Math.random().toString(36).slice(2)+Date.now().toString(36);
  await PHOTO_IDB.put(id.slice(6),base64);
  return id;
}

// 异步加载 IndexedDB 中的植物照片
function PlantPhoto({src:rawSrc,style,className}){
  const[src,setSrc]=useState(()=>rawSrc&&!PHOTO_IDB.isRef(rawSrc)?rawSrc:null);
  useEffect(()=>{
    if(!rawSrc){setSrc(null);return;}
    if(!PHOTO_IDB.isRef(rawSrc)){setSrc(rawSrc);return;}
    let cancelled=false;
    PHOTO_IDB.get(rawSrc.slice(6)).then(d=>{if(!cancelled)setSrc(d||null);}).catch(()=>{});
    return()=>{cancelled=true;};
  },[rawSrc]);
  if(!src)return null;
  return<img src={src} style={style} className={className} alt=""/>;
}

function useToast(){
  const[s,setS]=useState({msg:'',show:false});
  const t=useRef(null);
  const show=useCallback((msg,ms=2200)=>{
    clearTimeout(t.current);
    setS({msg,show:true});
    t.current=setTimeout(()=>setS(x=>({...x,show:false})),ms);
  },[]);
  const el=<div className={`toast-wrap${s.show?' show':''}`}><div className="toast-inner">{s.msg}</div></div>;
  return{show,el};
}

function LogPage({plantId,logType,onClose}){
  const{db,updateDb,toast}=useApp();
  const plant=db.plants.find(p=>p.id===plantId);
  const meta=LOG_META[logType];
  const log=plant?.[meta.key]||[];
  const blank=()=>({date:toDay(),note:'',name:'',reason:'',amount:''});
  const[form,setForm]=useState(blank());
  const[editIdx,setEditIdx]=useState(null);
  const[delIdx,setDelIdx]=useState(null);
  const[showNewCourse,setShowNewCourse]=useState(false);
  const[courseForm,setCourseForm]=useState({drugName:'',reason:'',amount:'',interval:7,total:3});
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const scf=(k,v)=>setCourseForm(f=>({...f,[k]:v}));

  useEffect(()=>{window.scrollTo(0,0)},[]);

  const today=toDay();
  const medInfo=logType==='med'?medCourseInfo(plant):null;

  function save(){
    if(!form.date){toast.show('⚠️ 请选择日期');return}
    const isNewEntry=editIdx===null;
    updateDb(prev=>{
      let plants=prev.plants.map(p=>{
        if(p.id!==plantId)return p;
        const arr=[...(p[meta.key]||[])];
        const rec={date:form.date};
        if(logType==='fert'){rec.name=form.name;rec.amount=form.amount;rec.note=form.note}
        else if(logType==='med'){
          rec.name=form.name;rec.reason=form.reason;rec.amount=form.amount;rec.note=form.note;
          // 新增给药记录时自动附上当前疗程ID
          if(isNewEntry&&p.activeCourse)rec.courseId=p.activeCourse.id;
        }
        else{rec.note=form.note}
        if(editIdx!==null)arr[editIdx]=rec;
        else{arr.push(rec);arr.sort((a,b)=>a.date.localeCompare(b.date))}
        return{...p,[meta.key]:arr};
      });
      let next={...prev,plants};
      // 新增给药记录后检查是否完成疗程
      if(logType==='med'&&isNewEntry){
        const updated=next.plants.find(p=>p.id===plantId);
        if(updated){
          const info=medCourseInfo(updated);
          if(info.done)next=archiveCourseInUpdate(next,plantId,'done',today);
        }
      }
      return next;
    });
    setEditIdx(null);setForm(blank());
    toast.show(editIdx!==null?'✅ 已保存修改':`${meta.icon} 已记录${meta.label}`);
  }

  function closeCourse(){
    updateDb(prev=>archiveCourseInUpdate(prev,plantId,'closed',today));
    toast.show('🔚 疗程已结束并存档');
  }

  function startNewCourse(){
    if(!courseForm.drugName.trim()){toast.show('⚠️ 请填写药品名称');return}
    const cid='c'+Date.now()+Math.random().toString(36).slice(2,6);
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==plantId)return p;
      return{...p,activeCourse:{
        id:cid,
        drugName:courseForm.drugName.trim(),
        reason:courseForm.reason.trim(),
        amount:courseForm.amount.trim(),
        interval:Math.max(1,parseInt(courseForm.interval)||7),
        total:Math.max(1,parseInt(courseForm.total)||3),
        startDate:today,
      }};
    })}));
    setShowNewCourse(false);
    setCourseForm({drugName:'',reason:'',amount:'',interval:7,total:3});
    toast.show('💊 已开始新疗程');
  }

  function startEdit(idx){
    const r=log[idx];
    setForm({date:r.date,note:r.note||'',name:r.name||'',reason:r.reason||'',amount:r.amount||''});
    setEditIdx(idx);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function doDelete(){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==plantId)return p;
      const arr=[...(p[meta.key]||[])];arr.splice(delIdx,1);return{...p,[meta.key]:arr};
    })}));
    setDelIdx(null);toast.show('🗑 已删除');
  }

  useSwipeBack(onClose);
  if(!plant)return null;
  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">
          {meta.icon} {plant.name}{plant.variety?<span style={{fontWeight:400,color:'#5a7848',marginLeft:6,fontSize:14}}>{plant.variety}</span>:''} · {meta.label}记录
        </div>
      </div>
      <div style={{padding:'14px 16px',paddingBottom:40}}>
        {/* ── 给药：当前疗程状态 ── */}
        {logType==='med'&&(
          <div style={{marginBottom:14}}>
            {medInfo.active&&!medInfo.done?(
              <div className="card" style={{borderColor:'rgba(200,100,60,.4)',background:'rgba(240,200,180,.15)',marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:'#7a3018',marginBottom:6}}>💊 当前疗程</div>
                <div style={{fontSize:13,color:'#5a2010',marginBottom:2,fontWeight:600}}>{medInfo.course.drugName}</div>
                {medInfo.course.reason&&<div style={{fontSize:11,color:'#9a6050',marginBottom:4}}>病症：{medInfo.course.reason}</div>}
                {medInfo.course.amount&&<div style={{fontSize:11,color:'#9a6050',marginBottom:4}}>用量：{medInfo.course.amount}</div>}
                <div style={{fontSize:11,color:'#9a6050',marginBottom:8}}>间隔 {medInfo.course.interval} 天 · 共 {medInfo.total} 次</div>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                  {Array.from({length:medInfo.total}).map((_,i)=>(
                    <div key={i} style={{width:28,height:28,borderRadius:'50%',border:'2px solid rgba(200,100,60,.5)',background:i<medInfo.given?'rgba(200,100,60,.7)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:i<medInfo.given?'white':'#c07050',fontWeight:700}}>{i<medInfo.given?'✓':i+1}</div>
                  ))}
                  <span style={{fontSize:12,color:'#9a6050',marginLeft:4}}>第 {medInfo.given+1}/{medInfo.total} 次</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-green" style={{flex:2,fontSize:13}} onClick={()=>{
                    setForm(f=>({...f,name:medInfo.course.drugName,reason:medInfo.course.reason,amount:medInfo.course.amount}));
                    window.scrollTo({top:300,behavior:'smooth'});

                      <div style={{flex:1}}>
                        <label className="field-label">总次数</label>
                        <input type="number" min={1} className="input" style={{textAlign:'center',fontWeight:700,color:'#7a3018'}} defaultValue={courseForm.total} onBlur={e=>scf('total',+e.target.value||3)}/>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btn-green" style={{flex:1}} onClick={startNewCourse}>✓ 开始疗程</button>
                      <button className="btn btn-gray" style={{flex:1}} onClick={()=>setShowNewCourse(false)}>取消</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {/* 表单 */}
        <div className="card" style={{marginBottom:14}}>
          <div style={{fontSize:12,color:'#6a8858',fontWeight:700,marginBottom:10}}>{editIdx!==null?'修改记录':'新增记录'}</div>
          <label className="field-label">日期</label>
          <input type="date" className="input" style={{marginBottom:8}} defaultValue={form.date} max={toDay()} onBlur={e=>sf('date',e.target.value)}/>
          {logType==='fert'&&<>
            {(db.lib.fert||[]).length>0&&<>
              <label className="field-label">从肥料库选择（可选）</label>
              <select className="input" style={{marginBottom:8,color:form.name?'#2e4a22':'#9aaa88'}}
                value={form.name||''}
                onChange={e=>{
                  const f=(db.lib.fert||[]).find(x=>x.name===e.target.value);
                  if(f){setForm(prev=>({...prev,name:f.name,amount:f.dosage||prev.amount}));}
                  else{setForm(prev=>({...prev,name:''}));}
                }}>
                <option value="">— 不从库存选择 —</option>
                {(db.lib.fert||[]).map(f=><option key={f.id||f.name} value={f.name}>{f.name}{f.npk?` (${f.npk})`:''}</option>)}
              </select>
            </>}
            <label className="field-label">肥料名称</label>
            <input key={'fn-'+form.name} className="input" style={{marginBottom:8}} placeholder="复合肥、磷酸二氢钾…" defaultValue={form.name} onBlur={e=>sf('name',e.target.value)}/>
            <label className="field-label">用量/浓度</label>
            <input key={'fa-'+form.amount} className="input" style={{marginBottom:8}} placeholder="5g/L…" defaultValue={form.amount} onBlur={e=>sf('amount',e.target.value)}/>
          </>}
          {logType==='med'&&<>
            <label className="field-label">药品名称</label>
            <input key={'mn-'+form.name} className="input" style={{marginBottom:8}} placeholder="多菌灵、吡虫啉…" defaultValue={form.name} onBlur={e=>sf('name',e.target.value)}/>
            <label className="field-label">病症/原因</label>
            <input key={'mr-'+form.reason} className="input" style={{marginBottom:8}} placeholder="白粉病、蚜虫…" defaultValue={form.reason} onBlur={e=>sf('reason',e.target.value)}/>
            <label className="field-label">用量/浓度</label>
            <input key={'ma-'+form.amount} className="input" style={{marginBottom:8}} placeholder="稀释800倍…" defaultValue={form.amount} onBlur={e=>sf('amount',e.target.value)}/>
          </>}
          <label className="field-label">{logType==='water'?'备注（可选）':'备注'}</label>
          <textarea key={'note-'+editIdx+'-'+form.note} className="input" rows={2} style={{marginBottom:10,resize:'vertical',lineHeight:1.6}} placeholder={meta.ph} defaultValue={form.note} onBlur={e=>sf('note',e.target.value)}/>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-green" style={{flex:1}} onClick={save}>✓ {editIdx!==null?'保存修改':'添加'}</button>
            {editIdx!==null&&<button className="btn btn-gray" onClick={()=>{setEditIdx(null);setForm(blank())}}>取消</button>}
          </div>
        </div>
        {/* 历史 */}
        <div style={{fontSize:12,color:'#6a8858',fontWeight:700,marginBottom:8}}>历史记录（{log.length} 条）</div>
        {log.length===0
          ?<div style={{textAlign:'center',color:'#9aaa88',fontSize:13,padding:'28px 0'}}>暂无记录</div>
          :[...log].reverse().map((r,ri)=>{
            const origIdx=log.length-1-ri;
            return(
              <div key={origIdx} className="log-item">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#2e4a22'}}>{fmtDate(r.date)}</span>
                    {r.name&&<span style={{fontSize:12,color:'#5a7848',marginLeft:8}}>{r.name}</span>}
                    {r.amount&&<span style={{fontSize:12,color:'#7a9060',marginLeft:6}}>· {r.amount}</span>}
                    {r.reason&&<div style={{fontSize:11,color:'#9a7040',marginTop:2}}>病症：{r.reason}</div>}
                    {r.courseId&&<div style={{fontSize:10,color:'#b08060',marginTop:2}}>📋 疗程记录</div>}
                    {r.note&&<div style={{fontSize:12,color:'#6a8858',marginTop:2}}>{r.note}</div>}
                  </div>
                  <div style={{display:'flex',gap:2,flexShrink:0,marginLeft:8}}>
                    <button style={{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'2px 5px'}} onClick={()=>startEdit(origIdx)}>✏️</button>
                    <button style={{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'2px 5px'}} onClick={()=>setDelIdx(origIdx)}>🗑️</button>
                  </div>
                </div>
              </div>
            );
          })
        }
      </div>
      {/* 删除确认 */}
      {delIdx!==null&&(
        <div style={{position:'fixed',inset:0,background:'rgba(40,65,25,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={()=>setDelIdx(null)}>
          <div style={{background:'#f5f8f2',borderRadius:18,padding:'24px 20px',width:'100%',maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:28,marginBottom:10}}>⚠️</div>
            <div style={{fontSize:15,fontWeight:600,color:'#2e4a22',marginBottom:18}}>确认删除这条记录吗？</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-gray" style={{flex:1}} onClick={()=>setDelIdx(null)}>取消</button>
              <button className="btn btn-red" style={{flex:1}} onClick={doDelete}>确认删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════
// 植物护理日历页（全屏）
// ═══════════════════════════════════════════════
function PlantCareCalendar({plantId,onClose}){
  const{db,updateDb,toast}=useApp();
  const plant=db.plants.find(p=>p.id===plantId);
  const today=toDay();
  const[yr,setYr]=useState(()=>new Date().getFullYear());
  const[mo,setMo]=useState(()=>new Date().getMonth());
  const[selDate,setSelDate]=useState(null);
  const[noteText,setNoteText]=useState('');
  const[showNoteInput,setShowNoteInput]=useState(false);
  const[editNote,setEditNote]=useState(null); // {idx, text} for editing
  const[editText,setEditText]=useState('');
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);
  if(!plant)return null;

  function navMo(dir){
    let m=mo+dir,y=yr;
    if(m<0){m=11;y--;}else if(m>11){m=0;y++;}
    setMo(m);setYr(y);
  }
  const prevMo=useCallback(()=>navMo(-1),[mo,yr]);
  const nextMo=useCallback(()=>navMo(1),[mo,yr]);
  const calSwRef=useSwipeMonth(prevMo,nextMo);

  // 构建该植物的dotMap
  const dotMap={};
  function addDot(ds,type,skip){
    if(!dotMap[ds])dotMap[ds]=[];
    const ex=dotMap[ds].find(x=>x.type===type);
    if(!ex)dotMap[ds].push({type,skip:!!skip,plan:false});
  }
  ['water','fert','med'].forEach(type=>{
    const log=type==='water'?plant.waterLog:type==='fert'?plant.fertLog:plant.medLog;
    (log||[]).forEach(r=>addDot(r.date,type,r.skip));
  });
  (plant.noteLog||[]).forEach(r=>addDot(r.date,'note',false));

  // 里程碑日期（橙色）
  const milestones={};
  [{d:plant.sowDate,l:'播种'},{d:plant.germDate,l:'发芽'},{d:plant.buyDate,l:'购入'},
   {d:plant.opDate,l:'操作'},{d:plant.rootDate,l:'生根'},{d:plant.hardeningDate,l:'炼苗'},
   {d:plant.prePlantDate,l:'假植'},{d:plant.transplantDate,l:'移栽'},{d:plant.finalPlantDate,l:'定植'}
  ].forEach(({d,l})=>{if(d)milestones[d]=l;});

  const first=new Date(yr,mo,1);
  const startOff=(first.getDay()+6)%7;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const WK2=['一','二','三','四','五','六','日'];

  function handleDayClick(ds){
    setSelDate(s=>s===ds?null:ds);
    setShowNoteInput(false);
    setNoteText('');
  }

  function saveNote(){
    if(!selDate||!noteText.trim()){toast.show('⚠️ 请输入备注内容');return;}
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==plantId)return p;
      const arr=[...(p.noteLog||[]),{date:selDate,text:noteText.trim()}];
      arr.sort((a,b)=>a.date.localeCompare(b.date));
      return{...p,noteLog:arr};
    })}));
    toast.show('📝 备注已添加');
    setNoteText('');setShowNoteInput(false);
  }

  function deleteNote(noteIdx){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==plantId)return p;
      const arr=[...(p.noteLog||[])];
      arr.splice(noteIdx,1);
      return{...p,noteLog:arr};
    })}));
    toast.show('🗑 备注已删除');
  }

  function startEditNote(n){
    setEditNote(n);
    setEditText(n.text);
    setShowNoteInput(false);
  }
  function saveEditNote(){
    if(!editText.trim()){toast.show('⚠️ 备注不能为空');return;}
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==plantId)return p;
      const arr=[...(p.noteLog||[])];
      arr[editNote.idx]={...arr[editNote.idx],text:editText.trim()};
      return{...p,noteLog:arr};
    })}));
    toast.show('✅ 备注已更新');
    setEditNote(null);setEditText('');
  }

  // Selected day detail
  const selLogs=[];
  if(selDate){
    ['water','fert','med'].forEach(type=>{
      const log=type==='water'?plant.waterLog:type==='fert'?plant.fertLog:plant.medLog;
      (log||[]).forEach((r,i)=>{if(r.date===selDate)selLogs.push({type,r,idx:i});});
    });
  }
  const selNotes=(plant.noteLog||[]).map((n,i)=>({...n,idx:i})).filter(n=>n.date===selDate);
  const selMilestone=selDate?milestones[selDate]:null;

  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div style={{flex:1,minWidth:0}}>
          <div className="page-header-title" style={{fontSize:15}}>{plant.name}{plant.variety&&<span style={{fontWeight:400,fontSize:13,color:'#5a7848',marginLeft:6}}>{plant.variety}</span>}</div>
          <div style={{fontSize:11,color:'#7a9868'}}>护理日历</div>
        </div>
      </div>
      <div style={{padding:'12px 16px'}}>
        {/* 月历（支持横划翻月） */}
        <div ref={calSwRef} style={{touchAction:'pan-y'}}>
        {/* 月份导航 */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:24,color:'#5a8040',padding:'2px 8px',lineHeight:1}} onClick={prevMo}>‹</button>
          <span style={{fontSize:15,fontWeight:700,color:'#2e4a22'}}>{yr}年 {MN[mo]}</span>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:24,color:'#5a8040',padding:'2px 8px',lineHeight:1}} onClick={nextMo}>›</button>
        </div>
        {/* 星期头 */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
          {WK2.map(w=><div key={w} style={{textAlign:'center',fontSize:10,color:'#9aaa88',padding:'2px 0'}}>{w}</div>)}
        </div>
        {/* 日历格 */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:14}}>
          {Array.from({length:startOff},(_,i)=><div key={'e'+i}/>)}
          {Array.from({length:daysInMonth},(_,i)=>{
            const day=i+1;
            const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
            const isT=ds===today,isSel=selDate===ds;
            const hasMile=!!milestones[ds];
            const dots=dotMap[ds]||[];
            return <div key={day}
              style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2px 0',
                cursor:'pointer',borderRadius:8,
                background:isSel?'rgba(140,185,110,0.4)':'transparent'}}
              onClick={()=>handleDayClick(ds)}>
              <div style={{width:28,height:28,borderRadius:'50%',
                background:isT?'rgba(70,160,70,0.85)':hasMile?'rgba(200,140,50,0.2)':'transparent',
                border:hasMile&&!isT?'1.5px solid rgba(200,140,50,0.6)':'none',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:isT?14:12,fontWeight:isT?800:400,color:isT?'white':'#2e4a22'}}>
                {day}
              </div>
              <div style={{display:'flex',gap:2,justifyContent:'center',marginTop:2}}>
                {['water','fert','med','note'].map(t=>{
                  const e=dots.find(x=>x.type===t);if(!e)return null;
                  return <div key={t} style={{width:5,height:5,borderRadius:'50%',
                    background:e.plan||e.skip?'transparent':DOT_COLOR[t],
                    border:e.plan||e.skip?`1.5px solid ${DOT_COLOR[t]}`:'none'}}/>;
                })}
              </div>
            </div>;
          })}
        </div>
        {/* 图例 */}
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14,padding:'8px 10px',background:'rgba(240,248,235,0.7)',borderRadius:10}}>
          {[{t:'water',l:'浇水'},{t:'fert',l:'施肥'},{t:'med',l:'给药'},{t:'note',l:'备注'}].map(x=>(
            <div key={x.t} style={{display:'flex',alignItems:'center',gap:3}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:DOT_COLOR[x.t]}}/>
              <span style={{fontSize:10,color:'#7a9060'}}>{x.l}</span>
            </div>
          ))}
          <div style={{display:'flex',alignItems:'center',gap:3}}>
            <div style={{width:12,height:12,borderRadius:'50%',background:'rgba(200,140,50,0.2)',border:'1.5px solid rgba(200,140,50,0.6)'}}/>
            <span style={{fontSize:10,color:'#7a9060'}}>里程碑</span>
          </div>
        </div>
        </div>{/* end swipe wrapper */}
        {/* 日期详情 */}
        {selDate&&(
          <div style={{background:'rgba(240,248,235,0.9)',borderRadius:12,padding:'12px 14px',border:'1px solid rgba(140,185,110,0.35)'}}>
            <div style={{fontSize:13,fontWeight:700,color:'#2e4a22',marginBottom:8}}>{selDate.slice(5).replace('-','/')} {selDate===today?'（今天）':''}</div>
            {selMilestone&&<div style={{fontSize:12,color:'#8a5010',background:'rgba(200,140,50,0.15)',borderRadius:8,padding:'4px 10px',marginBottom:6}}>📌 {selMilestone}</div>}
            {selLogs.map((item,i)=>(
              <div key={i} style={{fontSize:12,color:'#3a6028',display:'flex',alignItems:'center',gap:6,padding:'3px 0'}}>
                <span style={{color:DOT_COLOR[item.type]}}>{TYPE_ICON[item.type]}</span>
                <span>{TYPE_LABEL[item.type]}{item.r.note?`：${item.r.note}`:''}{item.r.skip?' (跳过)':''}</span>
              </div>
            ))}
            {selNotes.map((n,i)=>(
              <div key={i} style={{padding:'6px 0',borderTop:'1px solid rgba(200,140,50,0.15)',marginTop:3}}>
                {editNote&&editNote.idx===n.idx
                  ?<div>
                    <textarea className="input" rows={2} style={{resize:'vertical',lineHeight:1.6,marginBottom:6,fontSize:12}} value={editText} onChange={e=>setEditText(e.target.value)}/>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-green" style={{flex:1,padding:'7px',fontSize:12}} onClick={saveEditNote}>✓ 保存</button>
                      <button className="btn btn-gray" style={{flex:1,padding:'7px',fontSize:12}} onClick={()=>{setEditNote(null);setEditText('');}}>取消</button>
                    </div>
                  </div>
                  :<div style={{display:'flex',alignItems:'flex-start',gap:6}}>
                    <span style={{color:'#d08030',fontSize:13,flexShrink:0}}>📝</span>
                    <span style={{fontSize:12,color:'#7a4a10',flex:1,lineHeight:1.7}}>{n.text}</span>
                    <div style={{display:'flex',gap:3,flexShrink:0}}>
                      <button style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#7a9060',padding:'0 3px'}} onClick={()=>startEditNote(n)}>✏️</button>
                      <button style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#9a8878',padding:'0 3px'}} onClick={()=>deleteNote(n.idx)}>🗑️</button>
                    </div>
                  </div>
                }
              </div>
            ))}
            {selLogs.length===0&&selNotes.length===0&&!selMilestone&&<div style={{fontSize:11,color:'#9aaa88',marginBottom:6}}>暂无记录</div>}
            {/* 添加备注 */}
            {showNoteInput
              ?<div style={{marginTop:8}}>
                <textarea className="input" rows={2} style={{resize:'vertical',lineHeight:1.6,marginBottom:7}} placeholder="输入备注…" value={noteText} onChange={e=>setNoteText(e.target.value)}/>
                <div style={{display:'flex',gap:7}}>
                  <button className="btn btn-green" style={{flex:1,padding:'8px'}} onClick={saveNote}>✓ 保存</button>
                  <button className="btn btn-gray" style={{flex:1,padding:'8px'}} onClick={()=>{setShowNoteInput(false);setNoteText('');}}>取消</button>
                </div>
              </div>
              :<button className="btn btn-gray" style={{width:'100%',marginTop:7,padding:'8px'}} onClick={()=>setShowNoteInput(true)}>＋ 添加备注</button>
            }
          </div>
        )}
        {!selDate&&<div style={{textAlign:'center',padding:'20px 0',color:'#9aaa88',fontSize:12}}>📅 点击日期查看记录或添加备注</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// 8. 植物详情页（全屏）
// ═══════════════════════════════════════════════
function PlantDetail({plantId,onClose,onEdit,onOpenLog,onOpenCal,onArchive,onDelete}){
  const{db,updateDb,toast}=useApp();
  const plant=db.plants.find(p=>p.id===plantId);
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);
  if(!plant)return null;

  const st=STATUS_MAP[plant.status]||STATUS_MAP.healthy;
  const src=SRCS.find(s=>s.key===plant.source);
  const alerts=careAlerts(plant);

  // 生长档案
  const tl=[];
  function addT(icon,label,date,note,color){if(date)tl.push({icon,label,date,note,color})}
  if(plant.source==='seed'){
    addT('🌱','播种',plant.sowDate,[plant.indoorStart?`环境：${plant.indoorStart==='indoor'?'室内':'室外'}`:'',plant.sowMethod?`方式：${plant.sowMethod}`:'',plant.seedSource?`种子来源：${plant.seedSource}`:''].filter(Boolean).join('\n'),'#5a8040');
    addT('🌿','发芽',plant.germDate,plant.germNotes||'','#6a9040');
  }
  if(['sapling','mature','bulb','other'].includes(plant.source))
    addT(src?.icon||'🛒','购入',plant.buyDate,[plant.buyFrom?`来源：${plant.buyFrom}`:'',plant.buySpec?`规格：${plant.buySpec}`:'',plant.buyPrice?`价格：${plant.buyPrice}`:''].filter(Boolean).join('\n'),'#5a7898');
  if(plant.source==='cutting'){
    addT('✂️','扦插',plant.opDate,[plant.indoorStart?`环境：${plant.indoorStart==='indoor'?'室内':'室外'}`:'',plant.buyFrom?`插穗来源：${plant.buyFrom}`:'',plant.opNotes?`备注：${plant.opNotes}`:''].filter(Boolean).join('\n'),'#7a6848');
    addT('🌱','生根/成活',plant.rootDate,'','#5a8040');
  }
  if(plant.source==='graft'){
    addT('🔗','嫁接',plant.opDate,[plant.indoorStart?`环境：${plant.indoorStart==='indoor'?'室内':'室外'}`:'',plant.buyFrom?`砧木来源：${plant.buyFrom}`:'',plant.opNotes?`备注：${plant.opNotes}`:''].filter(Boolean).join('\n'),'#7a6848');
    addT('✅','成活确认',plant.rootDate,'','#5a8040');
  }
  if(plant.source==='division')addT('🌾','分株',plant.opDate,[plant.buyFrom?`母株：${plant.buyFrom}`:'',plant.opNotes?`备注：${plant.opNotes}`:''].filter(Boolean).join('\n'),'#7a6848');
  if(plant.hardeningDate&&plant.indoorStart==='indoor'){
    const hd=daysSince(plant.hardeningDate),tgt=plant.hardeningDays||7,done=hd>=tgt;
    addT('🌤️',`炼苗${done?'（完成）':'（进行中）'}`,plant.hardeningDate,[`计划${tgt}天${done?'':`,已${hd}天`}`,plant.hardeningNotes?`备注：${plant.hardeningNotes}`:''].filter(Boolean).join('\n'),'#8a7a30');
  }
  addT('🪴','假植',plant.prePlantDate,plant.prePlantNotes||'','#5a9068');
  addT('🔄','移栽',plant.transplantDate,plant.transplantNotes?`备注：${plant.transplantNotes}`:'','#5a9888');

// 9. 植物表单页（全屏，三tab）
// ═══════════════════════════════════════════════
function useSwipeBack(onBack){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current||document.documentElement;
    let sx=0,sy=0;
    const ts=e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;};
    const te=e=>{
      const dx=e.changedTouches[0].clientX-sx;
      const dy=Math.abs(e.changedTouches[0].clientY-sy);
      if(dx>60&&dy<80&&sx<30){
        // 阻止冒泡，防止 useTabSwipe 同时响应
        e.stopPropagation();
        onBack();
      }
    };
    el.addEventListener('touchstart',ts,{passive:true});
    // touchend 不能 passive 才能 stopPropagation
    el.addEventListener('touchend',te);
    return()=>{el.removeEventListener('touchstart',ts);el.removeEventListener('touchend',te);};
  },[onBack]);
  return ref;
}

// 月历容器横划翻月 hook
function useSwipeMonth(onPrev, onNext){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    let sx=0, sy=0;
    const ts = e=>{sx=e.touches[0].clientX; sy=e.touches[0].clientY;};
    const te = e=>{
      const dx=e.changedTouches[0].clientX-sx;
      const dy=Math.abs(e.changedTouches[0].clientY-sy);
      if(Math.abs(dx)>50 && Math.abs(dx)>dy*1.5){
        // 阻止冒泡，防止 useTabSwipe 同时响应
        e.stopPropagation();
        if(dx<0) onNext(); else onPrev();
      }
    };
    el.addEventListener('touchstart',ts,{passive:true});
    // touchend 不能 passive，才能 stopPropagation
    el.addEventListener('touchend',te);
    return()=>{el.removeEventListener('touchstart',ts); el.removeEventListener('touchend',te);};
  },[onPrev,onNext]);
  return ref;
}

// 四个主 Tab 横划切换 hook
function useTabSwipe(tabs,currentTab,setTab){
  useEffect(()=>{
    let sx=0,sy=0;
    const ts=e=>{
      if(document.querySelector('.fullpage'))return;
      sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    };
    const te=e=>{
      if(document.querySelector('.fullpage'))return;
      const dx=e.changedTouches[0].clientX-sx;
      const dy=Math.abs(e.changedTouches[0].clientY-sy);
      if(Math.abs(dx)<60||dy>Math.abs(dx)*0.8)return;
      const idx=tabs.indexOf(currentTab);
      if(dx<0&&idx<tabs.length-1)setTab(tabs[idx+1]);
      if(dx>0&&idx>0)setTab(tabs[idx-1]);
    };
    document.addEventListener('touchstart',ts,{passive:true});
    document.addEventListener('touchend',  te,{passive:true});
    return()=>{document.removeEventListener('touchstart',ts); document.removeEventListener('touchend',te);};
  },[currentTab,tabs,setTab]);
}

// 分类筛选 Chip（长按可编辑，定义在外部避免 iOS 重建）
function CatChip({item,active,onTap,onLongPress}){
  const timerRef=useRef(null);
  function handleTouchStart(e){
    if(!onLongPress)return;
    timerRef.current=setTimeout(()=>{
      timerRef.current=null;
      // 清除系统文字选区
      window.getSelection?.()?.removeAllRanges();
      onLongPress();
    },600);
  }
  function handleTouchEnd(){
    if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
  }
  return(
    <button
      className={`cat-chip${active?' active':''}`}
      style={{WebkitUserSelect:'none',userSelect:'none',WebkitTouchCallout:'none'}}
      onClick={onTap}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
      onTouchCancel={handleTouchEnd}>
      {item.label}
    </button>
  );
}

function PlantsTab({jumpPlantId,onJumpDone}){
  const{db,updateDb,toast,setTab}=useApp();
  const[search,setSearch]=useState('');
  const[filterCat,setFilter]=useState('all');
  const[sortBy,setSortBy]=useState('entry');
  const[sortDir,setSortDir]=useState(-1); // 1=正序 -1=倒序；默认按添加时间倒序
  const[view,setView]=useState(null);
  const[catEdit,setCatEdit]=useState(null); // {id,newName} 分类编辑弹窗
  const listRef=useRef(null);
  const savedScroll=useRef(0);
  const returnTabRef=useRef(null);

  // 从日历跳转过来时自动打开详情
  useEffect(()=>{
    if(jumpPlantId){
      const id=jumpPlantId.id||jumpPlantId;
      const rt=jumpPlantId.returnTab||null;
      const lt=jumpPlantId.logType||null;
      returnTabRef.current=rt;
      if(lt){
        setView({type:'log',plantId:id,logType:lt,returnTab:rt});
      } else {
        setView({type:'detail',id});
      }
      if(onJumpDone)onJumpDone();
    }
  },[jumpPlantId]);
  // 点底部 tab 图标时重置到列表
  useEffect(()=>{
    function onTabReset(e){if(e.detail==='plants'){returnTabRef.current=null;setView(null);window.scrollTo(0,0);}}
    window.addEventListener('tabReset',onTabReset);
    return()=>window.removeEventListener('tabReset',onTabReset);
  },[]);

  // 打开详情时保存滚动位置
  function openDetail(id){
    savedScroll.current=window.scrollY||0;
    setView({type:'detail',id});
  }
  // 关闭详情时恢复滚动位置，或返回来源tab
  function closeDetail(){
    if(returnTabRef.current){
      const rt=returnTabRef.current;
      returnTabRef.current=null;
      setTab(rt);
      return;
    }
    setView(null);
    setTimeout(()=>window.scrollTo(0,savedScroll.current),30);
  }

  function handleSort(key){
    if(sortBy===key) setSortDir(d=>d*-1);
    else{setSortBy(key);setSortDir(1);}
  }

  if(view?.type==='log')
    return<LogPage plantId={view.plantId} logType={view.logType} onClose={()=>{
      if(view.returnTab){setView(null);setTab(view.returnTab);}
      else setView({type:'detail',id:view.plantId});
    }}/>;
  if(view?.type==='cal')
    return<PlantCareCalendar plantId={view.id} onClose={()=>{returnTabRef.current=null;setView({type:'detail',id:view.id});}}/>;
  if(view?.type==='detail')
    return<PlantDetail
      plantId={view.id}
      onClose={closeDetail}
      onEdit={p=>setView({type:'form',plant:p})}
      onOpenLog={(pid,lt)=>setView({type:'log',plantId:pid,logType:lt})}
      onOpenCal={(pid)=>setView({type:'cal',id:pid})}
      onArchive={(pid)=>{
        if(!window.confirm('将此植物移入档案库？'))return;
        updateDb(prev=>({...prev,
          plants:prev.plants.filter(p=>p.id!==pid),
          archive:{...prev.archive,plants:[...(prev.archive.plants||[]),{...prev.plants.find(p=>p.id===pid),archivedAt:toDay()}]}
        }));
        toast.show('📦 已归档');closeDetail();
      }}
      onDelete={(pid)=>{
        if(!window.confirm('确认删除此植物？此操作不可撤销。'))return;
        updateDb(prev=>({...prev,plants:prev.plants.filter(p=>p.id!==pid)}));
        toast.show('🗑 已删除');closeDetail();
      }}/>;
  if(view?.type==='form')
    return<PlantForm initPlant={view.plant||null} onClose={()=>{
      // 编辑完成后回到详情或列表
      if(view.plant?.id) setView({type:'detail',id:view.plant.id});
      else setView(null);
    }}/>;

  const usedCats=[...new Set(db.plants.map(p=>p.category).filter(Boolean))];
  const allCats=[...new Set([...db.cats,...usedCats])];
  const q=search.trim().toLowerCase();

  // 过滤
  let filtered=db.plants.filter(p=>{
    const mQ=!q||p.name.toLowerCase().includes(q)||(p.variety||'').toLowerCase().includes(q)||(p.finalPlantLocation||'').toLowerCase().includes(q);
    const mC=filterCat==='all'||(filterCat==='__none__'&&!p.category)||p.category===filterCat;
    return mQ&&mC;
  });

  // 排序
  filtered=[...filtered].sort((a,b)=>{
    let r=0;
    if(sortBy==='name')      r=a.name.localeCompare(b.name,'zh');
    else if(sortBy==='category') r=(a.category||'').localeCompare(b.category||'');
    else if(sortBy==='planted')  r=(b.finalPlantDate||'').localeCompare(a.finalPlantDate||'');
    else if(sortBy==='location') r=(a.finalPlantLocation||'').localeCompare(b.finalPlantLocation||'','zh');
    else r=a.id.localeCompare(b.id); // entry
    return r*sortDir;
  });

  const SORT_BTNS=[{key:'entry',label:'录入'},{key:'name',label:'名称'},{key:'category',label:'类别'},{key:'planted',label:'定植'},{key:'location',label:'位置'}];

  return(
    <div className="tab-content">
      <div className="sticky-bar">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <h1>🪴 植物</h1>
          <span style={{background:'rgba(70,110,40,.75)',color:'white',padding:'3px 10px',borderRadius:16,border:'1px solid rgba(50,90,25,.5)',display:'inline-flex',alignItems:'baseline',gap:2}}>
            <span style={{fontSize:15,fontWeight:800,lineHeight:1}}>{db.plants.length}</span>
            <span style={{fontSize:11,fontWeight:700}}>株</span>
          </span>
        </div>
        <input className="input" style={{marginBottom:8}} placeholder="搜索植物名称、位置…" value={search} onChange={e=>setSearch(e.target.value)}/>
        {/* 排序行 */}
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'#8aaa78',whiteSpace:'nowrap',flexShrink:0}}>排序：</span>
          <div style={{display:'flex',gap:5,overflowX:'auto',scrollbarWidth:'none'}}>
            {SORT_BTNS.map(s=>{
              const act=sortBy===s.key;
              const arrow=act?(sortDir===1?' ↑':' ↓'):'';
              return<button key={s.key}
                style={{whiteSpace:'nowrap',flexShrink:0,padding:'3px 10px',borderRadius:20,fontSize:11,cursor:'pointer',fontFamily:'inherit',
                  background:act?'rgba(80,120,54,.82)':'rgba(180,210,160,.2)',
                  border:`1px solid ${act?'rgba(60,100,34,.8)':'rgba(150,185,130,.3)'}`,
                  color:act?'white':'#5a7848',fontWeight:act?700:400}}
                onClick={()=>handleSort(s.key)}>{s.label}{arrow}</button>;
            })}
          </div>
        </div>
        {/* 分类筛选 */}
        <div className="cat-strip" style={{padding:'6px 0 2px',margin:'0 -16px',paddingLeft:16,paddingRight:16}} onTouchStart={e=>e.stopPropagation()} onTouchEnd={e=>e.stopPropagation()}>
        {[{id:'all',label:`全部 (${db.plants.length})`,sys:true},
          ...allCats.filter(c=>db.plants.some(p=>p.category===c)).map(c=>({id:c,label:`${c} (${db.plants.filter(p=>p.category===c).length})`,sys:false})),
          db.plants.some(p=>!p.category)?{id:'__none__',label:`未分类 (${db.plants.filter(p=>!p.category).length})`,sys:true}:null,
        ].filter(Boolean).map(item=>(
          <CatChip key={item.id} item={item} active={filterCat===item.id}
            onTap={()=>setFilter(item.id)}
            onLongPress={item.sys?null:()=>window.__showCatEdit(
              item.id, item.id,
              (catId, newName)=>{
                updateDb(prev=>({...prev,
                  cats:prev.cats.map(c=>c===catId?newName:c),
                  plants:prev.plants.map(p=>p.category===catId?{...p,category:newName}:p),
                }));
                if(filterCat===catId)setFilter(newName);
                toast.show('✅ 分类已重命名');
              },
              (catId)=>{
                updateDb(prev=>({...prev,
                  cats:prev.cats.filter(c=>c!==catId),
                  plants:prev.plants.map(p=>p.category===catId?{...p,category:''}:p),
                }));
                if(filterCat===catId)setFilter('all');
                toast.show('🗑 分类已删除');
              }
            )}/>
        ))}
        </div>
        {/* 分类编辑弹窗 */}
        
      </div>{/* end sticky-bar */}
      <div className="plant-list" ref={listRef}>
        {filtered.length===0
          ?<div className="placeholder">
            <div className="placeholder-emoji">🪴</div>
            <div className="placeholder-title">{db.plants.length?'没有匹配的植物':'还没有植物'}</div>
            <div className="placeholder-desc">{db.plants.length?'换个搜索词试试？':'点击右下角 ＋ 添加第一株植物！'}</div>
          </div>
          :filtered.map(p=>{
            const st=STATUS_MAP[p.status]||STATUS_MAP.healthy;
            const alerts=careAlerts(p);
            const wd=daysSince(lastLog(p.waterLog));

            return(

                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:700,color:'#2e4a22',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {p.name}{p.variety&&<span style={{fontSize:13,fontWeight:400,color:'#5a7848',marginLeft:6}}>{p.variety}</span>}
                  </div>
                  <div style={{fontSize:12,color:'#7a9060',marginTop:3}}>
                    {[p.category,wd!=null?`💧${wd}天前`:null,fd!=null?`🌿${fd}天前`:null,p.finalPlantLocation?`📍${p.finalPlantLocation}`:null].filter(Boolean).join(' · ')}
                  </div>
                  {alerts.length>0&&<div style={{fontSize:12,color:'#c05020',marginTop:4}}>{alerts.map(a=>a.icon).join('')} {alerts.map(a=>a.label).join('  ')}</div>}
                </div>
                <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,marginTop:4,background:st.bg,border:`2px solid ${st.color}`}}/>
              </div>
            );
          })
        }
        {filtered.length>0&&<div style={{fontSize:11,color:'#9aaa88',textAlign:'center',marginTop:14,paddingBottom:8}}>共 {filtered.length}{filtered.length<db.plants.length?`/${db.plants.length}`:''} 株植物</div>}
      </div>
      <button className="fab" onClick={()=>setView({type:'form',plant:null})}>＋</button>
    </div>
  );
}

// 日历 Tab 工具函数
// ═══════════════════════════════════════════════
function parseIntervalMin(v){const n=parseInt(v);return(!n||n>900)?999:n;}
function getN(v){return v==null?0:v;}

const DOT_COLOR={water:'#5a8edc',fert:'#4aaa58',med:'#dc6440',note:'#d08030'};
const TYPE_ICON={water:'💧',fert:'🌿',med:'💊'};
const TYPE_LABEL={water:'浇水',fert:'施肥',med:'给药'};
const TYPE_COLOR={water:'rgba(80,140,220,0.85)',fert:'rgba(70,160,80,0.85)',med:'rgba(200,100,70,0.85)'};
const WK=['一','二','三','四','五','六','日'];

function wmoDesc(code){
  if(code<=1)return{cond:'晴天',emo:'☀️',rain:false};
  if(code<=3)return{cond:'多云',emo:'⛅',rain:false};
  if(code<=49)return{cond:'有雾',emo:'🌫️',rain:false};
  if(code<=67)return{cond:'降雨',emo:'🌧️',rain:true};
  if(code<=77)return{cond:'降雪',emo:'❄️',rain:false};
  if(code<=82)return{cond:'阵雨',emo:'🌦️',rain:true};
  return{cond:'雷雨',emo:'⛈️',rain:true};
}

// 构建 dotMap：{ 'YYYY-MM-DD': [{type,plan,skip},...] }
function buildDotMap(plants){
  const today=toDay();
  const todPts=today.split('-');
  const todObj=new Date(+todPts[0],+todPts[1]-1,+todPts[2]);
  const map={};
  function addLog(ds,type,skip){
    if(!map[ds])map[ds]=[];
    map[ds]=map[ds].filter(x=>x.type!==type);
    map[ds].push({type,skip:!!skip,plan:false});
  }
  function addPlan(ds,type){
    if(!map[ds])map[ds]=[];
    if(!map[ds].find(x=>x.type===type))map[ds].push({type,plan:true,skip:false});
  }
  plants.forEach(p=>{
    ['water','fert','med'].forEach(type=>{
      const log=type==='water'?p.waterLog:type==='fert'?p.fertLog:p.medLog;
      (log||[]).forEach(r=>addLog(r.date,type,r.skip));
    });
    (p.noteLog||[]).forEach(r=>addLog(r.date,'note',false));
    // 计划点
    function planDots(lastDate,interval,type,maxCount){
      if(!interval||interval>=900)return;
      if(maxCount!=null&&maxCount<=0)return;
      const base=lastDate?(()=>{const pts=lastDate.split('-');return new Date(+pts[0],+pts[1]-1,+pts[2]);})():todObj;
      let added=0;
      for(let n=1;n<=60;n++){
        const d=new Date(base);d.setDate(base.getDate()+interval*n);
        const dObj=new Date(d.getFullYear(),d.getMonth(),d.getDate());
        let ds;
        if(dObj<=todObj){
          const next=new Date(base);next.setDate(base.getDate()+interval*(n+1));
          const nextObj=new Date(next.getFullYear(),next.getMonth(),next.getDate());
          if(nextObj>todObj)ds=today; else continue;
        } else {
          ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        }
        addPlan(ds,type);
        added++;
        if(maxCount!=null&&added>=maxCount)break;
      }
    }
    if(!getIsPaused(p,'water'))planDots(getEffLogDate(p,'water'),parseIntervalMin(p.wi),'water');
    if(!getIsPaused(p,'fert'))planDots(getEffLogDate(p,'fert'),parseIntervalMin(p.fi),'fert');
    // 给药计划点：只有存在活跃疗程且未完成时才投射，最多投射剩余次数
    if(p.activeCourse){
      const info=medCourseInfo(p);
      if(!info.done)planDots(lastLog(p.medLog),parseIntervalMin(p.activeCourse.interval),'med',info.remain);
    }
  });
  return map;
}

// 日历 Tab 组件
// ═══════════════════════════════════════════════
function CalendarTab(){
  const{db,updateDb,toast}=useApp();
  const today=toDay();
  const todayD=new Date();todayD.setHours(0,0,0,0);

  // 天气
  const[weather,setWeather]=useState({temp:null,hum:null,cond:'加载中',emo:'⛅',rain:false,tip:'',fc:[],upd:''});
  useEffect(()=>{
    // 加入 hourly 降水量，用当前小时段数据判断实际是否在下雨，比 current.precipitation 更及时
    fetch('https://api.open-meteo.com/v1/forecast?latitude=49.1042&longitude=-122.8231&current=temperature_2m,relative_humidity_2m,precipitation,weather_code&hourly=precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=America/Vancouver&forecast_days=3')
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        const wi=wmoDesc(c.weather_code);
        const tMax=d.daily?.temperature_2m_max||[];
        const tMin=d.daily?.temperature_2m_min||[];
        const codes=d.daily?.weather_code||[];
        // 用 hourly 降水量判断当前是否真的在下雨（取当前时间对应的整点）
        const now=new Date();
        const hrTimes=d.hourly?.time||[];
        const hrPrec=d.hourly?.precipitation||[];
        const nowHrStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}T${String(now.getHours()).padStart(2,'0')}:00`;
        const hrIdx=hrTimes.indexOf(nowHrStr);
        // 取当前和后1小时的降水量，任一>0.1mm 视为有降水
        const curPrec=hrIdx>=0?hrPrec[hrIdx]||0:c.precipitation||0;
        const nextPrec=hrIdx>=0&&hrIdx+1<hrPrec.length?hrPrec[hrIdx+1]||0:0;
        const actualRain=curPrec>0.1||nextPrec>0.1;
        // 用实际降水而非 weather_code 判断是否在下雨
        const isRaining=actualRain;
        const condLabel=actualRain?'降雨':wi.cond;
        const condEmo=actualRain?'🌧️':wi.emo;
        let tip='';
        if(isRaining||c.precipitation>1)tip='今日有降水，注意减少浇水';
        else if(c.relative_humidity_2m>80)tip=`湿度偏高（${c.relative_humidity_2m}%），浇水适量即可`;
        else if(Math.round(c.temperature_2m)>30)tip='气温偏高，注意防晒遮阴';
        else if(Math.round(c.temperature_2m)<5)tip='气温偏低，注意防寒保温';
        else tip='天气适宜，可按常规养护计划进行';
        setWeather({
          temp:Math.round(c.temperature_2m),hum:c.relative_humidity_2m,
          cond:condLabel,emo:condEmo,rain:isRaining,tip,
          fc:codes.slice(0,3).map((code,i)=>{const fi=wmoDesc(code);return{d:['今天','明天','后天'][i],e:fi.emo,t:fi.cond,hi:tMax[i]!=null?Math.round(tMax[i]):null,lo:tMin[i]!=null?Math.round(tMin[i]):null};}),
          upd:`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`,
        });
      }).catch(()=>setWeather(w=>({...w,cond:'获取失败',upd:''})));
  },[]);

  // 天气展开
  const[weatherExp,setWeatherExp]=useState(false);
  useEffect(()=>{
    function onTabReset(e){
      if(e.detail==='calendar'){
        var ol=document.getElementById('__ql_overlay');
        if(ol&&ol.parentNode)ol.parentNode.removeChild(ol);
      }
    }
    window.addEventListener('tabReset',onTabReset);
    return()=>window.removeEventListener('tabReset',onTabReset);
  },[]);

  // 跳转到植物详情（切换到植物 Tab）
  const{navToPlant}=useApp();

  // 日历展开/折叠
  const[calExp,setCalExp]=useState(false);
  const[calYr,setCalYr]=useState(()=>new Date().getFullYear());
  const[calMo,setCalMo]=useState(()=>new Date().getMonth());
  const[calSel,setCalSel]=useState(null);

  // 月份导航
  function navMo(dir){
    let m=calMo+dir,y=calYr;
    if(m<0){m=11;y--;}else if(m>11){m=0;y++;}
    setCalMo(m);setCalYr(y);
  }

  const dotMap=buildDotMap(db.plants);

  // 渲染小圆点
  function DotRow({ds}){
    const entries=dotMap[ds]||[];
    if(!entries.length)return null;
    const seen={};
    entries.forEach(e=>{
      if(!seen[e.type])seen[e.type]=e;
      else{const rank=x=>x.plan?0:x.skip?1:2;if(rank(e)>rank(seen[e.type]))seen[e.type]=e;}
    });
    return <div style={{display:'flex',gap:2,justifyContent:'center',marginTop:2}}>
      {['water','fert','med','note'].map(t=>{
        const e=seen[t];if(!e)return null;
        const col=DOT_COLOR[t];
        return <div key={t} style={{width:5,height:5,borderRadius:'50%',
          background:e.plan||e.skip?'transparent':col,
          border:e.plan||e.skip?`1.5px solid ${col}`:'none',
          opacity:e.plan?0.55:1}}/>;
      })}
    </div>;
  }

  // 本周行（折叠时）
  function WeekRow(){
    const todayObj=new Date(todayD);
    const ws=new Date(todayObj);ws.setDate(todayObj.getDate()-((todayObj.getDay()+6)%7));
    return <div style={{display:'flex',gap:4}}>
      {Array.from({length:7},(_,i)=>{
        const d=new Date(ws);d.setDate(ws.getDate()+i);
        const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const isT=ds===today;
        return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
          <div style={{fontSize:10,color:isT?'#2e7a1e':'#9aaa88'}}>{WK[(d.getDay()+6)%7]}</div>
          <div style={{width:30,height:30,borderRadius:'50%',background:isT?'rgba(70,160,70,0.85)':'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:isT?15:13,fontWeight:isT?800:400,color:isT?'white':'#2e4a22',lineHeight:1}}>
            {d.getDate()}
          </div>
          <DotRow ds={ds}/>
        </div>;
      })}
    </div>;
  }

  // 月历格（展开时）
  function MonthGrid(){
    const first=new Date(calYr,calMo,1);
    const startOff=(first.getDay()+6)%7;
    const daysInMonth=new Date(calYr,calMo+1,0).getDate();
    const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const prev=useCallback(()=>navMo(-1),[calMo,calYr]);
    const next=useCallback(()=>navMo(1),[calMo,calYr]);
    const swRef=useSwipeMonth(prev,next);
    return <>
      <div ref={swRef} style={{touchAction:'pan-y'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#5a8040',padding:'2px 8px',lineHeight:1}} onClick={prev}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:'#2e4a22'}}>{calYr}年 {MN[calMo]}</span>
        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#5a8040',padding:'2px 8px',lineHeight:1}} onClick={next}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
        {WK.map(w=><div key={w} style={{textAlign:'center',fontSize:10,color:'#9aaa88',padding:'2px 0'}}>{w}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:10}}>
        {Array.from({length:startOff},(_,i)=><div key={'e'+i}/>)}
        {Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1;
          const ds=calYr+'-'+String(calMo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
          const isT=ds===today,isSel=calSel===ds;
          const hasDots=(dotMap[ds]||[]).length>0;
          return <div key={day}
            style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2px 0',
              cursor:hasDots?'pointer':'default',borderRadius:8,
              background:isSel?'rgba(140,185,110,0.4)':'transparent'}}
            onClick={()=>hasDots&&setCalSel(s=>s===ds?null:ds)}>
            <div style={{width:28,height:28,borderRadius:'50%',
              background:isT?'rgba(70,160,70,0.85)':'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:isT?14:12,fontWeight:isT?800:400,color:isT?'white':'#2e4a22'}}>
              {day}
            </div>
            <DotRow ds={ds}/>
          </div>;
        })}
      </div>
      {calSel&&<SelDayDetail ds={calSel}/>}
      </div>
    </>;
  }

  // 选中日详情
  function SelDayDetail({ds}){
    const entries=dotMap[ds]||[];
    const plantLines=[];
    entries.forEach(e=>{
      if(e.type==='note')return;
      db.plants.forEach(p=>{
        const log=e.type==='water'?p.waterLog:e.type==='fert'?p.fertLog:p.medLog;
        if(e.plan){
          let courseRemain=null;
          if(e.type==='med'){
            if(!p.activeCourse)return;
            const info=medCourseInfo(p);
            if(info.done)return;
            courseRemain=info.remain;
          }
          const interval=e.type==='water'?parseIntervalMin(p.wi):e.type==='fert'?parseIntervalMin(p.fi):parseIntervalMin(p.activeCourse?.interval);
          const llog=lastLog(log);if(!interval||interval>=900)return;
          const base=llog?(()=>{const pts=llog.split('-');return new Date(+pts[0],+pts[1]-1,+pts[2]);})():todayD;
          const selT=(()=>{const pts=ds.split('-');return new Date(+pts[0],+pts[1]-1,+pts[2]);})();
          const diff=Math.round((selT-base)/86400000);
          if(diff>0&&diff%interval===0&&(courseRemain==null||Math.round(diff/interval)<=courseRemain))
            plantLines.push({name:p.name,type:e.type,plan:true});
        } else {
          (log||[]).forEach(r=>{if(r.date===ds)plantLines.push({name:p.name,type:e.type,skip:r.skip});});
        }
      });
    });
    const noteLines=[];
    db.plants.forEach(p=>(p.noteLog||[]).forEach(n=>{if(n.date===ds)noteLines.push({name:p.name,text:n.text});}));
    const seen={};
    const deduped=plantLines.filter(l=>{const k=l.name+'|'+l.type;if(seen[k])return false;seen[k]=true;return true;});
    const total=deduped.length+noteLines.length;
    return <div style={{background:'rgba(240,248,235,0.8)',borderRadius:10,padding:'10px 12px',border:'1px solid rgba(140,180,110,0.3)'}}>
      <div style={{fontSize:12,fontWeight:700,color:'#2e4a22',marginBottom:6}}>
        {ds.slice(5).replace('-','/')}　{total>0?`共${total}项`:''}
      </div>
      {deduped.map((l,i)=>{
        const col=DOT_COLOR[l.type]||'#888';
        const suffix=l.skip?' (跳过)':l.plan?' (计划)':'';
        return <div key={i} style={{fontSize:12,color:'#3a6028',display:'flex',alignItems:'center',gap:6,padding:'2px 0'}}>
          <span style={{color:col}}>{TYPE_ICON[l.type]||'●'}</span>
          <span>{l.name}<span style={{color:'#9aaa88',fontSize:11}}>{suffix}</span></span>
        </div>;
      })}
      {noteLines.map((n,i)=><div key={'n'+i} style={{fontSize:12,color:'#7a4a10',display:'flex',alignItems:'flex-start',gap:6,padding:'3px 0',borderTop:'1px solid rgba(208,128,48,0.15)',marginTop:2}}>
        <span style={{color:'#d08030',flexShrink:0}}>📝</span>
        <span><span style={{color:'#9aaa88',fontSize:11}}>{n.name}　</span>{n.text}</span>
      </div>)}
      {!total&&<div style={{fontSize:11,color:'#9aaa88'}}>暂无匹配记录</div>}
    </div>;
  }

  // 任务列表
  function buildTasks(){
    const overdue=[],todayT=[],soon1=[],soon2=[],soon3=[],unlogged=[],paused=[];
    db.plants.forEach(p=>{
      ['water','fert'].forEach(type=>{
        const interval=type==='water'?parseIntervalMin(p.wi):parseIntervalMin(p.fi);
        if(interval>=900)return;
        if(getIsPaused(p,type)){
          const pause=type==='water'?p.waterPause:p.fertPause;
          paused.push({type,plant:p,pause});
          return;
        }
        const ld=getEffLogDate(p,type);
        const ds=ld!=null?daysSince(ld):null;
        if(ds===null){unlogged.push({type,plant:p});return;}
        const due=interval-ds;
        if(due<0)overdue.push({type,plant:p,overdueDays:-due});
        else if(due===0)todayT.push({type,plant:p});
        else if(due===1)soon1.push({type,plant:p});
        else if(due===2)soon2.push({type,plant:p});
        else if(due===3)soon3.push({type,plant:p});
      });
    });
    overdue.sort((a,b)=>b.overdueDays-a.overdueDays);
    return{overdue,todayT,soon1,soon2,soon3,unlogged,paused};
  }

  function skipTask(pid,type){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==pid)return p;
      const key=type==='water'?'waterLog':'fertLog';
      return{...p,[key]:[...(p[key]||[]),{date:toDay(),skip:true,note:'跳过'}]};
    })}));
    toast.show('⏭ 已跳过一次');
  }

  // 快捷记录（直接记今天，不打开日志页）
  function quickRecord(pid,type){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==pid)return p;
      const key=type==='water'?'waterLog':'fertLog';
      const pauseKey=type==='water'?'waterPause':'fertPause';
      const arr=[...(p[key]||[]),{date:toDay(),note:''}];
      arr.sort((a,b)=>a.date.localeCompare(b.date));
      return{...p,[key]:arr,[pauseKey]:null}; // 记录操作自动解除暂停
    })}));
    toast.show(TYPE_ICON[type]+' 已记录'+TYPE_LABEL[type]);
  }

  // 暂停任务（通过 window 暴露给 vanilla JS 菜单调用）
  // 每次渲染更新引用，避免 stale closure
  window.__pauseTask=function(pid,type,endDate){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==pid)return p;
      const pauseKey=type==='water'?'waterPause':'fertPause';
      return{...p,[pauseKey]:{start:toDay(),end:endDate||null}};
    })}));
    var msg=endDate?('⏸ 暂停至 '+endDate.slice(5).replace('-','/')):' ⏸ 已无限期暂停';
    toast.show(msg);
  };
  window.__skipTask=function(pid,type){skipTask(pid,type);};

  // 从任务页恢复暂停：清除 pause 并写入 skip 日志作为新周期起点
  function resumePauseInTask(pid,type){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==pid)return p;
      const pauseKey=type==='water'?'waterPause':'fertPause';
      return{...p,[pauseKey]:null};
    })}));
    toast.show('▶ 已恢复护理');
  }

  function PausedChip({t}){
    const endLabel=t.pause&&t.pause.end?('至 '+fmtDate(t.pause.end)):'无限期';
    return <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(200,215,240,0.35)',borderRadius:12,padding:'10px 12px',border:'1px solid rgba(100,140,210,0.25)'}}>
      <span style={{fontSize:18}}>{TYPE_ICON[t.type]}</span>
      <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>navToPlant(t.plant.id,'calendar')}>
        <div style={{fontSize:14,fontWeight:600,color:'#2e4a22',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.plant.name}{t.plant.variety?' · '+t.plant.variety:''}</div>
        <div style={{fontSize:11,color:'#5a78a8',marginTop:2}}>{'⏸ 暂停中  ' + endLabel}</div>
      </div>
      <button onClick={()=>resumePauseInTask(t.plant.id,t.type)}
