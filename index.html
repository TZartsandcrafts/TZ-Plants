function q(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function td(){return new Date().toISOString().slice(0,10);}
function ds(d){if(!d)return null;var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/);var dt=m?new Date(+m[1],+m[2]-1,+m[3]):new Date(d.replace(/-/g,'/'));return Math.floor((Date.now()-dt)/86400000);}
function fmt(d){if(!d)return"—";return d.replace(/-/g,'/');}
function ld(log){return log&&log.length?log[log.length-1].date:null;}
var AI_R=[{k:["多肉","仙人掌"],w:10,f:30},{k:["玫瑰","月季"],w:2,f:10},{k:["薄荷","香草"],w:2,f:14},{k:["蝴蝶兰","兰花"],w:7,f:14},{k:["橡皮树","龟背竹"],w:5,f:21},{k:["绿萝","吊兰"],w:3,f:14},{k:["番茄","辣椒"],w:1,f:7}];
function autoInt(n){for(var i=0;i<AI_R.length;i++){var r=AI_R[i];for(var j=0;j<r.k.length;j++){if(n.indexOf(r.k[j])>=0)return{wi:r.w,fi:r.f};}}return{wi:3,fi:14};}

function getStage(p){
if(p.finalPlantDate)return "established";
if(p.transplantDate)return "transplanted";
if(p.hardeningDate&&p.indoorStart==="indoor")return "hardening";
if(p.source==="seed"){if(p.germDate)return "seedling";if(p.sowDate)return "germinating";}
if(p.source==="cutting"||p.source==="graft"){if(p.rootDate)return "rooted";if(p.opDate)return "rooting";}
if(p.source==="division"&&p.opDate&&!p.prePlantDate)return "recovering";
return "established";
}

function buildAdvice(p){
var temp=W.temp,hum=W.hum,pre=W.pre,rain=W.rain;
var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
var st=getStage(p),L=[];
var SL={germinating:"📍 播种期",rooting:"📍 扦插/嫁接生根期",rooted:"📍 已生根待移栽",seedling:"📍 幼苗期",recovering:"📍 分株恢复期",transplanted:"📍 移栽适应期",hardening:"📍 炼苗期"};
if(SL[st])L.push(SL[st]);
if(st==="germinating")L.push("💧 保持基质微湿，用喷壶轻喷");
else if((wd==null?999:wd)>=p.wi)L.push(rain||pre>3?"💧 今日有雨，可少量补水":hum>80?"💧 湿度"+hum+"%，建议减少浇水":"💧 该浇水了");
else L.push("💧 距下次浇水约"+(p.wi-wd)+"天");
if(st==="germinating"||st==="rooting")L.push("🌿 生长期前禁止施肥");
else if((fd==null?999:fd)>=p.fi)L.push(temp<10?"🌿 气温偏低，可暂缓施肥":"🌿 可以施肥了，晴天效果好");
else L.push("🌿 距下次施肥约"+(p.fi-fd)+"天");
return L.join("\n");
}

html+='<div style="margin-top:10px;display:flex;justify-content:center;gap:8px"><button onclick="S.showLib=true;S.libTab=\'fert\';render()" style="padding:3px 14px;border-radius:20px;font-size:12px;background:rgba(150,195,130,0.2)">🌿 肥料库</button><button onclick="S.showLib=true;S.libTab=\'med\';render()" style="padding:3px 14px;border-radius:20px;font-size:12px;background:rgba(210,160,130,0.2)">💊 药品库</button></div></div>';
html+='<div style="background:rgba(255,255,255,0.6);border:1px solid rgba(150,185,130,0.5);border-radius:18px;padding:17px;margin-bottom:18px">';
html+='<div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;color:#6a8a5a">📍 '+W.loc+'</div><div style="font-size:31px;color:#2e4a22">'+W.emo+' '+W.temp+'°C</div></div><div style="text-align:right;font-size:12px;color:#6a8858">湿度 '+W.hum+'%<br>更新：'+W.upd+'</div></div>';
html+='<div style="margin-top:10px;background:rgba(175,210,155,0.3);border-radius:8px;padding:7px 12px;font-size:12px;color:#4a6838">💡 '+q(W.tip)+'</div></div>';
html+='<div style="margin-bottom:15px"><input id="search_inp" oninput="S.search=this.value;render()" value="'+q(S.search)+'" placeholder="搜索名称、品种、位置..." style="'+FS+'"></div>';
html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><span style="font-size:11px;color:#6a8858">我的植物 ('+list.length+')</span><button onclick="S.showAdd=true;render()" style="padding:6px 15px;border-radius:20px;background:rgba(160,200,135,0.3);border:1px solid rgba(130,175,105,0.5);font-size:12px;color:#2e4a22">'+(S.showAdd?'✕ 取消':'+ 添加植物')+'</button></div>';

if(S.showAdd){
html+='<div style="background:white;padding:15px;border-radius:15px;border:1px solid rgba(150,185,130,0.4);margin-bottom:15px"><label style="font-size:10px;color:#6a8858">植物名称 *</label><input id="name_inp" style="'+FS+'" placeholder="输入名称...">';
html+='<div style="display:flex;gap:8px;margin-top:15px"><button onclick="savePlant()" style="flex:1;padding:12px;background:#6a8858;color:white;border:none;border-radius:10px;font-weight:700">保存</button><button onclick="S.showAdd=false;render()" style="flex:1;padding:12px;background:#eee;border-radius:10px">取消</button></div></div>';
}

if(list.length===0 && !S.showAdd) html+='<div style="text-align:center;padding:50px 0;color:#8a9e78">🪴<br>还没有植物</div>';
else for(var k=0;k<list.length;k++){
var p=list[k];
html+='<div style="background:rgba(255,255,255,0.6);padding:17px;border-radius:16px;margin-bottom:15px;border:1px solid rgba(150,185,130,0.4)">';
html+='<div style="display:flex;justify-content:space-between"><strong>'+q(p.name)+'</strong><button onclick="S.plants.splice('+k+',1);storePlants();render()" style="background:none;border:none;color:#ccc">✕</button></div>';
html+='<div style="background:rgba(180,210,160,0.3);padding:10px;border-radius:10px;margin:12px 0;font-size:13px;white-space:pre-line">'+q(buildAdvice(p))+'</div>';
html+='<div style="display:flex;gap:8px"><button onclick="S.logPlantId=\''+p.id+'\';S.logType=\'water\';render()" style="flex:1;padding:10px;border-radius:10px;background:rgba(180,215,160,0.3);border:none;font-size:12px">💧 浇水</button><button onclick="S.logPlantId=\''+p.id+'\';S.logType=\'fert\';render()" style="flex:1;padding:10px;border-radius:10px;background:rgba(180,215,160,0.3);border:none;font-size:12px">🌿 施肥</button></div></div>';
}
if(S.showLib){
html+='<div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;z-index:99" onclick="if(event.target===this)S.showLib=false;render()"><div style="background:#f4f7f2;width:100%;height:80vh;border-radius:20px 20px 0 0;padding:20px;overflow-y:auto">';
html+='<div style="display:flex;justify-content:space-between"><h2>养护库</h2><button onclick="S.showLib=false;render()">✕</button></div>';
var db=S.libTab==='fert'?FERT_DB:MED_DB;
for(var m=0;m<db.length;m++)html+='<div style="background:white;padding:12px;border-radius:10px;margin:10px 0"><strong>'+db[m].icon+' '+db[m].name+'</strong><div style="font-size:11px;color:#666">'+db[m].desc+'</div></div>';
html+='</div></div>';
}
html+='</div>';
return html;
}

function savePlant(){
var name=document.getElementById('name_inp').value;
if(!name){alert("请输入名称");return;}
S.plants.push(Object.assign({},BLANK,{id:Date.now().toString(),name:name}));
S.showAdd=false;storePlants();render();
}

render();
</script>
</body>
</html>
