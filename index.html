function getStage(p){

else L.push(“🌿 距下次施肥约”+(p.fi-fd)+“天”);
var lm=ld(p.medLog);
if(p.medMode===“symptom”){if(lm)L.push(“💊 上次给药：”+ds(lm)+“天前（点击记录新症状）”);else L.push(“💊 出现病虫害时点击记录给药”);}
if(st===“hardening”){var hd2=p.hardeningDate?ds(p.hardeningDate):0;var left=Math.max(0,(p.hardeningDays||7)-hd2);L.push(left>0?“🌤️ 炼苗进度：”+hd2+”/”+(p.hardeningDays||7)+“天，还需约”+left+“天”:“✅ 炼苗完成，可移栽或定植！”);}
if(hum<30)L.push(“💦 空气干燥，可向叶面喷水”);
if(temp>32)L.push(“🌡️ 高温，注意遮阴”);
if(temp<5)L.push(“🧣 低温，移入室内防冻”);
return L.join(”\n”);
}

return ‘<div style="position:fixed;inset:0;background:rgba(50,80,30,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeCal()"><div style="background:#f0f5ec;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden"><div style="padding:14px 18px 10px;border-bottom:1px solid rgba(150,185,130,0.3);display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:700;color:#2e4a22">📅 ‘+q(plant.name)+’ · 操作日历</span><button onclick="closeCal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#7a9868">✕</button></div><div style="flex:1;overflow-y:auto"><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 18px"><button onclick="calPrev()" style="background:none;border:none;cursor:pointer;font-size:24px;color:#5a8040;padding:0 8px">‹</button><span style="font-size:14px;font-weight:700;color:#2e4a22">’+yr+‘年 ‘+MN[mo]+’</span><button onclick="calNext()" style="background:none;border:none;cursor:pointer;font-size:24px;color:#5a8040;padding:0 8px">›</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;margin-bottom:4px">’+[‘日’,‘一’,‘二’,‘三’,‘四’,‘五’,‘六’].map(function(d){return ‘<div style="text-align:center;font-size:10px;color:#8aaa78;padding:2px 0">’+d+’</div>’;}).join(’’)+’</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px 12px">’+cells+’</div><div style="display:flex;gap:10px;padding:0 16px 10px;flex-wrap:wrap">’+legend+’</div>’+selHtml+’</div></div></div>’;
}

function buildApp(){
var urgent=S.plants.filter(function(p){var w=ds(ld(p.waterLog)),f=ds(ld(p.fertLog));return(w==null?999:w)>=p.wi||(f==null?999:f)>=p.fi;}).length;
var usedCats=[];S.plants.forEach(function(p){if(p.category&&usedCats.indexOf(p.category)<0)usedCats.push(p.category);});
var list=S.plants.slice();
if(S.filterCat!==‘all’)list=list.filter(function(p){return p.category===S.filterCat;});
if(S.search.trim()){var sq=S.search.toLowerCase();list=list.filter(function(p){return[p.name,p.variety,p.type,p.notes,p.finalPlantLocation].some(function(s){return s&&s.toLowerCase().indexOf(sq)>=0;});});}
list.sort(function(a,b){if(S.sortBy===‘name’)return a.name.localeCompare(b.name,‘zh’);if(S.sortBy===‘category’)return(a.category||’’).localeCompare(b.category||’’);if(S.sortBy===‘planted’)return(b.finalPlantDate||’’).localeCompare(a.finalPlantDate||’’);if(S.sortBy===‘location’)return(a.finalPlantLocation||’’).localeCompare(b.finalPlantLocation||’’,‘zh’);return a.id.localeCompare(b.id);});

var catFilter=usedCats.length>0?(’<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px"><button onclick="S.filterCat=\'all\';render()" style="'+gbtn(S.filterCat==='all')+'">全部</button>’+CATS.filter(function(c){return usedCats.indexOf(c.key)>=0;}).map(function(c){return ‘<button onclick="S.filterCat=\''+c.key+'\';render()" style="'+gbtn(S.filterCat===c.key)+'">’+c.icon+’ ‘+c.label+’</button>’;}).join(’’)+’</div>’):’’;
var sortBtns=SORTS.map(function(s){return ‘<button onclick="S.sortBy=\''+s.key+'\';render()" style="'+gbtn(S.sortBy===s.key)+'padding:3px 10px;border-radius:14px;">’+s.label+’</button>’;}).join(’’);
var plantRows=list.map(function(p){return S.editId===p.id?buildPlantForm():buildPlantCard(p);}).join(’’);

return ‘<div style="min-height:100vh;background:linear-gradient(150deg,#dce8d8,#c8dcc0,#d4e4cc);font-family:\'Lato\',\'Noto Sans SC\',sans-serif;color:#3a5030;padding-bottom:52px">’+
‘<div style="padding:28px 20px 16px;text-align:center;border-bottom:1px solid rgba(90,120,70,0.2)"><div style="font-size:10px;letter-spacing:4px;color:#7a9870;text-transform:uppercase;margin-bottom:5px">智能植物养护</div><h1 style="font-size:29px;color:#3d5c30;margin:0;font-weight:700">植物管家</h1><div style="margin-top:10px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">’+(urgent>0?’<div style="background:rgba(210,150,60,0.18);border:1px solid rgba(180,130,50,0.4);border-radius:20px;padding:3px 14px;font-size:12px;color:#7a5010">⚠️ ‘+urgent+‘株植物待处理</div>’:’’)+’<button onclick="openLib(\'fert\')" style="background:rgba(150,195,130,0.2);border:1px solid rgba(130,175,110,0.4);border-radius:20px;padding:3px 14px;font-size:12px;color:#3a5a28;cursor:pointer;font-family:inherit">🌿 肥料库</button><button onclick="openLib(\'med\')" style="background:rgba(210,160,130,0.2);border:1px solid rgba(190,140,110,0.4);border-radius:20px;padding:3px 14px;font-size:12px;color:#5a3a28;cursor:pointer;font-family:inherit">💊 药品库</button></div></div>’+
‘<div style="max-width:460px;margin:0 auto;padding:0 16px">’+
‘<div style="background:rgba(255,255,255,0.55);border:1px solid rgba(150,185,130,0.5);border-radius:18px;padding:17px 19px;margin-top:18px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;color:#6a8a5a;margin-bottom:4px">📍 ‘+q(W.loc)+’</div><div style="font-size:31px;color:#2e4a22">’+W.emo+’ ‘+W.temp+‘°C</div><div style="font-size:12px;color:#7a9868;margin-top:2px">’+W.cond+’</div></div><div style="text-align:right;font-size:12px;color:#6a8858;line-height:2.2"><div>💧 湿度 ‘+W.hum+’%</div><div>’+(W.rain?‘🌧 有降水’:‘☀️ 无降水’)+’</div><div style="font-size:10px;color:#8a9a7a;margin-top:4px">更新：’+W.upd+’</div></div></div><div style="display:flex;gap:6px;margin-top:12px">’+W.fc.map(function(f){return ‘<div style="flex:1;background:rgba(180,210,155,0.3);border-radius:8px;padding:7px 4px;text-align:center;font-size:11px;color:#4a6a3a"><div style="font-size:17px">’+f.e+’</div><div>’+f.d+’</div><div style="font-size:10px;color:#6a8858">’+f.t+’</div></div>’;}).join(’’)+’</div><div style="margin-top:10px;background:rgba(175,210,155,0.3);border-radius:8px;padding:7px 12px;font-size:12px;color:#4a6838">💡 ‘+q(W.tip)+’</div><div style="margin-top:7px;font-size:10px;color:#8a9a7a;text-align:center">如需刷新天气，在对话中告诉 Claude 即可</div></div>’+
‘<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px"><div style="position:relative"><span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#8aaa78">🔍</span><input id="search_inp" value="'+q(S.search)+'" oninput="setSearch(this.value)" placeholder="搜索名称、品种、位置…" style="'+FS+'padding-left:32px;background:rgba(255,255,255,0.6)"/>’+(S.search?’<button onclick="setSearch(\'\')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#8aaa78">✕</button>’:’’)+’</div>’+catFilter+’<div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#8aaa78;white-space:nowrap">排序：</span><div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px">’+sortBtns+’</div></div></div>’+
‘<div style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px"><div style="font-size:11px;color:#6a8858">我的植物 ‘+(list.length<S.plants.length?’(’+list.length+’/’+S.plants.length+’)’:’(’+S.plants.length+’)’)+’</div><button onclick="'+(S.showAdd?'S.showAdd=false;S.editId=null;render()':'startAdd()')+'" style="padding:6px 15px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:12px;background:'+(S.showAdd?'rgba(220,160,155,0.25)':'rgba(160,200,135,0.3)')+';border:1px solid '+(S.showAdd?'rgba(200,120,115,0.4)':'rgba(130,175,105,0.5)')+';color:'+(S.showAdd?'#7a2020':'#2e4a22')+'">’+(S.showAdd?‘✕ 取消’:’+ 添加植物’)+’</button></div>’+
(S.showAdd?buildPlantForm():’’)+
(S.plants.length===0&&!S.showAdd?’<div style="text-align:center;padding:44px 0"><div style="font-size:40px;margin-bottom:10px">🪴</div><div style="font-size:12px;color:#8a9e78;line-height:2.4">还没有植物<br/>点击「+ 添加植物」开始</div></div>’:’’)+
(S.plants.length>0&&list.length===0?’<div style="text-align:center;padding:30px 0;color:#8aaa78;font-size:12px">没有符合条件的植物</div>’:’’)+
‘<div style="display:flex;flex-direction:column;gap:11px">’+plantRows+’</div></div>’+
‘<div style="text-align:center;margin-top:30px;font-size:10px;color:#8a9a7a;line-height:2">植物数据本地保存 · 天气由 Claude 查询注入</div></div>’+
(S.showLib?buildLibModal():’’)+
(S.logPlantId?buildLogModal():’’)+
(S.calPlantId?buildCalModal():’’)+
‘</div>’;
}

// ═══════════════════════════════════════
//  WEATHER AUTO-UPDATE (Open-Meteo)
// ═══════════════════════════════════════
function fetchWeather(){
  var lat=49.1042,lon=-122.8231; // Surrey, BC
  var url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,precipitation,weather_code&daily=precipitation_sum,weather_code&timezone=America/Vancouver&forecast_days=3';
  fetch(url).then(function(r){return r.json();}).then(function(d){
    var c=d.current,codes=d.daily&&d.daily.weather_code||[];
    function wInfo(code){
      if(code<=1)return{cond:'晴天',emo:'☀️',rain:false};
      if(code<=3)return{cond:'多云',emo:'⛅',rain:false};
      if(code<=49)return{cond:'有雾',emo:'🌫️',rain:false};
      if(code<=67)return{cond:'降雨',emo:'🌧️',rain:true};
      if(code<=77)return{cond:'降雪',emo:'❄️',rain:false};
      if(code<=82)return{cond:'阵雨',emo:'🌦️',rain:true};
      return{cond:'雷雨',emo:'⛈️',rain:true};
    }
    var wi=wInfo(c.weather_code);
    var days=['今天','明天','后天'];
    var fc=codes.slice(0,3).map(function(code,i){var fi=wInfo(code);return{d:days[i],e:fi.emo,t:fi.cond};});
    var precip=c.precipitation||0;
    var tips=[];
    if(wi.rain||precip>3)tips.push('今日有降水，注意减少浇水');
    else if(c.relative_humidity_2m>80)tips.push('湿度偏高（'+c.relative_humidity_2m+'%），浇水适量即可');
    else if(c.temperature_2m>30)tips.push('气温偏高（'+Math.round(c.temperature_2m)+'°C），注意防晒遮阴');
    else if(c.temperature_2m<5)tips.push('气温偏低，注意防寒保温');
    else tips.push('天气适宜，可按常规养护计划进行');
    W.temp=Math.round(c.temperature_2m);
    W.hum=c.relative_humidity_2m;
    W.pre=precip;
    W.cond=wi.cond;W.emo=wi.emo;W.rain=wi.rain;
    W.fc=fc;W.tip=tips[0];
    var now=new Date();
    W.upd=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 '+now.getHours()+':'+('0'+now.getMinutes()).slice(-2);
    render();
  }).catch(function(){/* 天气获取失败时保留默认值 */});
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
render();
fetchWeather();
</script>
