// 繁育 Tab
// ═══════════════════════════════════════════════
const PROP_METHODS=[
  {key:'cutting', icon:'✂️', label:'扦插'},
  {key:'seed',    icon:'🌱', label:'播种'},
  {key:'division',icon:'🌾', label:'分株/分根'},
  {key:'graft',   icon:'🔗', label:'嫁接'},
  {key:'layering',icon:'🌿', label:'压条'},
  {key:'bulb',    icon:'🧅', label:'种球/宿根'},
  {key:'other',   icon:'🔬', label:'其他'},
];
const PROP_STATUS={
  waiting:{icon:'⏳',label:'等待中',color:'#7a6010'},
  success:{icon:'✅',label:'已成活',color:'#2a6a35'},
  fail:   {icon:'❌',label:'失败',  color:'#8a2818'},
};
function getDefaultSuccessLabel(method){
  if(method==='seed'||method==='bulb')return '发芽';
  if(method==='cutting'||method==='layering')return '生根';
  if(method==='graft')return '破土';
  if(method==='division')return '展叶';
  return '其它';
}
function getSuccessLabel(b){
  return b.successLabel||getDefaultSuccessLabel(b.method);
}

// ── 新建/编辑批次表单（全屏）──
function PropForm({initBatch,onClose}){
  const{db,updateDb,toast}=useApp();
  const isEdit=!!initBatch?.id;
  const[form,setForm]=useState(()=>isEdit?{...initBatch}:{
    method:'cutting',parentId:'',parentName:'',date:'',total:1,medium:'',note:'',successLabel:'',
  });
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleParent(id){
    const p=db.plants.find(x=>x.id===id);
    setForm(f=>({...f,parentId:id,parentName:p?(p.name+(p.variety?' '+p.variety:'')):f.parentName}));
  }

  function save(){
    if(!form.date){toast.show('⚠️ 请填写操作日期');return;}
    if(!isEdit&&(!form.total||form.total<1)){toast.show('⚠️ 请填写数量');return;}
    const finalLabel=form.successLabel||getDefaultSuccessLabel(form.method);
    updateDb(prev=>{
      let prop=[...prev.prop];
      if(isEdit){
        prop=prop.map(b=>b.id===form.id?{...b,...form,successLabel:finalLabel}:b);
      } else {
        const n=parseInt(form.total)||1;
        const seedlings=Array.from({length:n},(_,i)=>({
          id:Date.now().toString(36)+i,label:`${i+1}号苗`,
          status:'waiting',successDate:'',note:'',graduated:false,plantId:null,
        }));
        prop=[...prop,{...form,id:uid(),total:n,seedlings,successLabel:finalLabel}];
      }
      return{...prev,prop};
    });
    toast.show(isEdit?'✅ 已更新':'🌱 批次已创建');
    onClose();
  }

  const methodBtns=PROP_METHODS.map(m=>(
    <button key={m.key}
      style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,cursor:'pointer',fontFamily:'inherit',textAlign:'left',
        background:form.method===m.key?'rgba(155,195,125,0.35)':'rgba(180,210,160,0.1)',
        border:`1px solid ${form.method===m.key?'rgba(130,175,100,0.6)':'rgba(150,185,130,0.25)'}`}}
      onClick={()=>{sf('method',m.key);sf('successLabel','');}}>
      <span style={{fontSize:18}}>{m.icon}</span>
      <span style={{fontSize:13,color:'#2e4a22',fontWeight:form.method===m.key?700:400}}>{m.label}</span>
      {form.method===m.key&&<span style={{marginLeft:'auto',color:'#5a8040'}}>✓</span>}
    </button>
  ));

  const successLabels=['生根','发芽','破土','展叶','其它'];

  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">{isEdit?'✏️ 编辑批次':'🌱 新建繁育批次'}</div>
      </div>
      <div style={{maxWidth:460,margin:'0 auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:11}}>
        <div><label className="field-label">繁育方式</label>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>{methodBtns}</div>
        </div>
        <div><label className="field-label">母株（可选）</label>
          <select className="input" value={form.parentId} onChange={e=>handleParent(e.target.value)}
            style={{marginBottom:form.parentId?0:0}}>
            <option value="">— 选择或手填 —</option>
            {db.plants.map(p=><option key={p.id} value={p.id}>{p.name}{p.variety?' '+p.variety:''}</option>)}
          </select>
          {!form.parentId&&<input className="input" style={{marginTop:6}} placeholder="或手填母株名称…"
            defaultValue={form.parentName} onBlur={e=>sf('parentName',e.target.value)}/>}
        </div>
        <div><label className="field-label">操作日期 *</label>
          <input type="date" className="input" value={form.date} onChange={e=>sf('date',e.target.value)}/>
        </div>
        {!isEdit&&<div><label className="field-label">数量（株/粒/芽）</label>
          <input type="number" min={1} max={999} className="input" style={{width:100,textAlign:'center',fontSize:15,fontWeight:700}}
            defaultValue={form.total} onBlur={e=>sf('total',+e.target.value||1)}/>
        </div>}
        <div><label className="field-label">基质/介质</label>
          <input className="input" placeholder="珍珠岩、水苔、泥炭…"
            defaultValue={form.medium} onBlur={e=>sf('medium',e.target.value)}/>
        </div>
        <div><label className="field-label">成活判断标准</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
            {successLabels.map(l=>(
              <button key={l} style={{padding:'4px 12px',borderRadius:16,cursor:'pointer',fontFamily:'inherit',fontSize:12,
                background:(form.successLabel||getDefaultSuccessLabel(form.method))===l?'rgba(155,195,125,0.45)':'rgba(180,210,160,0.12)',
                border:`1px solid ${(form.successLabel||getDefaultSuccessLabel(form.method))===l?'rgba(130,175,100,0.6)':'rgba(150,185,130,0.3)'}`,
                color:(form.successLabel||getDefaultSuccessLabel(form.method))===l?'#2e4a22':'#6a8858'}}
                onClick={()=>sf('successLabel',l)}>{l}</button>
            ))}
          </div>
        </div>
        <div><label className="field-label">备注</label>
          <textarea className="input" rows={2} style={{resize:'vertical',lineHeight:1.6}} placeholder="特殊说明…"
            defaultValue={form.note} onBlur={e=>sf('note',e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:8,paddingBottom:20}}>
          <button className="btn btn-green" style={{flex:1}} onClick={save}>✓ 保存</button>
          <button className="btn btn-gray" style={{flex:1}} onClick={onClose}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ── 批次详情页（全屏）──
function PropBatchDetail({batchId,onClose,onEdit,onGraduate}){
  const{db,updateDb,toast}=useApp();
  const batch=db.prop.find(b=>b.id===batchId);
  const[delConfirm,setDelConfirm]=useState(false);
  const[sel,setSel]=useState([]); // 选中的幼苗 idx 数组
  const[datePickIdx,setDatePickIdx]=useState(null); // 正在选日期的幼苗 idx
  const[datePickVal,setDatePickVal]=useState(toDay());
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);

  if(!batch)return null;
  const method=PROP_METHODS.find(m=>m.key===batch.method)||PROP_METHODS[0];
  const seedlings=batch.seedlings||[];
  const succ=seedlings.filter(s=>s.status==='success').length;
  const total=batch.total||0;
  const rate=total>0?Math.round((succ/total)*100):0;
  const waiting=seedlings.map((s,i)=>({s,i})).filter(({s})=>s.status==='waiting');

  // 切换选中
  function toggleSel(idx){setSel(s=>s.includes(idx)?s.filter(i=>i!==idx):[...s,idx]);}
  function selAll(){setSel(waiting.map(({i})=>i));}
  function clearSel(){setSel([]);}

  // 单苗设置状态
  function setSeedlingStatus(idx,status){
    if(status==='success'){
      // 弹出日期选择
      setDatePickIdx(idx);
      setDatePickVal(seedlings[idx].successDate||toDay());
      return;
    }
    updateDb(prev=>({...prev,prop:prev.prop.map(b=>{
      if(b.id!==batchId)return b;
      const sl=[...b.seedlings];
      sl[idx]={...sl[idx],status,successDate:''};
      return{...b,seedlings:sl};
    })}));
  }

  // 确认日期后设成活
  function confirmSuccessDate(){
    const idx=datePickIdx;
    updateDb(prev=>({...prev,prop:prev.prop.map(b=>{
      if(b.id!==batchId)return b;
      const sl=[...b.seedlings];
      sl[idx]={...sl[idx],status:'success',successDate:datePickVal};
      return{...b,seedlings:sl};
    })}));
    setDatePickIdx(null);
  }

  // 批量设置状态
  function bulkSetStatus(status){
    if(status==='success'){
      // 批量成活也弹日期
      setDatePickIdx('bulk');
      setDatePickVal(toDay());
      return;
    }
    updateDb(prev=>({...prev,prop:prev.prop.map(b=>{
      if(b.id!==batchId)return b;
      const sl=b.seedlings.map((s,i)=>sel.includes(i)?{...s,status,successDate:''}:s);
      return{...b,seedlings:sl};
    })}));
    setSel([]);
  }

  function confirmBulkSuccessDate(){
    updateDb(prev=>({...prev,prop:prev.prop.map(b=>{
      if(b.id!==batchId)return b;
      const sl=b.seedlings.map((s,i)=>sel.includes(i)?{...s,status:'success',successDate:datePickVal}:s);
      return{...b,seedlings:sl};
    })}));
    setSel([]);setDatePickIdx(null);
  }

  function setSeedlingNote(idx,note){
    updateDb(prev=>({...prev,prop:prev.prop.map(b=>{
      if(b.id!==batchId)return b;
      const sl=[...b.seedlings];sl[idx]={...sl[idx],note};return{...b,seedlings:sl};
    })}));
  }

  function archiveBatch(){
    updateDb(prev=>({
      ...prev,
      prop:prev.prop.filter(b=>b.id!==batchId),
      archive:{...prev.archive,batches:[...(prev.archive.batches||[]),{...batch,archivedAt:toDay()}]},
    }));
    toast.show('📦 已归档');onClose();
  }
  function deleteBatch(){
    updateDb(prev=>({...prev,prop:prev.prop.filter(b=>b.id!==batchId)}));
    toast.show('🗑 已删除');onClose();
  }

  // 建卡：跳转到植物表单页
  function graduateBatch(){
    const isCutting=['cutting','graft','division','layering'].includes(batch.method);
    // 从母株植物卡获取名称和品种（如有关联）
    const parentPlant=batch.parentId?db.plants.find(function(p){return p.id===batch.parentId;}):null;
    const pName=parentPlant?parentPlant.name:(batch.parentName||'');
    const pVariety=parentPlant?(parentPlant.variety||''):'';
    // 合并基质和备注
    const medPart=batch.medium?('基质：'+batch.medium):'';
    const notePart=batch.note||'';
    const combinedNotes=[medPart,notePart].filter(Boolean).join('\n');
    onGraduate({
      mode:'batch', batch,
      initData:{
        name:pName,
        variety:pVariety,
        source:batch.method==='seed'?'seed':batch.method==='bulb'?'bulb':batch.method==='cutting'?'cutting':batch.method==='graft'?'graft':batch.method==='division'?'division':'other',
        sowDate:batch.method==='seed'?batch.date:'',
        opDate:isCutting?batch.date:'',
        buyDate:batch.method==='bulb'?batch.date:'',
        buyFrom:isCutting?(batch.parentName||''):'',
        opNotes:isCutting?combinedNotes:'',
        sowMethod:batch.method==='seed'?combinedNotes:'',
        prePlantNotes:batch.method==='bulb'&&medPart?medPart:'',
      }
    });
  }
  function graduateSingle(idx){
    const s=seedlings[idx];
    const isCutting=['cutting','graft','division','layering'].includes(batch.method);
    const parentPlant=batch.parentId?db.plants.find(function(p){return p.id===batch.parentId;}):null;
    const pName=parentPlant?parentPlant.name:(batch.parentName||'');
    const pVariety=parentPlant?(parentPlant.variety||''):'';
    const medPart=batch.medium?('基质：'+batch.medium):'';
    const notePart=batch.note||'';
    const combinedNotes=[medPart,notePart].filter(Boolean).join('\n');
    onGraduate({
      mode:'single', batch, seedlingIdx:idx,
      initData:{
        name:pName,
        variety:pVariety,
        source:batch.method==='seed'?'seed':batch.method==='bulb'?'bulb':batch.method==='cutting'?'cutting':batch.method==='graft'?'graft':batch.method==='division'?'division':'other',
        sowDate:batch.method==='seed'?batch.date:'',
        opDate:isCutting?batch.date:'',
        buyDate:batch.method==='bulb'?batch.date:'',
        germDate:batch.method==='seed'&&s.successDate?s.successDate:'',
        rootDate:['cutting','graft','layering'].includes(batch.method)&&s.successDate?s.successDate:'',
        buyFrom:isCutting?(batch.parentName||''):'',
        opNotes:isCutting?combinedNotes:'',
        sowMethod:batch.method==='seed'?combinedNotes:'',
        prePlantNotes:batch.method==='bulb'&&medPart?medPart:'',
      }
    });
  }

  const linkedPlants=(batch.batchPlantIds||[batch.batchPlantId].filter(Boolean)).map(pid=>db.plants.find(p=>p.id===pid)||db.archive?.plants?.find(p=>p.id===pid)).filter(Boolean);

  return(

          <button className="btn btn-gray" style={{padding:'5px 10px',fontSize:12}} onClick={()=>onEdit(batch)}>✏️</button>
        </div>
      </div>
      <div style={{maxWidth:460,margin:'0 auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>

        {/* 概览 */}
        <div className="card">
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
            <span style={{background:'rgba(80,180,80,0.15)',color:'#2a6a35',borderRadius:10,padding:'3px 10px',fontSize:12,fontWeight:600}}>✅ {succ}/{total} ({rate}%)</span>
            <span style={{fontSize:12,color:'#7a9060'}}>📅 {fmtDate(batch.date)}</span>
            {batch.medium&&<span style={{fontSize:12,color:'#7a9060'}}>🪨 {batch.medium}</span>}
          </div>
          <div style={{fontSize:12,color:'#5a7848'}}>成活判断：{getSuccessLabel(batch)}</div>
          {batch.note&&<div style={{fontSize:12,color:'#7a9060',marginTop:4}}>📝 {batch.note}</div>}
          {linkedPlants.length>0&&<div style={{marginTop:8,display:'flex',gap:5,flexWrap:'wrap'}}>
            {linkedPlants.map(p=><span key={p.id} style={{fontSize:11,background:'rgba(165,195,220,0.25)',color:'#384a68',borderRadius:8,padding:'2px 8px'}}>🪴 {p.name}</span>)}

        </div>

        {/* 批量操作栏 */}

                <span style={{fontSize:11,color:'#8aaa78'}}>批量标记为：</span>
                {Object.entries(PROP_STATUS).map(([k,v])=>(
                  <button key={k} style={{padding:'4px 10px',borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:11,

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            <button className="btn btn-gray" style={{flex:1}} onClick={onClose}>取消</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 繁育 Tab 主视图 ──
function BreedingTab(){
  const{db,updateDb,toast}=useApp();
  const[view,setView]=useState(null);
  useEffect(()=>{
    function onTabReset(e){if(e.detail==='breeding')setView(null);}
    window.addEventListener('tabReset',onTabReset);
    return()=>window.removeEventListener('tabReset',onTabReset);
  },[]);

  function handleGraduate({mode,batch,seedlingIdx,initData}){
    // 跳转到植物表单，保存后关联回批次
    const newId=uid();
    const initPlant={...BLANK(),...initData,id:newId};
    setView({
      type:'graduate',
      initPlant,
      onSaved:(savedPlant)=>{
        updateDb(prev=>({
          ...prev,
          plants:[...prev.plants,savedPlant],
          prop:prev.prop.map(b=>{
            if(b.id!==batch.id)return b;
            const ids=[...(b.batchPlantIds||[]),savedPlant.id];
            const sl=mode==='single'&&seedlingIdx!=null
              ?b.seedlings.map((s,i)=>i===seedlingIdx?{...s,graduated:true,plantId:savedPlant.id}:s)
              :b.seedlings;
            return{...b,batchPlantIds:ids,seedlings:sl};
          }),
        }));
        toast.show('🪴 植物卡已创建');
        setView({type:'detail',id:batch.id});
      },
    });
  }

  if(view?.type==='form')
    return<PropForm initBatch={view.batch||null} onClose={()=>setView(null)}/>;
  if(view?.type==='detail')
    return<PropBatchDetail batchId={view.id} onClose={()=>setView(null)}
      onEdit={b=>setView({type:'form',batch:b})}
      onGraduate={handleGraduate}/>;
  if(view?.type==='graduate')
    return<PlantFormBreeding initPlant={view.initPlant} onSaved={view.onSaved} onClose={()=>setView(null)}/>;

  return(
    <div className="tab-content">
      <div className="sticky-bar"><h1>🌱 繁育</h1></div>
      <div style={{padding:'12px 16px'}}>
        {db.prop.length===0
          ?<div className="placeholder">
            <div className="placeholder-emoji">🌱</div>
            <div className="placeholder-title">暂无繁育批次</div>
            <div className="placeholder-desc">点击右下角 ＋<br/>记录扦插、播种、分株等繁育过程</div>
          </div>
          :db.prop.slice().reverse().map(b=>{
            const method=PROP_METHODS.find(m=>m.key===b.method)||PROP_METHODS[0];
            const succ=(b.seedlings||[]).filter(s=>s.status==='success').length;
            const total=b.total||0;
            const rate=total>0?Math.round((succ/total)*100):0;
            const waiting=(b.seedlings||[]).filter(s=>s.status==='waiting').length;
            return<div key={b.id} className="card" style={{marginBottom:10,cursor:'pointer'}} onClick={()=>setView({type:'detail',id:b.id})}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                <div>
                  <span style={{fontSize:16,fontWeight:700,color:'#2e4a22'}}>{method.icon} {b.parentName||'未命名'}</span>
                  <span style={{fontSize:12,color:'#7a9060',marginLeft:8}}>{method.label}</span>
                </div>
                <span style={{fontSize:11,color:'#7a9868'}}>{fmtDate(b.date)}</span>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <span style={{fontSize:11,background:'rgba(80,180,80,0.12)',color:'#2a6a35',borderRadius:8,padding:'2px 8px'}}>✅ {succ}/{total} ({rate}%)</span>
                {waiting>0&&<span style={{fontSize:11,background:'rgba(220,185,60,0.15)',color:'#7a6010',borderRadius:8,padding:'2px 8px'}}>⏳ {waiting}株等待中</span>}
                {b.medium&&<span style={{fontSize:11,background:'rgba(180,210,160,0.2)',color:'#5a7848',borderRadius:8,padding:'2px 8px'}}>🪨 {b.medium}</span>}
              </div>
            </div>;
          })
        }
      </div>
      <button className="fab" onClick={()=>setView({type:'form',batch:null})}>＋</button>
    </div>
  );
}

function LibListPage({type,onClose}){
  const{db,updateDb,toast}=useApp();
  const[search,setSearch]=useState('');
  const[expanded,setExpanded]=useState(null);
  const[editItem,setEditItem]=useState(null);
  const[addNew,setAddNew]=useState(false);
  const[delConfirm,setDelConfirm]=useState(null);
  const isFert=type==='fert',isSoil=type==='soil';
  const arr=db.lib[type]||[];
  const label=isFert?'肥料':isSoil?'盆土/基质':'药品';
  const icon=isFert?'🌿':isSoil?'🪨':'💊';
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);
  const q=search.trim().toLowerCase();
  const filtered=q?arr.filter(x=>{
    const fields=isSoil?[x.name,x.brand,x.suitable,x.note]:[x.name,x.type,x.target,x.note];
    return fields.some(s=>(s||'').toLowerCase().includes(q));
  }):arr;
  function delItem(id){
    updateDb(prev=>({...prev,lib:{...prev.lib,[type]:prev.lib[type].filter(x=>x.id!==id)}}));
    toast.show('🗑 已删除');setDelConfirm(null);setExpanded(null);
  }
  if(addNew||editItem){
    const props={initItem:editItem||null,onClose:()=>{setAddNew(false);setEditItem(null);}};
    return isSoil?<SoilForm {...props}/>:<FertMedForm type={type} {...props}/>;
  }
  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">{icon} {label}库</div>
        <button className="btn btn-green" style={{padding:'5px 12px',fontSize:12,flexShrink:0}} onClick={()=>setAddNew(true)}>＋ 添加</button>
      </div>
      <div style={{padding:'10px 16px 8px'}}>
        <input className="input" placeholder={'搜索'+label+'…'} value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{padding:'4px 16px 40px'}}>
        {arr.length===0
          ?<div style={{textAlign:'center',padding:'60px 0',color:'#9aaa88',fontSize:14,lineHeight:2.2}}>库存为空<br/>点击右上角「＋ 添加」开始录入</div>
          :filtered.length===0
            ?<div style={{textAlign:'center',padding:'30px 0',color:'#9aaa88',fontSize:13}}>未找到匹配项</div>
            :filtered.map(item=>{
              const exp=expanded===item.id;
              const ds2=item.lastUsed?daysSince(item.lastUsed):null;
              const intv=parseInt(item.interval)||0;
              const due=!isSoil&&intv>0&&item.lastUsed&&ds2>=intv;
              const borderCol=due?'rgba(200,140,50,0.5)':'rgba(150,185,130,0.4)';
              return<div key={item.id} style={{background:'rgba(255,255,255,0.7)',border:'1.5px solid '+borderCol,borderRadius:14,marginBottom:10,overflow:'hidden'}}>
                <button style={{width:'100%',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'13px 15px',display:'flex',alignItems:'center',gap:10,textAlign:'left'}}
                  onClick={()=>setExpanded(e=>e===item.id?null:item.id)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                      <span style={{fontSize:15,fontWeight:700,color:'#2e4a22'}}>{item.name}</span>
                      {item.type&&<span style={{fontSize:11,background:'rgba(150,190,120,0.25)',borderRadius:10,padding:'2px 9px',color:'#5a7840'}}>{item.type}</span>}
                      {isSoil&&item.brand&&<span style={{fontSize:11,background:'rgba(150,190,120,0.25)',borderRadius:10,padding:'2px 9px',color:'#5a7840'}}>{item.brand}</span>}
                      {due&&<span style={{fontSize:11,color:'#8a5010',background:'rgba(240,190,100,0.3)',borderRadius:10,padding:'2px 9px'}}>⚠️ 该用了</span>}
                    </div>
                    <div style={{fontSize:12,color:'#7a9060',marginTop:3}}>
                      {!isSoil&&item.npk&&type==='fert'&&<span style={{color:'#5a7a40'}}>NPK {item.npk}　</span>}
                      {item.interval&&<span>间隔：{item.interval}天</span>}
                      {!isSoil&&item.lastUsed&&<span>　上次：{ds2}天前</span>}
                      {isSoil&&item.composition&&<span>成分：{item.composition}</span>}
                      {isSoil&&item.ph&&<span>　pH {item.ph}</span>}
                      {isSoil&&!item.composition&&!item.ph&&item.spec&&<span>{item.spec}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:16,color:'#8aaa78',flexShrink:0}}>{exp?'▲':'▼'}</span>
                </button>
                {exp&&<div style={{padding:'0 15px 14px',borderTop:'1px solid rgba(150,185,130,0.2)'}}>
                  {isSoil
                    ?<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:10}}>
                      {[['🏷️ 品牌',item.brand],['🛒 来源',item.src],['📦 规格',item.spec],['💰 价格',item.price],
                        ['⚗️ 成分',item.composition],['🔬 pH',item.ph],['💧 排水性',item.drainage],['📝 备注',item.note],
                        ['🌱 适用场景',item.suitable]
                      ].filter(x=>x[1]).map(([k,v])=>(
                        <div key={k} style={{background:'rgba(180,210,160,0.25)',borderRadius:8,padding:'8px 10px'}}>
                          <div style={{fontSize:11,color:'#6a8858',marginBottom:2}}>{k}</div>
                          <div style={{fontSize:13,color:'#2e4a22'}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    :<div style={{display:'flex',flexDirection:'column',gap:7,marginTop:10}}>
                      {(isFert?item.suitable:item.target)&&<div style={{background:'rgba(255,220,180,0.25)',borderRadius:10,padding:'9px 11px'}}>
                        <div style={{fontSize:11,color:'#7a5020',fontWeight:700,marginBottom:3}}>{isFert?'🌱 适用场景':'🎯 防治对象'}</div>
                        <div style={{fontSize:13,color:'#5a3820',lineHeight:1.7}}>{isFert?item.suitable:item.target}</div>
                      </div>}
                      {item.dosage&&<div style={{background:'rgba(180,210,160,0.25)',borderRadius:10,padding:'9px 11px'}}>
                        <div style={{fontSize:11,color:'#4a7030',fontWeight:700,marginBottom:3}}>💧 稀释/用量</div>
                        <div style={{fontSize:13,color:'#2e4a22',lineHeight:1.7}}>{item.dosage}</div>
                      </div>}
                      {(item.usage||item.method)&&<div style={{background:'rgba(180,210,160,0.25)',borderRadius:10,padding:'9px 11px'}}>
                        <div style={{fontSize:11,color:'#4a7030',fontWeight:700,marginBottom:3}}>📋 使用方法</div>
                        <div style={{fontSize:13,color:'#2e4a22',lineHeight:1.7}}>{item.usage||item.method}</div>
                      </div>}
                      {item.caution&&<div style={{background:'rgba(240,200,150,0.25)',borderRadius:10,padding:'9px 11px'}}>
                        <div style={{fontSize:11,color:'#7a5020',fontWeight:700,marginBottom:3}}>⚠️ 注意事项</div>
                        <div style={{fontSize:13,color:'#6a3818',lineHeight:1.7}}>{item.caution}</div>
                      </div>}
                      {item.note&&<div style={{fontSize:13,color:'#7a9060'}}>📝 {item.note}</div>}
                    </div>
                  }
                  <div style={{display:'flex',gap:8,marginTop:12}}>
                    <button className="btn btn-gray" style={{flex:1,fontSize:13,padding:'9px'}} onClick={()=>setEditItem(item)}>✏️ 修改</button>
                    <button className="btn btn-red" style={{padding:'9px 14px',fontSize:13}} onClick={()=>setDelConfirm(item)}>删除</button>
                  </div>
                </div>}
              </div>;
            })
        }
      </div>
      {delConfirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(40,65,25,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={()=>setDelConfirm(null)}>
          <div style={{background:'#f5f8f2',borderRadius:18,padding:'24px 20px',width:'100%',maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:600,color:'#2e4a22',marginBottom:18}}>确认删除「{delConfirm.name}」吗？</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-gray" style={{flex:1}} onClick={()=>setDelConfirm(null)}>取消</button>
              <button className="btn btn-red" style={{flex:1}} onClick={()=>delItem(delConfirm.id)}>确认删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ArchivePage({onClose}){
  const{db,updateDb,toast}=useApp();
  const[sub,setSub]=useState('plants');
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);
  const arc=db.archive||{plants:[],batches:[],courses:[]};
  const courses=arc.courses||[];
  function unarchivePlant(id){
    const p=arc.plants.find(x=>x.id===id);if(!p)return;
    updateDb(prev=>({...prev,plants:[...prev.plants,{...p,archivedAt:undefined}],archive:{...prev.archive,plants:prev.archive.plants.filter(x=>x.id!==id)}}));
    toast.show('↩ 已恢复到植物页');
  }
  function unarchiveBatch(id){
    const b=arc.batches.find(x=>x.id===id);if(!b)return;
    updateDb(prev=>({...prev,prop:[...prev.prop,{...b,archivedAt:undefined}],archive:{...prev.archive,batches:prev.archive.batches.filter(x=>x.id!==id)}}));
    toast.show('↩ 已恢复到繁育页');
  }
  function deleteCourse(id){
    updateDb(prev=>({...prev,archive:{...prev.archive,courses:(prev.archive.courses||[]).filter(c=>c.id!==id)}}));
    toast.show('🗑 疗程记录已删除');
  }
  // 按植物名分组
  const coursesByPlant={};
  [...courses].reverse().forEach(c=>{
    const key=c.plantName||'未知植物';
    if(!coursesByPlant[key])coursesByPlant[key]=[];
    coursesByPlant[key].push(c);
  });
  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">📦 档案库</div>
      </div>
      <div style={{maxWidth:460,margin:'0 auto',padding:'12px 16px'}}>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {[['plants','🪴 植物',arc.plants.length],['batches','🌱 繁育',arc.batches.length],['courses','💊 疗程',courses.length]].map(([k,l,cnt])=>(
            <button key={k} style={{flex:1,padding:'10px 6px',borderRadius:12,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:600,
              background:sub===k?'rgba(140,185,110,0.4)':'rgba(255,255,255,0.5)',
              border:'1.5px solid '+(sub===k?'rgba(110,165,80,0.6)':'rgba(150,185,130,0.3)'),
              color:sub===k?'#2e4a22':'#6a8858'}}
              onClick={()=>setSub(k)}>{l} <span style={{fontSize:11,fontWeight:400,color:'#7a9060'}}>{cnt}</span></button>
          ))}
        </div>
        {sub==='plants'
          ?arc.plants.length===0
            ?<div style={{textAlign:'center',padding:'60px 0',color:'#9aaa88',fontSize:13,lineHeight:2.2}}>暂无植物存档</div>
            :arc.plants.slice().reverse().map(p=>(
              <div key={p.id} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  {p.photo?<PlantPhoto src={p.photo} style={{width:44,height:44,objectFit:'cover',borderRadius:8,flexShrink:0}}/>
                    :<div style={{width:44,height:44,borderRadius:8,background:'rgba(180,210,160,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>🪴</div>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:700,color:'#2e4a22'}}>{p.name}{p.variety&&<span style={{fontSize:12,fontWeight:400,color:'#5a7848',marginLeft:6}}>{p.variety}</span>}</div>
                    {p.category&&<div style={{fontSize:11,color:'#7a9060',marginTop:2}}>{p.category}</div>}
                    {p.archivedAt&&<div style={{fontSize:10,color:'#aab89a',marginTop:1}}>归档于 {p.archivedAt}</div>}
                  </div>
                </div>
                <button className="btn btn-gray" style={{width:'100%',fontSize:12,padding:'8px'}} onClick={()=>unarchivePlant(p.id)}>↩ 恢复到植物页</button>
              </div>
            ))
          :sub==='batches'
            ?arc.batches.length===0
              ?<div style={{textAlign:'center',padding:'60px 0',color:'#9aaa88',fontSize:13,lineHeight:2.2}}>暂无繁育存档</div>
              :arc.batches.slice().reverse().map(b=>{
                const method=PROP_METHODS.find(m=>m.key===b.method)||PROP_METHODS[0];
                const succ=(b.seedlings||[]).filter(s=>s.status==='success').length;
                const rate=b.total>0?Math.round((succ/b.total)*100):0;
                return<div key={b.id} className="card" style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                    <span style={{fontSize:15,fontWeight:700,color:'#2e4a22'}}>{method.icon} {b.parentName||'未命名'}</span>
                    {b.archivedAt&&<span style={{fontSize:10,color:'#aab89a'}}>归档 {b.archivedAt}</span>}
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
                    <span style={{fontSize:11,background:'rgba(80,180,80,0.12)',color:'#2a6a35',borderRadius:8,padding:'2px 8px'}}>✅ {succ}/{b.total} ({rate}%)</span>
                    <span style={{fontSize:11,color:'#7a9060'}}>📅 {fmtDate(b.date)}</span>
                  </div>
                  <button className="btn btn-gray" style={{width:'100%',fontSize:12,padding:'8px'}} onClick={()=>unarchiveBatch(b.id)}>↩ 恢复到繁育页</button>
                </div>;
              })
            :courses.length===0
              ?<div style={{textAlign:'center',padding:'60px 0',color:'#9aaa88',fontSize:13,lineHeight:2.2}}>暂无疗程存档<br/><span style={{fontSize:11}}>完成或手动结束的用药疗程会自动归档到这里</span></div>
              :Object.entries(coursesByPlant).map(([plantName,cs])=>(
                <div key={plantName} style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#5a7848',marginBottom:6,paddingLeft:2}}>🪴 {plantName}</div>
                  {cs.map(c=>(
                    <div key={c.id} className="card" style={{marginBottom:8,borderColor:c.status==='done'?'rgba(80,160,80,.3)':'rgba(180,140,80,.3)',background:c.status==='done'?'rgba(180,230,180,.1)':'rgba(230,210,160,.1)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                        <div>
                          <span style={{fontSize:14,fontWeight:700,color:'#3a2810'}}>{c.drugName||'未记录药品'}</span>
                          <span style={{marginLeft:8,fontSize:10,padding:'2px 7px',borderRadius:10,fontWeight:600,
                            background:c.status==='done'?'rgba(80,160,80,.2)':'rgba(180,130,50,.2)',
                            color:c.status==='done'?'#2a6a35':'#7a5010'}}>
                            {c.status==='done'?'✅ 已完成':'🔚 已结束'}
                          </span>
                        </div>
                        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'#bbb',padding:'0 2px'}} onClick={()=>deleteCourse(c.id)}>🗑</button>
                      </div>
                      {c.reason&&<div style={{fontSize:11,color:'#9a7040',marginBottom:2}}>病症：{c.reason}</div>}
                      {c.amount&&<div style={{fontSize:11,color:'#9a7040',marginBottom:2}}>用量：{c.amount}</div>}
                      <div style={{fontSize:11,color:'#9a9080',marginBottom:2}}>
                        {'间隔 '+c.interval+' 天 · 计划 '+c.total+' 次 · 实际完成 '+(c.given||0)+' 次'}
                      </div>
                      <div style={{fontSize:10,color:'#aab89a'}}>
                        {'开始 '+fmtDate(c.startDate)+(c.endDate?' · 结束 '+fmtDate(c.endDate):'')}
                      </div>
                    </div>
                  ))}
                </div>
              ))
        }
      </div>
    </div>
  );
}

  });
  const[ingInput,setIngInput]=useState('');
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function addIng(){
    const t=ingInput.trim();if(!t)return;
    setForm(f=>({...f,ingredients:[...f.ingredients,{name:t,amount:''}]}));
    setIngInput('');
  }
  function updateIng(i,k,v){
    setForm(f=>{const a=[...f.ingredients];a[i]={...a[i],[k]:v};return{...f,ingredients:a};});
  }
  function removeIng(i){
    setForm(f=>({...f,ingredients:f.ingredients.filter((_,idx)=>idx!==i)}));
  }

  function save(){
    if(!form.name.trim()){toast.show('⚠️ 请填写配方名称');return;}
    const item={...form,id:isEdit?form.id:uid()};
    updateDb(prev=>({...prev,lib:{...prev.lib,recipe:isEdit
      ?prev.lib.recipe.map(x=>x.id===item.id?item:x)
      :[...(prev.lib.recipe||[]),item]}}));
    toast.show(isEdit?'✅ 已更新':'✅ 配方已保存');onClose();
  }

  const typeOpts=[
    {k:'soil',l:'🪨 盆土配方',ph:'如：多肉专用土、番茄定植土…'},
    {k:'fert',l:'🌿 自制肥液',ph:'如：香蕉水、草木灰液…'},
    {k:'spray',l:'💧 配制药液',ph:'如：大蒜水、辣椒水…'},
    {k:'other',l:'📋 其他配方',ph:'如：发芽液、促根液…'},
  ];

  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">{isEdit?'✏️ 修改配方':'＋ 新增配方'}</div>
      </div>
      <div style={{maxWidth:460,margin:'0 auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
        <div><label className="field-label">配方名称 *</label>
          <input className="input" placeholder="如：蓝莓专用土、番茄促果液…" defaultValue={form.name} onBlur={e=>sf('name',e.target.value)}/></div>
        <div><label className="field-label">配方类型</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {typeOpts.map(t=>(
              <button key={t.k} style={{padding:'5px 12px',borderRadius:16,cursor:'pointer',fontFamily:'inherit',fontSize:12,
                background:form.type===t.k?'rgba(155,195,125,0.45)':'rgba(180,210,160,0.12)',
                border:`1px solid ${form.type===t.k?'rgba(130,175,100,0.6)':'rgba(150,185,130,0.3)'}`,
                color:form.type===t.k?'#2e4a22':'#6a8858'}}
                onClick={()=>sf('type',t.k)}>{t.l}</button>
            ))}
          </div>
        </div>
        <div><label className="field-label">简介/用途</label>
          <input className="input" placeholder={typeOpts.find(t=>t.k===form.type)?.ph||'用途说明…'} defaultValue={form.purpose} onBlur={e=>sf('purpose',e.target.value)}/></div>

        {/* 成分/材料 */}
        <div>
          <label className="field-label">材料/成分</label>
          <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:6}}>
            {form.ingredients.map((ing,i)=>(
              <div key={i} style={{display:'flex',gap:5,alignItems:'center'}}>
                <input className="input" style={{flex:2,fontSize:13}} placeholder="材料名" defaultValue={ing.name} onBlur={e=>updateIng(i,'name',e.target.value)}/>
                <input className="input" style={{flex:1,fontSize:13}} placeholder="用量/比例" defaultValue={ing.amount} onBlur={e=>updateIng(i,'amount',e.target.value)}/>
                <button style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#9a7878',padding:'0 2px',flexShrink:0}} onClick={()=>removeIng(i)}>✕</button>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:6}}>
            <input className="input" style={{flex:1,fontSize:13}} placeholder="添加材料…" value={ingInput} onChange={e=>setIngInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addIng();}}}/>
            <button className="btn btn-gray" style={{flexShrink:0,padding:'8px 12px',fontSize:12}} onClick={addIng}>＋ 添加</button>
          </div>
        </div>

        <div><label className="field-label">配制步骤</label>
          <textarea className="input" rows={3} style={{resize:'vertical',lineHeight:1.6}} placeholder="1. 先…&#10;2. 再…" defaultValue={form.steps} onBlur={e=>sf('steps',e.target.value)}/></div>
        <div><label className="field-label">备注</label>
          <textarea className="input" rows={2} style={{resize:'vertical',lineHeight:1.6}} placeholder="注意事项、心得…" defaultValue={form.note} onBlur={e=>sf('note',e.target.value)}/></div>
        <div style={{display:'flex',gap:8,paddingBottom:20}}>
          <button className="btn btn-green" style={{flex:1}} onClick={save}>✓ {isEdit?'保存修改':'保存配方'}</button>
          <button className="btn btn-gray" style={{flex:1}} onClick={onClose}>取消</button>
        </div>
      </div>
    </div>
  );
}

function RecipeListPage({onClose}){
  const{db,updateDb,toast}=useApp();
  const[search,setSearch]=useState('');
  const[expanded,setExpanded]=useState(null);
  const[editItem,setEditItem]=useState(null);
  const[addNew,setAddNew]=useState(false);
  const[delConfirm,setDelConfirm]=useState(null);
  const recipes=db.lib.recipe||[];
  useEffect(()=>{window.scrollTo(0,0)},[]);
  useSwipeBack(onClose);

  const q=search.trim().toLowerCase();
  const filtered=q?recipes.filter(x=>[x.name,x.purpose,x.note,...(x.ingredients||[]).map(i=>i.name)].some(s=>(s||'').toLowerCase().includes(q))):recipes;

  function delItem(id){
    updateDb(prev=>({...prev,lib:{...prev.lib,recipe:prev.lib.recipe.filter(x=>x.id!==id)}}));
    toast.show('🗑 已删除');setDelConfirm(null);setExpanded(null);
  }

  const typeIcon={soil:'🪨',fert:'🌿',spray:'💧',other:'📋'};
  const typeLabel={soil:'盆土配方',fert:'自制肥液',spray:'配制药液',other:'其他'};

  if(addNew||editItem){
    return<RecipeForm initItem={editItem||null} onClose={()=>{setAddNew(false);setEditItem(null);}}/>;
  }

  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">🧪 配方库</div>
        <button className="btn btn-green" style={{padding:'5px 12px',fontSize:12,flexShrink:0}} onClick={()=>setAddNew(true)}>＋ 添加</button>
      </div>
      <div style={{padding:'10px 16px 8px'}}>
        <input className="input" placeholder="搜索配方名称、材料…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{padding:'4px 16px 40px'}}>
        {recipes.length===0
          ?<div style={{textAlign:'center',padding:'60px 0',color:'#9aaa88',fontSize:14,lineHeight:2.2}}>暂无配方<br/>点击右上角「＋ 添加」创建第一个配方</div>
          :filtered.length===0
            ?<div style={{textAlign:'center',padding:'30px 0',color:'#9aaa88',fontSize:13}}>未找到匹配项</div>
            :filtered.map(item=>{
              const exp=expanded===item.id;
              return<div key={item.id} style={{background:'rgba(255,255,255,0.7)',border:'1.5px solid rgba(160,200,130,0.4)',borderRadius:14,marginBottom:10,overflow:'hidden'}}>
                <button style={{width:'100%',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:'13px 15px',display:'flex',alignItems:'center',gap:10,textAlign:'left'}}
                  onClick={()=>setExpanded(e=>e===item.id?null:item.id)}>
                  <span style={{fontSize:22,flexShrink:0}}>{typeIcon[item.type]||'📋'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                      <span style={{fontSize:15,fontWeight:700,color:'#2e4a22'}}>{item.name}</span>
                      <span style={{fontSize:11,background:'rgba(150,190,120,0.25)',borderRadius:10,padding:'2px 9px',color:'#5a7840'}}>{typeLabel[item.type]||'配方'}</span>
                    </div>
                    {item.purpose&&<div style={{fontSize:12,color:'#7a9060',marginTop:2}}>{item.purpose}</div>}
                    {(item.ingredients||[]).length>0&&<div style={{fontSize:11,color:'#9aaa88',marginTop:2}}>
                      {item.ingredients.slice(0,4).map((ing,i)=><span key={i}>{i>0?'·':''}{ing.name}{ing.amount?` ${ing.amount}`:''}</span>)}
                      {item.ingredients.length>4&&<span> …共{item.ingredients.length}种</span>}
                    </div>}
                  </div>
                  <span style={{fontSize:16,color:'#8aaa78',flexShrink:0}}>{exp?'▲':'▼'}</span>
                </button>
                {exp&&<div style={{padding:'0 15px 14px',borderTop:'1px solid rgba(150,185,130,0.2)'}}>
                  {(item.ingredients||[]).length>0&&(
                    <div style={{marginTop:10,marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:'#4a7030',marginBottom:5}}>📦 材料清单</div>
                      <div style={{display:'flex',flexDirection:'column',gap:3}}>
                        {item.ingredients.map((ing,i)=>(
                          <div key={i} style={{display:'flex',justifyContent:'space-between',background:'rgba(180,210,160,0.2)',borderRadius:8,padding:'6px 10px'}}>
                            <span style={{fontSize:13,color:'#2e4a22'}}>{ing.name}</span>
                            {ing.amount&&<span style={{fontSize:12,color:'#5a7848',fontWeight:600}}>{ing.amount}</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {item.steps&&<div style={{marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#4a7030',marginBottom:5}}>📋 配制步骤</div>
                    <div style={{fontSize:13,color:'#2e4a22',lineHeight:1.8,whiteSpace:'pre-wrap',background:'rgba(180,210,160,0.15)',borderRadius:8,padding:'8px 10px'}}>{item.steps}</div>
                  </div>}
                  {item.note&&<div style={{fontSize:12,color:'#7a9060',marginBottom:8}}>📝 {item.note}</div>}
                  <div style={{display:'flex',gap:8,marginTop:10}}>
                    <button className="btn btn-gray" style={{flex:1,fontSize:13,padding:'9px'}} onClick={()=>setEditItem(item)}>✏️ 修改</button>
                    <button className="btn btn-red" style={{padding:'9px 14px',fontSize:13}} onClick={()=>setDelConfirm(item)}>删除</button>
                  </div>
                </div>}
              </div>;
            })
        }
      </div>
      {delConfirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(40,65,25,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={()=>setDelConfirm(null)}>
          <div style={{background:'#f5f8f2',borderRadius:18,padding:'24px 20px',width:'100%',maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:600,color:'#2e4a22',marginBottom:18}}>确认删除「{delConfirm.name}」吗？</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-gray" style={{flex:1}} onClick={()=>setDelConfirm(null)}>取消</button>
              <button className="btn btn-red" style={{flex:1}} onClick={()=>delItem(delConfirm.id)}>确认删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function InventoryTab(){
  const{db,updateDb,toast}=useApp();
  const[view,setView]=useState(null);
  const[fabOpen,setFabOpen]=useState(false);
  const[showExportMenu,setShowExportMenu]=useState(false);
  useEffect(()=>{
    function onTabReset(e){if(e.detail==='inventory'){setView(null);setFabOpen(false);setShowExportMenu(false);}}
    window.addEventListener('tabReset',onTabReset);
    return()=>window.removeEventListener('tabReset',onTabReset);
  },[]);
  if(view?.type==='fert'||view?.type==='med'||view?.type==='soil')return<LibListPage type={view.type} onClose={()=>setView(null)}/>;
  if(view?.type==='recipe')return<RecipeListPage onClose={()=>setView(null)}/>;
  if(view?.type==='add_fert')return<FertMedForm type="fert" initItem={null} onClose={()=>setView(null)}/>;
  if(view?.type==='add_med') return<FertMedForm type="med"  initItem={null} onClose={()=>setView(null)}/>;
  if(view?.type==='add_soil')return<SoilForm initItem={null} onClose={()=>setView(null)}/>;
  if(view?.type==='add_recipe')return<RecipeForm initItem={null} onClose={()=>setView(null)}/>;
  if(view&&view.type==='archive')return<ArchivePage onClose={()=>setView(null)}/>;
  if(view&&view.type==='plantPicker')return<ExportPlantPicker onSelect={function(p){doExportPlant(p);}} onClose={()=>setView(null)}/>;
  async function withPhotos(plants){
    return Promise.all((plants||[]).map(async function(p){
      if(!p.photo||!PHOTO_IDB.isRef(p.photo))return p;
      const data=await PHOTO_IDB.get(p.photo.slice(6));
      return data?{...p,photo:data}:p;
    }));
  }
  function dlJson(obj,filename){
    const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
  }
  async function exportData(){
    // 完整备份（保持原函数名供 exportAll 调用）
    const plantsOut=await withPhotos(db.plants);
    const archivePlantsOut=await withPhotos((db.archive||{}).plants);
    const data={
      plants:plantsOut,fert:db.lib.fert,med:db.lib.med,soil:db.lib.soil,
      recipe:db.lib.recipe||[],prop:db.prop,
      archive:{...db.archive,plants:archivePlantsOut},
      courses:db.archive?.courses||[],
      exportTime:new Date().toISOString()
    };
    dlJson(data,'植物志备份_'+toDay()+'.json');
    toast.show('💾 完整备份已下载');
    setShowExportMenu(false);
  }
  async function doExportPlant(plant){
    setView(null);
    const plantsOut=await withPhotos([plant]);
    const batches=(db.prop||[]).filter(function(b){return b.parentId===plant.id;});
    const label=plant.name+(plant.variety?' '+plant.variety:'');
    const data={
      type:'plant',
      plant:plantsOut[0],
      propBatches:batches,
      exportTime:new Date().toISOString()
    };
    dlJson(data,'植物志_'+label+'_'+toDay()+'.json');
    toast.show('💾 '+label+' 备份已下载');
  }
  function exportInventory(){
    const data={
      type:'inventory',
      fert:db.lib.fert,med:db.lib.med,soil:db.lib.soil,recipe:db.lib.recipe||[],
      exportTime:new Date().toISOString()
    };
    dlJson(data,'植物志_库存_'+toDay()+'.json');
    toast.show('💾 库存备份已下载');
    setShowExportMenu(false);
  }
  function exportProp(){
    const data={
      type:'propagation',
      prop:db.prop||[],
      exportTime:new Date().toISOString()
    };
    dlJson(data,'植物志_繁育_'+toDay()+'.json');
    toast.show('💾 繁育记录备份已下载');
    setShowExportMenu(false);
  }
  function importData(){document.getElementById('import-file').click();}
  function handleImport(e){
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.plants))throw new Error('格式不正确');
        if(!confirm('将恢复 '+data.plants.length+' 株植物数据，现有数据将被覆盖。确认？'))return;
        // 将备份中的 base64 照片迁移到 IndexedDB
        async function migrateAndLoad(plants){
          return Promise.all((plants||[]).map(async function(p){
            if(!p.photo||PHOTO_IDB.isRef(p.photo)||!p.photo.startsWith('data:'))return p;
            const id=await savePhotoToIDB(p.photo);
            return{...p,photo:id};
          }));
        }
        Promise.all([migrateAndLoad(data.plants),migrateAndLoad((data.archive||{}).plants)]).then(function(res){
          const migratedPlants=res[0];
          const migratedArchivePlants=res[1];
          updateDb(function(){return{
            plants:migratedPlants,
            cats:data.cats||DEFAULT_CATS,
            lib:{fert:data.fert||[],med:data.med||[],soil:data.soil||[],recipe:data.recipe||[]},
            archive:{...(data.archive||{plants:[],batches:[]}),plants:migratedArchivePlants,courses:data.courses||[]},
            prop:data.prop||[]
          };});
          toast.show('✅ 数据恢复成功');
        });
      }catch(err){alert('导入失败：'+err.message);}
    };
    reader.readAsText(file);e.target.value='';
  }
  const cards=[
    {type:'fert', icon:'🌿',label:'肥料库',color:'rgba(140,195,110,0.25)',border:'rgba(120,175,90,0.4)',tc:'#2e4a22',cnt:db.lib.fert.length},
    {type:'med',  icon:'💊',label:'药品库',color:'rgba(210,155,120,0.2)',border:'rgba(190,135,100,0.4)',tc:'#5a3828',cnt:db.lib.med.length},
    {type:'soil', icon:'🪨',label:'盆土库',color:'rgba(190,165,120,0.2)',border:'rgba(170,145,100,0.4)',tc:'#4a3a20',cnt:db.lib.soil.length},
    {type:'recipe',icon:'🧪',label:'配方库',color:'rgba(215,185,250,0.2)',border:'rgba(185,155,220,0.4)',tc:'#4a2a68',cnt:(db.lib.recipe||[]).length},
    {type:'archive',icon:'📦',label:'档案库',color:'rgba(165,195,220,0.2)',border:'rgba(140,175,210,0.4)',tc:'#2a3a58',cnt:(db.archive?.plants?.length||0)+(db.archive?.batches?.length||0)+(db.archive?.courses?.length||0)},
  ];
  return(
    <div className="tab-content">
      <div className="sticky-bar"><h1>📦 库存</h1></div>
      <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {cards.map(c=>(
          <button key={c.type} style={{padding:'18px 8px',borderRadius:16,cursor:'pointer',fontFamily:'inherit',fontSize:15,fontWeight:600,background:c.color,border:'1.5px solid '+c.border,color:c.tc,display:'flex',flexDirection:'column',alignItems:'center',gap:7}} onClick={()=>setView({type:c.type})}>
            <span style={{fontSize:32}}>{c.icon}</span>
            <span>{c.label}</span>
            <span style={{fontSize:12,color:'#7a9060',fontWeight:400}}>{c.cnt}种</span>
          </button>
        ))}
      </div>
      <div style={{padding:'0 16px 20px',display:'flex',gap:8}}>
        <button className="btn btn-green" style={{flex:1}} onClick={()=>setShowExportMenu(v=>!v)}>💾 备份数据 ›</button>
        <button style={{flex:1,padding:'11px 16px',borderRadius:12,cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:600,background:'rgba(165,195,220,0.25)',border:'1px solid rgba(140,175,210,0.4)',color:'#384a68'}} onClick={importData}>📂 恢复数据</button>
      </div>
      <input type="file" id="import-file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
      {/* 备份选项菜单 */}
      {showExportMenu&&<div style={{position:'fixed',inset:0,zIndex:58}} onClick={()=>setShowExportMenu(false)}/>}
      {showExportMenu&&<div style={{position:'fixed',bottom:'calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 68px)',left:'max(calc(50% - 230px + 16px),16px)',zIndex:59,display:'flex',flexDirection:'column',gap:8}}>
        {[
          {icon:'💾',label:'完整备份',action:exportData},
          {icon:'🌿',label:'单株备份',action:function(){setView({type:'plantPicker'});setShowExportMenu(false);}},
          {icon:'🔬',label:'繁育记录',action:exportProp},
          {icon:'📚',label:'库存数据',action:exportInventory},
        ].map(function(opt){return(
          <button key={opt.label} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 16px',borderRadius:20,background:'#f5f8f2',border:'1px solid rgba(140,180,110,0.5)',boxShadow:'0 2px 10px rgba(40,70,20,.18)',cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:600,color:'#2e4a22',whiteSpace:'nowrap'}}
            onClick={opt.action}>
            <span style={{fontSize:18}}>{opt.icon}</span>{opt.label}
          </button>
        );})}
      </div>}
      {/* 库存 FAB */}
      {fabOpen&&<div style={{position:'fixed',inset:0,zIndex:59}} onClick={()=>setFabOpen(false)}/>}
      {fabOpen&&<div style={{position:'fixed',bottom:'calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 72px)',right:'max(calc(50% - 230px + 16px),16px)',zIndex:61,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
        {[
          {icon:'🌿',label:'肥料',type:'add_fert'},
          {icon:'💊',label:'药品',type:'add_med'},
          {icon:'🪨',label:'盆土',type:'add_soil'},
          {icon:'🧪',label:'配方',type:'add_recipe'},
        ].map(opt=>(
          <button key={opt.type} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderRadius:20,background:'#f5f8f2',border:'1px solid rgba(140,180,110,0.5)',boxShadow:'0 2px 10px rgba(40,70,20,.18)',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600,color:'#2e4a22',whiteSpace:'nowrap'}}
            onClick={()=>{setView({type:opt.type});setFabOpen(false);}}>
            <span style={{fontSize:18}}>{opt.icon}</span>{opt.label}
          </button>
        ))}
      </div>}
      <button className="fab" style={{zIndex:62,transform:fabOpen?'rotate(45deg)':'rotate(0deg)',transition:'transform 0.2s'}} onClick={()=>setFabOpen(f=>!f)}>＋</button>
    </div>
  );
}

// 12. App Root
// ═══════════════════════════════════════════════
const TAB_ORDER=['calendar','plants','breeding','inventory'];

function App(){
  const[db,setDb]=useState(()=>loadAll());
  const updateDb=useCallback(updater=>{
    setDb(prev=>{const next=typeof updater==='function'?updater(prev):updater;saveAll(next);return next});
  },[]);
  const[tab,setTab]=useState('calendar');
  const[jumpPlantId,setJumpPlantId]=useState(null);
  const toast=useToast();

  // 数据迁移：将旧版"定期给药"字段（medMode/mi/mc/mcStart）迁移到新的 activeCourse 结构
  useEffect(()=>{
    updateDb(prev=>{
      let changed=false;
      const plants=prev.plants.map(p=>{
        if(p.activeCourse!==undefined&&p.activeCourse!==null)return p;
        if(p.medMode==='scheduled'){
          changed=true;
          return{...p,activeCourse:{
            id:'c'+Date.now()+Math.random().toString(36).slice(2,6),
            drugName:'',reason:'',amount:'',
            interval:parseInt(p.mi)||30,
            total:parseInt(p.mc)||3,
            startDate:p.mcStart||toDay(),
          }};
        }
        if(p.activeCourse===undefined){changed=true;return{...p,activeCourse:null};}
        return p;
      });
      return changed?{...prev,plants}:prev;
    });
  },[]);

  function navToPlant(id,returnTab,logType){setJumpPlantId({id,returnTab:returnTab||null,logType:logType||null});setTab('plants');}

  const badge=db.plants.filter(p=>careAlerts(p).length>0).length;
  const ctx={db,updateDb,toast,navToPlant,setTab};
  window.__qlInit(db,updateDb,toast);

  // 四个主 Tab 横划切换
  useTabSwipe(TAB_ORDER,tab,setTab);

  const renderTab=()=>{
    switch(tab){
      case 'calendar':  return<CalendarTab key="calendar"/>;
      case 'plants':    return<PlantsTab key="plants" jumpPlantId={jumpPlantId} onJumpDone={()=>setJumpPlantId(null)}/>;
      case 'breeding':  return<BreedingTab key="breeding"/>;
      case 'inventory': return<InventoryTab key="inventory"/>;
      default:          return<CalendarTab key="calendar"/>;
    }
  };

  return(
    <Ctx.Provider value={ctx}>
      {renderTab()}
      <BottomNav tab={tab} onNav={setTab} badge={badge}/>
      {toast.el}
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// 快捷操作 - 纯原生JS，不经过Babel
(function(){
  var _db = null;
  var _updateDb = null;
  var _toast = null;

  // 新版 React app 通过这个接口传数据
  window.__qlInit = function(db, updateDb, toast) {

  };

  window.__qlOpen = function(type) {
    if (!_db) return;
    showSheet(type);
  };

  function toDay() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');

  function showSheet(type) {
    var ICON = {water:'💧', fert:'🌿', med:'💊'};

    var sel = {};
    var expanded = {};
    var allSel = false;

    var plants = _db.plants || [];
    var cats = [];

      if (p.category && cats.indexOf(p.category) < 0) cats.push(p.category);
    });
    cats.sort(function(a,b){ return a.localeCompare(b,'zh'); });

    function getSelCount() {
      return Object.keys(sel).filter(function(k){ return sel[k]; }).length;
    }

    function cb(checked, size) {
      var sz = size || 22;

      if (checked) { var s = document.createElement('span'); s.textContent = '✓'; s.style.cssText = 'color:white;font-size:'+(sz*0.65)+'px;line-height:1;'; d.appendChild(s); }
      return d;
    }

    function render() {
      var overlay = document.getElementById('__ql_overlay');
      if (!overlay) return;
      var sc = getSelCount();
      var list = overlay.querySelector('#__ql_list');
      if (!list) return;
      list.innerHTML = '';

      // 全部植物行
      var allRow = document.createElement('div');
      allRow.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 14px;background:'+(allSel?'rgba(140,185,110,0.3)':'rgba(255,255,255,0.6)')+';border-radius:12px;cursor:pointer;margin-bottom:10px;border:1.5px solid '+(allSel?'rgba(100,160,70,0.6)':'rgba(150,185,130,0.35)')+';';
      allRow.appendChild(cb(allSel));
      var allLbl = document.createElement('span'); allLbl.textContent = '全部植物'; allLbl.style.cssText = 'font-size:15px;font-weight:700;color:#2e4a22;';
      var allCnt = document.createElement('span'); allCnt.textContent = plants.length+'株'; allCnt.style.cssText = 'font-size:12px;color:#7a9060;margin-left:auto;';
      allRow.appendChild(allLbl); allRow.appendChild(allCnt);
      allRow.onclick = function() { allSel = !allSel; plants.forEach(function(p){ sel[p.id]=allSel; }); render(); };
      list.appendChild(allRow);

      // 各分类
      cats.forEach(function(cat) {
        var cp = plants.filter(function(p){ return p.category===cat; });
        var allCatSel = cp.length > 0 && cp.every(function(p){ return sel[p.id]; });
        var exp = !!expanded[cat];

        var catWrap = document.createElement('div'); catWrap.style.marginBottom = '8px';
        var catRow = document.createElement('div');
        catRow.style.cssText = 'display:flex;align-items:center;background:rgba(255,255,255,0.6);border-radius:12px;border:1.5px solid rgba(150,185,130,0.3);overflow:hidden;';

        var cbWrap = document.createElement('div'); cbWrap.style.cssText = 'padding:12px 10px 12px 14px;cursor:pointer;flex-shrink:0;';
        cbWrap.appendChild(cb(allCatSel));
        cbWrap.onclick = function(e) { e.stopPropagation(); var v=!allCatSel; cp.forEach(function(p){ sel[p.id]=v; }); allSel=plants.every(function(p){ return sel[p.id]; }); render(); };

        var catLabel = document.createElement('div'); catLabel.style.cssText = 'flex:1;padding:12px 10px 12px 0;cursor:pointer;display:flex;align-items:center;';
        var cn = document.createElement('span'); cn.textContent = cat; cn.style.cssText = 'font-size:14px;font-weight:600;color:#2e4a22;';
        var cc = document.createElement('span'); cc.textContent = cp.length+'株'; cc.style.cssText = 'font-size:12px;color:#7a9060;margin-left:8px;';
        var carr = document.createElement('span'); carr.textContent = exp?'▲':'▼'; carr.style.cssText = 'margin-left:auto;font-size:14px;color:#8aaa78;margin-right:4px;';
        catLabel.appendChild(cn); catLabel.appendChild(cc); catLabel.appendChild(carr);
        catLabel.onclick = function() { expanded[cat]=!expanded[cat]; render(); };

        catRow.appendChild(cbWrap); catRow.appendChild(catLabel);
        catWrap.appendChild(catRow);

        if (exp) {
          var pList = document.createElement('div'); pList.style.cssText = 'padding:4px 0 4px 14px;display:flex;flex-direction:column;gap:5px;';
          cp.forEach(function(p) {
            var s = !!sel[p.id];
            var pRow = document.createElement('div');
            pRow.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(255,255,255,0.55);border-radius:10px;cursor:pointer;border:1.5px solid '+(s?'rgba(100,160,70,0.5)':'rgba(150,185,130,0.25)')+';';
            pRow.appendChild(cb(s, 20));
            var pn = document.createElement('span'); pn.textContent = p.name; pn.style.cssText = 'font-size:14px;color:#2e4a22;';
            pRow.appendChild(pn);
            if (p.variety) { var pv = document.createElement('span'); pv.textContent = p.variety; pv.style.cssText = 'font-size:12px;color:#7a9060;margin-left:2px;'; pRow.appendChild(pv); }
            pRow.onclick = function() { sel[p.id]=!sel[p.id]; allSel=plants.every(function(pp){ return sel[pp.id]; }); render(); };
            pList.appendChild(pRow);
          });
          catWrap.appendChild(pList);
        }
        list.appendChild(catWrap);
      });

      // 未分类
      var np = plants.filter(function(p){ return !p.category; });
      if (np.length) {
        var exp2 = !!expanded['__none__'];
        var allNSel = np.every(function(p){ return sel[p.id]; });
        var nWrap = document.createElement('div'); nWrap.style.marginBottom = '8px';
        var nRow = document.createElement('div'); nRow.style.cssText = 'display:flex;align-items:center;background:rgba(255,255,255,0.6);border-radius:12px;border:1.5px solid rgba(150,185,130,0.3);overflow:hidden;';
        var ncbW = document.createElement('div'); ncbW.style.cssText = 'padding:12px 10px 12px 14px;cursor:pointer;flex-shrink:0;';
        ncbW.appendChild(cb(allNSel));
        ncbW.onclick = function(e) { e.stopPropagation(); var v=!allNSel; np.forEach(function(p){ sel[p.id]=v; }); allSel=plants.every(function(p){ return sel[p.id]; }); render(); };
        var nLabel = document.createElement('div'); nLabel.style.cssText = 'flex:1;padding:12px 10px 12px 0;cursor:pointer;display:flex;align-items:center;';
        var nn = document.createElement('span'); nn.textContent = '未分类'; nn.style.cssText = 'font-size:14px;font-weight:600;color:#7a9060;';
        var nc = document.createElement('span'); nc.textContent = np.length+'株'; nc.style.cssText = 'font-size:12px;color:#7a9060;margin-left:8px;';
        var na = document.createElement('span'); na.textContent = exp2?'▲':'▼'; na.style.cssText = 'margin-left:auto;font-size:14px;color:#8aaa78;margin-right:4px;';
        nLabel.appendChild(nn); nLabel.appendChild(nc); nLabel.appendChild(na);
        nLabel.onclick = function() { expanded['__none__']=!expanded['__none__']; render(); };
        nRow.appendChild(ncbW); nRow.appendChild(nLabel);
        nWrap.appendChild(nRow);
        if (exp2) {
          var npList = document.createElement('div'); npList.style.cssText = 'padding:4px 0 4px 14px;display:flex;flex-direction:column;gap:5px;';
          np.forEach(function(p) {
            var s = !!sel[p.id];
            var pRow = document.createElement('div');
            pRow.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(255,255,255,0.55);border-radius:10px;cursor:pointer;border:1.5px solid '+(s?'rgba(100,160,70,0.5)':'rgba(150,185,130,0.25)')+';';
            pRow.appendChild(cb(s, 20));
            var pn = document.createElement('span'); pn.textContent = p.name; pn.style.cssText = 'font-size:14px;color:#2e4a22;';
            pRow.appendChild(pn);
            if (p.variety) { var pv = document.createElement('span'); pv.textContent = p.variety; pv.style.cssText = 'font-size:12px;color:#7a9060;margin-left:2px;'; pRow.appendChild(pv); }
            pRow.onclick = function() { sel[p.id]=!sel[p.id]; allSel=plants.every(function(pp){ return sel[pp.id]; }); render(); };
            npList.appendChild(pRow);
          });
          nWrap.appendChild(npList);
        }
        list.appendChild(nWrap);
      }

      // 更新底部计数和按钮
      var cntEl = overlay.querySelector('#__ql_cnt');
      if (cntEl) cntEl.textContent = '已选 ' + sc + ' 株';
      var btn = overlay.querySelector('#__ql_btn');
      if (btn) btn.textContent = ICON[type] + ' 记录' + LABEL[type] + '（' + sc + '株）';
    }

    // 建 DOM
    var overlay = document.createElement('div');
    overlay.id = '__ql_overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(30,60,20,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;';
    overlay.onclick = function(e) { if (e.target===overlay) { document.body.removeChild(overlay); } };

    var sheet = document.createElement('div');
    sheet.style.cssText = 'background:#f0f5ec;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;';

    // 标题栏
    var hdr = document.createElement('div');
    hdr.style.cssText = 'padding:14px 18px 10px;border-bottom:1px solid rgba(150,185,130,0.3);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';
    var ttl = document.createElement('span'); ttl.textContent = ICON[type]+' 选择'+LABEL[type]+'对象'; ttl.style.cssText = 'font-size:16px;font-weight:700;color:#2e4a22;';
    var cls = document.createElement('button'); cls.textContent = '✕'; cls.style.cssText = 'background:none;border:none;cursor:pointer;font-size:22px;color:#7a9868;padding:0 4px;';
    cls.onclick = function() { document.body.removeChild(overlay); };
    hdr.appendChild(ttl); hdr.appendChild(cls);

    // 列表
    var listDiv = document.createElement('div');
    listDiv.id = '__ql_list';
    listDiv.style.cssText = 'overflow-y:auto;flex:1;padding:12px 16px;';

    // 底部
    var footer = document.createElement('div');
    footer.style.cssText = 'padding:10px 16px 20px;border-top:1px solid rgba(150,185,130,0.25);flex-shrink:0;';
    var cnt = document.createElement('div'); cnt.id = '__ql_cnt'; cnt.textContent = '已选 0 株'; cnt.style.cssText = 'font-size:12px;color:#7a9060;margin-bottom:8px;text-align:center;';
    var btn = document.createElement('button'); btn.id = '__ql_btn';
    btn.textContent = ICON[type]+' 记录'+LABEL[type]+'（0株）';
    btn.style.cssText = 'width:100%;padding:14px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;background:'+COLOR[type]+';border:none;color:white;';
    btn.onclick = function() {
      var ids = Object.keys(sel).filter(function(k){ return sel[k]; });
      if (!ids.length) { alert('请先选择植物'); return; }
      var today = toDay();
      _updateDb(function(prev) {
        var newCourses = (prev.archive&&prev.archive.courses)||[];
        var plants = prev.plants.map(function(p) {
          if (ids.indexOf(p.id) < 0) return p;
          var key = type==='water'?'waterLog':type==='fert'?'fertLog':'medLog';
          var entry = {date:today};
          // 给药：自动附加当前疗程ID
          if(type==='med'&&p.activeCourse) entry.courseId = p.activeCourse.id;
          var arr = (p[key]||[]).concat([entry]);
          arr.sort(function(a,b){ return a.date.localeCompare(b.date); });
          var np = Object.assign({},p); np[key]=arr;
          if(type==='water')np.waterPause=null;
          else if(type==='fert')np.fertPause=null;
          else if(type==='med'&&p.activeCourse){
            // 检查疗程是否已完成
            var total = Math.max(1,parseInt(p.activeCourse.total)||3);
            var given = arr.filter(function(r){ return !r.skip&&r.courseId===p.activeCourse.id; }).length;
            if(given>=total){
              newCourses = newCourses.concat([Object.assign({},p.activeCourse,{
                plantId:p.id,plantName:p.name,given:given,status:'done',endDate:today
              })]);
              np.activeCourse = null;
            }
          }
          return np;
        });
        return Object.assign({},prev,{plants:plants,archive:Object.assign({},prev.archive,{courses:newCourses})});
      });
      if (_toast) _toast.show('已为 '+ids.length+' 株记录'+LABEL[type]);
      document.body.removeChild(overlay);
    };
    footer.appendChild(cnt); footer.appendChild(btn);

    sheet.appendChild(hdr); sheet.appendChild(listDiv); sheet.appendChild(footer);
    overlay.appendChild(sheet);
    document.body.appendChild(overlay);
    render();
  }

  // ── 暂停菜单（从任务页"⏸ 跳过"按钮触发） ──
  window.__showPauseMenu = function(pid, type, plantName) {
    var ICON = {water:'💧', fert:'🌿'};
    var LABEL = {water:'浇水', fert:'施肥'};

    function addDaysStr(n) {
      var d = new Date();
      d.setDate(d.getDate() + n);
      return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
    }
    function fmtMD(s) {
      var p = s.slice(5).split('-');
      return p[0] + '月' + p[1] + '日';
    }

    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.38);display:flex;align-items:flex-end;justify-content:center;';

    sheet.appendChild(ttl);

    function makeRow(icon, label, sublabel, cb) {
      var btn = document.createElement('button');
      btn.style.cssText = 'width:100%;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.7);border:1px solid rgba(150,185,130,0.3);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-family:inherit;text-align:left;';

      main.style.cssText = 'font-size:14px;font-weight:600;color:#2e4a22;';
      main.textContent = label;
      wrap.appendChild(main);
      if (sublabel) {
        var sub = document.createElement('div');

      return btn;
    }

    var e2w = addDaysStr(14);
    var e1m = addDaysStr(30);
    var e3m = addDaysStr(90);

    sheet.appendChild(makeRow('⏭', '跳过一次', '本次不操作，下次提醒按正常周期计算', function() {
      if (window.__skipTask) window.__skipTask(pid, type);
    }));
    sheet.appendChild(makeRow('⏸', '暂停 2 周', '至 ' + fmtMD(e2w) + ' 后自动恢复提醒', function() {
      if (window.__pauseTask) window.__pauseTask(pid, type, e2w);
    }));
    sheet.appendChild(makeRow('⏸', '暂停 1 个月', '至 ' + fmtMD(e1m) + ' 后自动恢复提醒', function() {
      if (window.__pauseTask) window.__pauseTask(pid, type, e1m);
    }));
    sheet.appendChild(makeRow('⏸', '暂停 3 个月', '至 ' + fmtMD(e3m) + ' 后自动恢复提醒', function() {
      if (window.__pauseTask) window.__pauseTask(pid, type, e3m);
    }));
    sheet.appendChild(makeRow('🔕', '无限期暂停', '在植物详情页手动恢复后才会重新提醒', function() {
      if (window.__pauseTask) window.__pauseTask(pid, type, null);
    }));

    var cancel = document.createElement('button');
    cancel.style.cssText = 'width:100%;padding:12px;border-radius:12px;border:none;background:rgba(160,160,150,0.2);color:#7a8870;font-size:14px;font-family:inherit;cursor:pointer;margin-top:4px;';
    cancel.textContent = '取消';
    cancel.onclick = function() { document.body.removeChild(overlay); };
    sheet.appendChild(cancel);

    overlay.appendChild(sheet);
    overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
    document.body.appendChild(overlay);
  };

})();
</script>
</body>
</html>
