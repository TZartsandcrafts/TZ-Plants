function q(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function td(){return new Date().toISOString().slice(0,10);}
function ds(d){if(!d)return null;var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/);var dt=m?new Date(+m[1],+m[2]-1,+m[3]):new Date(d.replace(/-/g,'/'));return Math.floor((new Date()-dt)/86400000);}
function fmt(d){if(!d)return"—";return d.replace(/-/g,'/');}
function ld(log){return log&&log.length?log[log.length-1].date:null;}
function autoInt(n){for(var i=0;i<AI_R.length;i++){var r=AI_R[i];for(var j=0;j<r.k.length;j++){if(n.indexOf(r.k[j])>=0)return{wi:r.w,fi:r.f};}}return{wi:3,fi:14};}

function getStage(p){
if(p.finalPlantDate)return "established";
if(p.transplantDate)return "transplanted";
if(p.hardeningDate&&p.indoorStart==="indoor")return "hardening";
if(p.source==="seed"){if(p.germDate)return "seedling";if(p.sowDate)return "germinating";}
if(p.source==="cutting"||p.source==="graft"){if(p.rootDate)return "rooted";if(p.opDate)return "rooting";}
return "established";
}

function buildAdvice(p){
var temp=W.temp,hum=W.hum,rain=W.rain;
var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
var st=getStage(p),L=[];
var SL={germinating:"📍 播种期",rooting:"📍 生根期",rooted:"📍 已生根",seedling:"📍 幼苗期",transplanted:"📍 适应期",hardening:"📍 炼苗期"};
if(SL[st])L.push(SL[st]);
if(st==="germinating")L.push("💧 保持微湿，喷壶轻喷");
else if((wd==null?999:wd)>=p.wi)L.push(rain?"💧 今日有雨，控水":"💧 该浇水了，今天合适");
else L.push("💧 距下次浇水约"+(p.wi-wd)+"天");
if(st==="germinating"||st==="rooting")L.push("🌿 生长期前禁止施肥");
else if((fd==null?999:fd)>=p.fi)L.push(temp<10?"🌿 气温低，暂缓施肥":"🌿 可以施肥了");
else L.push("🌿 距下次施肥约"+(p.fi-fd)+"天");
return L.join("\n");
}

function loadPlants(){try{S.plants=JSON.parse(localStorage.getItem(SK))||[];}catch(e){S.plants=[];}}
function storePlants(){try{localStorage.setItem(SK,JSON.stringify(S.plants));}catch(e){}}

function render(){
var sy=window.scrollY;
var act=document.activeElement;
var actId=act?act.id:null;
document.getElementById('root').innerHTML=buildApp();
window.scrollTo(0,sy);
if(actId){var el=document.getElementById(actId);if(el)el.focus();}
}

function startAdd(){S.form=Object.assign({},BLANK);S.formTab='basic';S.showAdd=true;S.editId=null;render();}
function savePlant(){
var els=document.querySelectorAll('[data-field]');
els.forEach(el=>{S.form[el.dataset.field]=el.value;});
if(!S.form.name.trim()){alert('请输入名称');return;}
if(S.editId){S.plants=S.plants.map(p=>p.id===S.editId?Object.assign({},p,S.form):p);}
else{S.plants.push(Object.assign({id:Date.now().toString(),waterLog:[],fertLog:[],medLog:[]},S.form));}
S.showAdd=false;storePlants();render();
}
