// ═══ HELPERS ═══
function q(s){
  var str=String(s==null?"":s);
  str=str.replace(/&/g,"&amp;");
  str=str.replace(/</g,"&lt;");
  str=str.replace(/>/g,"&gt;");
  str=str.replace(/"/g,"&quot;");
  return str;
}
function td(){return new Date().toISOString().slice(0,10);}
function ds(d){
  if(!d)return null;
  var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  var dt=m?new Date(+m[1],+m[2]-1,+m[3]):new Date(d);
  return Math.floor((Date.now()-dt)/86400000);
}
function fmt(d){
  if(!d)return"—";
  var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m?m[1]+"/"+m[2]+"/"+m[3]:d;
}
function ld(log){return log&&log.length?log[log.length-1].date:null;}
var AI_R=[{k:["多肉","仙人掌"],w:10,f:30},{k:["玫瑰","月季"],w:2,f:10},{k:["薄荷","香草"],w:2,f:14},{k:["蝴蝶兰","兰花"],w:7,f:14},{k:["橡皮树","龟背竹"],w:5,f:21},{k:["绿萝","吊兰"],w:3,f:14},{k:["番茄","辣椒"],w:1,f:7}];
function autoInt(n){
  for(var i=0;i<AI_R.length;i++){
    var r=AI_R[i];
    for(var j=0;j<r.k.length;j++){if(n.indexOf(r.k[j])>=0)return{wi:r.w,fi:r.f};}
  }
  return{wi:3,fi:14};
}

// ═══ STAGE & ADVICE ═══
function getStage(p){
  if(p.finalPlantDate)return"established";
  if(p.transplantDate)return"transplanted";
  if(p.hardeningDate&&p.indoorStart==="indoor")return"hardening";
  if(p.source==="seed"){if(p.germDate)return"seedling";if(p.sowDate)return"germinating";}
  if(p.source==="cutting"||p.source==="graft"){if(p.rootDate)return"rooted";if(p.opDate)return"rooting";}
  if(p.source==="division"&&p.opDate&&!p.prePlantDate)return"recovering";
  return"established";
}

function buildAdvice(p){
  var temp=W.temp,hum=W.hum,pre=W.pre,rain=W.rain;
  var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog));
  var st=getStage(p),L=[];
  var SL={germinating:"📍 播种期",rooting:"📍 扦插/嫁接生根期",rooted:"📍 已生根待移栽",seedling:"📍 幼苗期",recovering:"📍 分株恢复期",transplanted:"📍 移栽适应期",hardening:"📍 炼苗期"};
  if(SL[st])L.push(SL[st]);
  // water
  if(st==="germinating")L.push("💧 保持基质微湿，用喷壶轻喷");
  else if(st==="rooting")L.push(hum>75?"💧 湿度偏高，基质微湿即可":"💧 保持基质湿润不积水，可叶面喷雾");
  else if(st==="hardening"){var hd=p.hardeningDate?ds(p.hardeningDate):0;L.push("💧 炼苗期适度控水（第"+hd+"/"+(p.hardeningDays||7)+"天）");}
  else if(st==="seedling"||st==="recovering"||st==="transplanted")L.push((wd==null?999:wd)>=p.wi?"💧 适量浇水，表土略干再浇":"💧 距下次浇水约"+(p.wi-wd)+"天");
  else if((wd==null?999:wd)>=p.wi)L.push(rain||pre>3?"💧 今日有雨，可少量补水":hum>80?"💧 湿度"+hum+"%，建议减少浇水":temp>28?"💧 气温"+temp+"°C偏高，避开正午浇水":"💧 该浇水了"+(wd!=null?"（已"+wd+"天）":"")+"，今天合适");
  else L.push("💧 距下次浇水约"+(p.wi-wd)+"天");
  // fert
  if(st==="germinating")L.push("🌿 发芽前禁止施肥");
  else if(st==="rooting")L.push("🌿 生根前禁止施肥，会灼伤切口");
  else if(st==="rooted")L.push((fd==null?999:fd)>=p.fi?"🌿 已生根，可施1/2浓度稀薄液肥":"🌿 距下次施肥约"+(p.fi-fd)+"天");
  else if(st==="seedling"){var sd=p.germDate?ds(p.germDate):null;L.push(sd!==null&&sd<14?"🌿 出芽"+sd+"天，待2片真叶后施1/4浓度液肥":(fd==null?999:fd)>=p.fi?"🌿 可施1/4浓度极稀薄液肥":"🌿 距下次施肥约"+(p.fi-fd)+"天");}
  else if(st==="recovering"||st==="transplanted")L.push(st==="recovering"?"🌿 分株恢复期暂缓施肥":"🌿 移栽适应期暂缓施肥，约2周后再施");
  else if(st==="hardening")L.push("🌿 炼苗期停止施肥");
  else if((fd==null?999:fd)>=p.fi)L.push(temp<10?"🌿 气温偏低，可暂缓施肥":rain||pre>8?"🌿 雨天施肥易流失，雨后再施":"🌿 可以施肥了"+(fd!=null?"（已"+fd+"天）":"")+"，晴天效果好");
  else L.push("🌿 距下次施肥约"+(p.fi-fd)+"天");
  // med
  var lm=ld(p.medLog);
  if(p.medMode==="symptom"){if(lm)L.push("💊 上次给药："+ds(lm)+"天前（点击记录新症状）");else L.push("💊 出现病虫害时点击记录给药");}
  // hardening progress
  if(st==="hardening"){var hd2=p.hardeningDate?ds(p.hardeningDate):0;var left=Math.max(0,(p.hardeningDays||7)-hd2);L.push(left>0?"🌤️ 炼苗进度："+hd2+"/"+(p.hardeningDays||7)+"天，还需约"+left+"天":"✅ 炼苗完成，可移栽或定植！");}
  if(hum<30)L.push("💦 空气干燥，可向叶面喷水");
  if(temp>32)L.push("🌡️ 高温，注意遮阴");
  if(temp<5)L.push("🧣 低温，移入室内防冻");
  return L.join("\n");
}

function render(){

function setFormField(k,v){if(S.formData)S.formData[k]=v;
  // auto genus lookup
  if(k==="name"&&S.formData){var g=lookupGenus(v);if(g&&!S.formData.type)S.formData.type=g;}
  // auto intervals
  if(k==="name"&&S.formData){var ai=autoInt(v);S.formData.wi=ai.wi;S.formData.fi=ai.fi;}

function saveForm(){
  if(!S.formData||!S.formData.name.trim())return;
  if(S.editId){
    S.plants=S.plants.map(function(p){return p.id===S.editId?S.formData:p;});

  } else {
    S.formData.id=Date.now().toString();
    S.formData.waterLog=S.formData.waterLog||[];
    S.formData.fertLog=S.formData.fertLog||[];
    S.formData.medLog=S.formData.medLog||[];

// ═══ PLANT CARD ═══
function buildPlantCard(p){
  var wd=ds(ld(p.waterLog)),fd=ds(ld(p.fertLog)),md=ds(ld(p.medLog));
  var wu=(wd==null?999:wd)>=p.wi,fu=(fd==null?999:fd)>=p.fi;
  var src=null;for(var i=0;i<SRCS.length;i++){if(SRCS[i].key===p.source){src=SRCS[i];break;}}
  var cat=null;for(var j=0;j<CATS.length;j++){if(CATS[j].key===p.category){cat=CATS[j];break;}}
  var startDate=p.sowDate||p.buyDate||p.opDate;
  var adv=buildAdvice(p);
  var showInfo=(S["info_"+p.id]===true);

  // timeline
  var items=[];
  function pT(icon,label,date,note,color){if(date)items.push({icon:icon,label:label,date:date,note:note,color:color});}
  if(p.source==="seed"){
    pT("🌱","播种",p.sowDate,[p.indoorStart?"环境："+(p.indoorStart==="indoor"?"室内":"室外"):"",p.sowMethod?"方式："+p.sowMethod:"",p.seedSource?"种子来源："+p.seedSource:""].filter(function(x){return x;}).join("\n"),"#5a8040");
    pT("🌿","发芽",p.germDate,p.germNotes||"","#6a9040");
  }
  if(p.source==="sapling"||p.source==="mature"||p.source==="other")pT(src?src.icon:"🛒","购入",p.buyDate,[p.buyFrom?"来源："+p.buyFrom:"",p.buySpec?"规格："+p.buySpec:""].filter(function(x){return x;}).join("\n"),"#5a7898");
  if(p.source==="cutting"){pT("✂️","扦插",p.opDate,[p.indoorStart?"环境："+(p.indoorStart==="indoor"?"室内":"室外"):"",p.buyFrom?"插穗来源："+p.buyFrom:"",p.opNotes?"备注："+p.opNotes:""].filter(function(x){return x;}).join("\n"),"#7a6848");pT("🌱","生根/成活",p.rootDate,"","#5a8040");}
  if(p.source==="graft"){pT("🔗","嫁接",p.opDate,[p.indoorStart?"环境："+(p.indoorStart==="indoor"?"室内":"室外"):"",p.buyFrom?"砧木来源："+p.buyFrom:"",p.opNotes?"备注："+p.opNotes:""].filter(function(x){return x;}).join("\n"),"#7a6848");pT("✅","成活确认",p.rootDate,"","#5a8040");}
  if(p.source==="division")pT("🌾","分株",p.opDate,[p.buyFrom?"母株："+p.buyFrom:"",p.opNotes?"备注："+p.opNotes:""].filter(function(x){return x;}).join("\n"),"#7a6848");
  if(p.hardeningDate&&p.indoorStart==="indoor"){var hd3=ds(p.hardeningDate),tgt=p.hardeningDays||7,done=hd3>=tgt;pT("🌤️","炼苗"+(done?"（完成）":"（进行中）"),p.hardeningDate,["计划"+tgt+"天"+(done?"":("，已"+hd3+"天")),p.hardeningNotes?"备注："+p.hardeningNotes:""].filter(function(x){return x;}).join("\n"),"#8a7a30");}

// ═══ LOG MODAL ═══
var logEditIdx=null;
var logForm={date:"",note:"",name:"",reason:"",amount:""};
function openLog(pid,type){S.logPlantId=pid;S.logType=type;logEditIdx=null;logForm={date:td(),note:"",name:"",reason:"",amount:""};render();}
function closeLog(){S.logPlantId=null;S.logType=null;logEditIdx=null;render();}
function setLogField(k,v){logForm[k]=v;}
function startLogEdit(idx){
  var p=S.plants.filter(function(x){return x.id===S.logPlantId;})[0];
  if(!p)return;
  var log=S.logType==="water"?p.waterLog:S.logType==="fert"?p.fertLog:p.medLog;
  var r=log[idx];
  logEditIdx=idx;logForm={date:r.date,note:r.note||"",name:r.name||"",reason:r.reason||"",amount:r.amount||""};
  render();
}
function saveLog(){
  var p=S.plants.filter(function(x){return x.id===S.logPlantId;})[0];if(!p)return;
  var rec={date:logForm.date};
  if(S.logType==="fert"){rec.name=logForm.name;rec.amount=logForm.amount;rec.note=logForm.note;}
  else if(S.logType==="med"){rec.name=logForm.name;rec.reason=logForm.reason;rec.amount=logForm.amount;rec.note=logForm.note;}
  else{rec.note=logForm.note;}
  var log=S.logType==="water"?(p.waterLog||(p.waterLog=[])):S.logType==="fert"?(p.fertLog||(p.fertLog=[])):( p.medLog||(p.medLog=[]));
  if(logEditIdx!==null)log[logEditIdx]=rec;
  else{log.push(rec);log.sort(function(a,b){return a.date.localeCompare(b.date);});}
  logEditIdx=null;logForm={date:td(),note:"",name:"",reason:"",amount:""};
  storePlants();render();
}
function delLog(idx){
  var p=S.plants.filter(function(x){return x.id===S.logPlantId;})[0];if(!p)return;
  var log=S.logType==="water"?p.waterLog:S.logType==="fert"?p.fertLog:p.medLog;
  log.splice(idx,1);storePlants();render();
}

  var histHtml=[].concat(log).reverse().map(function(r,ri){

      '<div style="display:flex;gap:5px"><button onclick="startLogEdit('+oi+')" style="background:none;border:none;cursor:pointer;font-size:13px;color:#7a9868">✏️</button>'+
      '<button onclick="confirm2(\'确认删除这条记录吗？\',function(){delLog('+oi+');})" style="background:none;border:none;cursor:pointer;font-size:13px;color:#b07060">🗑</button></div>'+
      '</div></div>';
  }).join("");
  return '<div style="position:fixed;inset:0;background:rgba(50,80,30,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeLog()">'+
    '<div style="background:#f0f5ec;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden">'+
    '<div style="padding:14px 18px 10px;border-bottom:1px solid rgba(150,185,130,0.3);display:flex;justify-content:space-between;align-items:center"><span style="font-size:15px;font-weight:700;color:#2e4a22">'+icon+' '+label+'记录</span><button onclick="closeLog()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#7a9868">✕</button></div>'+
    '<div style="padding:12px 18px;border-bottom:1px solid rgba(150,185,130,0.2);background:rgba(200,225,185,0.2)">'+

    '<div style="display:flex;flex-direction:column;gap:7px">'+
    '<div><div style="'+LB()+'">日期</div><input type="date" value="'+q(logForm.date)+'" max="'+td()+'" onchange="setLogField(\'date\',this.value)" style="'+FS+'color-scheme:light;"/></div>'+
    extraFields+
    '<div><div style="'+LB()+'">'+(type==="water"?"备注（可选）":"备注")+'</div><textarea oninput="setLogField(\'note\',this.value)" placeholder="'+(type==="water"?"浇水量、方式…":type==="fert"?"施肥观察…":"用药后观察…")+'" rows="2" style="'+FS+'resize:vertical;line-height:1.6">'+q(logForm.note)+'</textarea></div>'+

// ═══ CALENDAR MODAL ═══
function openCal(pid){S.calPlantId=pid;S.calYr=new Date().getFullYear();S.calMo=new Date().getMonth();S.calSel=null;render();}
function closeCal(){S.calPlantId=null;render();}
function calPrev(){if(S.calMo===0){S.calYr--;S.calMo=11;}else S.calMo--;S.calSel=null;render();}
function calNext(){if(S.calMo===11){S.calYr++;S.calMo=0;}else S.calMo++;S.calSel=null;render();}
function calClick(d){S.calSel=S.calSel===d?null:d;render();}

function buildCalModal(){
  var p=S.plants.filter(function(x){return x.id===S.calPlantId;})[0];if(!p)return"";
  var TC={water:"#5090d0",fert:"#5a9848",med:"#d07050",milestone:"#8060a0"};
  var TL={water:"💧浇水",fert:"🌿施肥",med:"💊给药",milestone:"📌里程碑"};
  var evMap={};
  function addEv(type,log){(log||[]).forEach(function(r){if(!evMap[r.date])evMap[r.date]=[];evMap[r.date].push(Object.assign({type:type},r));});}
  addEv("water",p.waterLog);addEv("fert",p.fertLog);addEv("med",p.medLog);
  [[p.sowDate,"🌱播种"],[p.germDate,"🌿发芽"],[p.buyDate,"🛒购入"],[p.opDate,"✂️扦插/嫁接"],[p.rootDate,"🌱生根"],[p.hardeningDate,"🌤️炼苗"],[p.prePlantDate,"🪴假植"],[p.transplantDate,"🔄移栽"],[p.finalPlantDate,"📍定植"]].forEach(function(x){if(x[0]){if(!evMap[x[0]])evMap[x[0]]=[];evMap[x[0]].push({type:"milestone",label:x[1],date:x[0]});}});
  var fd=new Date(S.calYr,S.calMo,1).getDay();
  var dm=new Date(S.calYr,S.calMo+1,0).getDate();
  var tod=td();
  var MN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  var cells="";
  for(var i=0;i<fd;i++)cells+='<div></div>';
  for(var d=1;d<=dm;d++){
    var dStr=S.calYr+"-"+(S.calMo+1<10?"0"+(S.calMo+1):S.calMo+1)+"-"+(d<10?"0"+d:d);
    var evts=evMap[dStr]||[];
    var isT=dStr===tod,isS=S.calSel===dStr;
    var dots=[].concat(evts).map(function(e){return e.type;}).filter(function(v,i2,a){return a.indexOf(v)===i2;}).map(function(t){return '<div style="width:6px;height:6px;border-radius:50%;background:'+(TC[t]||"#888")+'"></div>';}).join("");

      '<div style="display:flex;justify-content:center;gap:2px;margin-top:2px;flex-wrap:wrap">'+dots+'</div></div>';
  }
  var selEvts=S.calSel?(evMap[S.calSel]||[]):[];
  var selHtml=S.calSel?'<div style="margin:0 12px 16px;background:rgba(255,255,255,0.65);border-radius:12px;padding:12px 14px;border:1px solid rgba(150,185,130,0.4)">'+
    '<div style="font-size:12px;font-weight:700;color:#2e4a22;margin-bottom:8px">'+fmt(S.calSel)+' 的操作</div>'+
    (selEvts.length===0?'<div style="font-size:12px;color:#9aaa88">无记录</div>':selEvts.map(function(e,i){
      return '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:'+(i<selEvts.length-1?"1px solid rgba(150,185,130,0.2)":"none")+'">'+

        (e.type==="milestone"&&e.label?'<div style="font-size:11px;color:#7a9060;margin-top:2px">'+q(e.label)+'</div>':'')+
        (e.name?'<div style="font-size:11px;color:#4a6a38;margin-top:2px">名称：'+q(e.name)+'</div>':'')+
        (e.amount?'<div style="font-size:11px;color:#6a8858;margin-top:1px">用量：'+q(e.amount)+'</div>':'')+
        (e.reason?'<div style="font-size:11px;color:#9a7040;margin-top:1px">病症：'+q(e.reason)+'</div>':'')+
        (e.note?'<div style="font-size:11px;color:#7a9060;margin-top:1px">备注：'+q(e.note)+'</div>':'')+'</div>';
    }).join(""))+'</div>':"";

    '<div style="background:#f0f5ec;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden">'+
    '<div style="padding:14px 18px 10px;border-bottom:1px solid rgba(150,185,130,0.3);display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:700;color:#2e4a22">📅 '+q(p.name)+' · 操作日历</span><button onclick="closeCal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#7a9868">✕</button></div>'+
    '<div style="flex:1;overflow-y:auto">'+

        (S.libTab==="med"?'<div style="margin-top:8px;background:rgba(255,220,180,0.3);border-radius:8px;padding:7px 10px"><div style="font-size:11px;font-weight:700;color:#7a4020;margin-bottom:2px">🎯 防治对象</div><div style="font-size:11px;color:#6a4030;line-height:1.6">'+q(item.target||"")+'</div></div>':"")+

    }

      '<button onclick="toggleLib(\''+item.id+'\')" style="width:100%;background:none;border:none;cursor:pointer;font-family:inherit;padding:11px 14px;display:flex;align-items:center;gap:10px;text-align:left">'+

      '<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:13px;font-weight:700;color:#2e4a22">'+q(item.name)+'</span>'+
      '<span style="font-size:10px;background:rgba(150,190,120,0.25);border-radius:10px;padding:1px 7px;color:#5a7840">'+q(item.type)+'</span>'+
      (S.libTab==="fert"&&item.npk?'<span style="font-size:10px;color:#7a9060">NPK '+q(item.npk)+'</span>':"")+(S.libTab==="med"&&item.chemical?'<span style="font-size:10px;color:#8a8060">'+q(item.chemical)+'</span>':"")+'</div>'+
      '<div style="font-size:11px;color:#7a9060;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(S.libTab==="fert"?q(item.desc):q(item.target||""))+'</div></div>'+
      '<span style="font-size:11px;color:#8aaa78;flex-shrink:0">'+(exp?"▲":"▼")+'</span></button>'+detHtml+'</div>';
  }).join("");
  var tabs=[["fert","🌿 肥料库"],["med","💊 药品库"]].map(function(x){return '<button onclick="setLibTab(\''+x[0]+'\')" style="flex:1;padding:10px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:'+(S.libTab===x[0]?700:400)+';background:'+(S.libTab===x[0]?"rgba(180,210,160,0.35)":"transparent")+';border:none;border-bottom:'+(S.libTab===x[0]?"2px solid #5a8040":"2px solid transparent")+';color:'+(S.libTab===x[0]?"#2e4a22":"#7a9868")+'">'+x[1]+'</button>';}).join("");
  return '<div style="position:fixed;inset:0;background:rgba(50,80,30,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeLib()">'+
    '<div style="background:#f0f5ec;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden">'+
    '<div style="padding:14px 18px 10px;border-bottom:1px solid rgba(150,185,130,0.3);display:flex;justify-content:space-between;align-items:center"><span style="font-size:15px;font-weight:700;color:#2e4a22">📚 养护库</span><button onclick="closeLib()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#7a9868">✕</button></div>'+
    '<div style="display:flex;border-bottom:1px solid rgba(150,185,130,0.3)">'+tabs+'</div>'+
    '<div style="padding:10px 14px;border-bottom:1px solid rgba(150,185,130,0.2)"><div style="position:relative"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#8aaa78">🔍</span><input id="lib_search" value="'+q(S.libSearch||"")+'" oninput="setLibSearch(this.value)" placeholder="'+(S.libTab==="fert"?"搜索肥料名称、类型…":"搜索药品、目标病虫害…")+'" style="'+FS+'padding-left:30px;background:rgba(255,255,255,0.6);"/>'+(S.libSearch?'<button onclick="setLibSearch(\'\')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:13px;color:#8aaa78">✕</button>':"")+'</div></div>'+
    '<div style="flex:1;overflow-y:auto;padding:10px 14px">'+(filtered.length===0?'<div style="text-align:center;padding:30px 0;color:#9aaa88;font-size:12px">未找到匹配项</div>':items)+'</div>'+
    '<div style="padding:8px 16px;text-align:center;font-size:10px;color:#8a9a7a;border-top:1px solid rgba(150,185,130,0.2)">'+(S.libTab==="fert"?"共 "+FERT_DB.length+" 种常用肥料":"共 "+MED_DB.length+" 种常用药品")+" · 仅供参考</div></div></div>";
}

// ═══ MAIN APP ═══
function setSearch(v){S.search=v;render();}
function buildApp(){
  var urgent=S.plants.filter(function(p){var w=ds(ld(p.waterLog)),f=ds(ld(p.fertLog));return(w==null?999:w)>=p.wi||(f==null?999:f)>=p.fi;}).length;
  var usedCats=[];S.plants.forEach(function(p){if(p.category&&usedCats.indexOf(p.category)<0)usedCats.push(p.category);});
  var list=S.plants.slice();
  if(S.filterCat!=="all")list=list.filter(function(p){return p.category===S.filterCat;});
  if(S.search.trim()){var sq=S.search.toLowerCase();list=list.filter(function(p){return[p.name,p.variety,p.type,p.notes,p.finalPlantLocation].some(function(s){return s&&s.toLowerCase().indexOf(sq)>=0;});});}
  list.sort(function(a,b){if(S.sortBy==="name")return a.name.localeCompare(b.name,"zh");if(S.sortBy==="category")return(a.category||"").localeCompare(b.category||"");if(S.sortBy==="planted")return(b.finalPlantDate||"").localeCompare(a.finalPlantDate||"");if(S.sortBy==="location")return(a.finalPlantLocation||"").localeCompare(b.finalPlantLocation||"","zh");return a.id.localeCompare(b.id);});
  var catFilter=usedCats.length>0?('<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px"><button onclick="S.filterCat=\'all\';render()" style="'+gbtn(S.filterCat==="all")+'">全部</button>'+CATS.filter(function(c){return usedCats.indexOf(c.key)>=0;}).map(function(c){return '<button onclick="S.filterCat=\''+c.key+'\';render()" style="'+gbtn(S.filterCat===c.key)+'">'+c.icon+" "+c.label+'</button>';}).join("")+'</div>'):"";
  var sortBtns=SORTS.map(function(s){return '<button onclick="S.sortBy=\''+s.key+'\';render()" style="'+gbtn(S.sortBy===s.key)+'padding:3px 10px;border-radius:14px;">'+s.label+'</button>';}).join("");
  var plantRows=list.map(function(p){return S.editId===p.id?buildPlantForm():buildPlantCard(p);}).join("");
  return '<div style="min-height:100vh;padding-bottom:52px">'+
    '<div style="padding:28px 20px 16px;text-align:center;border-bottom:1px solid rgba(90,120,70,0.2)">'+
    '<div style="font-size:10px;letter-spacing:4px;color:#7a9870;text-transform:uppercase;margin-bottom:5px">智能植物养护</div>'+
    '<h1 style="font-size:29px;color:#3d5c30;margin:0;font-weight:700">'+APPNAME+'</h1>'+
    '<div style="margin-top:10px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">'+
    (urgent>0?'<div style="background:rgba(210,150,60,0.18);border:1px solid rgba(180,130,50,0.4);border-radius:20px;padding:3px 14px;font-size:12px;color:#7a5010">⚠️ '+urgent+'株植物待处理</div>':"")+
    '<button onclick="openLib(\'fert\')" style="background:rgba(150,195,130,0.2);border:1px solid rgba(130,175,110,0.4);border-radius:20px;padding:3px 14px;font-size:12px;color:#3a5a28;cursor:pointer;font-family:inherit">🌿 肥料库</button>'+
    '<button onclick="openLib(\'med\')" style="background:rgba(210,160,130,0.2);border:1px solid rgba(190,140,110,0.4);border-radius:20px;padding:3px 14px;font-size:12px;color:#5a3a28;cursor:pointer;font-family:inherit">💊 药品库</button>'+
    '</div></div>'+
    '<div style="max-width:460px;margin:0 auto;padding:0 16px">'+
    // Weather card
    '<div style="background:rgba(255,255,255,0.55);border:1px solid rgba(150,185,130,0.5);border-radius:18px;padding:17px 19px;margin-top:18px">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
    '<div><div style="font-size:11px;color:#6a8a5a;margin-bottom:4px">📍 '+q(W.loc)+'</div><div style="font-size:31px;color:#2e4a22">'+W.emo+' '+W.temp+'°C</div><div style="font-size:12px;color:#7a9868;margin-top:2px">'+W.cond+'</div></div>'+
    '<div style="text-align:right;font-size:12px;color:#6a8858;line-height:2.2"><div>💧 湿度 '+W.hum+'%</div><div>'+(W.rain?"🌧 有降水":"☀️ 无降水")+'</div><div style="font-size:10px;color:#8a9a7a;margin-top:4px">更新：'+q(W.upd)+'</div></div></div>'+
    '<div style="display:flex;gap:6px;margin-top:12px">'+W.fc.map(function(f){return '<div style="flex:1;background:rgba(180,210,155,0.3);border-radius:8px;padding:7px 4px;text-align:center;font-size:11px;color:#4a6a3a"><div style="font-size:17px">'+f.e+'</div><div>'+f.d+'</div><div style="font-size:10px;color:#6a8858">'+f.t+'</div></div>';}).join("")+'</div>'+
    '<div style="margin-top:10px;background:rgba(175,210,155,0.3);border-radius:8px;padding:7px 12px;font-size:12px;color:#4a6838">💡 '+q(W.tip)+'</div>'+
    '<div style="margin-top:7px;font-size:10px;color:#8a9a7a;text-align:center">每次打开自动更新天气</div></div>'+
    // Search & filter
    '<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">'+
    '<div style="position:relative"><span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:#8aaa78">🔍</span>'+
    '<input id="search_inp" value="'+q(S.search)+'" oninput="setSearch(this.value)" placeholder="搜索名称、品种、位置…" style="'+FS+'padding-left:32px;background:rgba(255,255,255,0.6);"/>'+
    (S.search?'<button onclick="setSearch(\'\')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#8aaa78">✕</button>':"")+'</div>'+
    catFilter+
    '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#8aaa78;white-space:nowrap">排序：</span><div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px">'+sortBtns+'</div></div></div>'+
    // Plant list
    '<div style="margin-top:14px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">'+
    '<div style="font-size:11px;color:#6a8858">我的植物 '+(list.length<S.plants.length?"("+list.length+"/"+S.plants.length+")":"("+S.plants.length+")")+'</div>'+
    '<button onclick="'+(S.showAdd?"S.showAdd=false;S.editId=null;render()":"startAdd()")+'" style="padding:6px 15px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:12px;background:'+(S.showAdd?"rgba(220,160,155,0.25)":"rgba(160,200,135,0.3)")+';border:1px solid '+(S.showAdd?"rgba(200,120,115,0.4)":"rgba(130,175,105,0.5)")+';color:'+(S.showAdd?"#7a2020":"#2e4a22")+'">'+(S.showAdd?"✕ 取消":"+ 添加植物")+'</button></div>'+
    (S.showAdd?buildPlantForm():"")+
    (S.plants.length===0&&!S.showAdd?'<div style="text-align:center;padding:44px 0"><div style="font-size:40px;margin-bottom:10px">🪴</div><div style="font-size:12px;color:#8a9e78;line-height:2.4">还没有植物<br/>点击「+ 添加植物」开始</div></div>':"")+
    (S.plants.length>0&&list.length===0?'<div style="text-align:center;padding:30px 0;color:#8aaa78;font-size:12px">没有符合条件的植物</div>':"")+
    '<div style="display:flex;flex-direction:column;gap:11px">'+plantRows+'</div></div>'+
    '<div style="text-align:center;margin-top:30px;font-size:10px;color:#8a9a7a;line-height:2">植物数据本地保存 · 天气自动更新</div></div></div>';
}

// ═══ WEATHER AUTO-UPDATE ═══
function fetchWeather(){
  var url="https://api.open-meteo.com/v1/forecast?latitude=49.1042&longitude=-122.8231&current=temperature_2m,relative_humidity_2m,precipitation,weather_code&daily=weather_code&timezone=America/Vancouver&forecast_days=3";
  fetch(url).then(function(r){return r.json();}).then(function(d){
    var c=d.current;
    var codes=d.daily&&d.daily.weather_code?d.daily.weather_code:[];
    function wD(code){
      if(code<=1)return{cond:"晴天",emo:"☀️",rain:false};
      if(code<=3)return{cond:"多云",emo:"⛅",rain:false};
      if(code<=49)return{cond:"有雾",emo:"🌫️",rain:false};
      if(code<=67)return{cond:"降雨",emo:"🌧️",rain:true};
      if(code<=77)return{cond:"降雪",emo:"❄️",rain:false};
      if(code<=82)return{cond:"阵雨",emo:"🌦️",rain:true};
      return{cond:"雷雨",emo:"⛈️",rain:true};
    }
    var wi=wD(c.weather_code);
    var days=["今天","明天","后天"];
    W.temp=Math.round(c.temperature_2m);
    W.hum=c.relative_humidity_2m;
    W.pre=c.precipitation||0;
    W.cond=wi.cond;W.emo=wi.emo;W.rain=wi.rain;
    W.fc=codes.slice(0,3).map(function(code,i){var fi=wD(code);return{d:days[i],e:fi.emo,t:fi.cond};});
    var tip="";
    if(wi.rain||W.pre>3)tip="今日有降水，注意减少浇水";
    else if(W.hum>80)tip="湿度偏高（"+W.hum+"%），浇水适量即可";
    else if(W.temp>30)tip="气温偏高（"+W.temp+"°C），注意防晒遮阴";
    else if(W.temp<5)tip="气温偏低，注意防寒保温";
    else tip="天气适宜，可按常规养护计划进行";
    W.tip=tip;
    var now=new Date();
    W.upd=now.getFullYear()+"年"+(now.getMonth()+1)+"月"+now.getDate()+"日 "+now.getHours()+":"+(now.getMinutes()<10?"0":"")+now.getMinutes();
    render();
  }).catch(function(){W.upd="天气获取失败，请检查网络";render();});
}

// ═══ INIT ═══
render();
fetchWeather();
</script>
