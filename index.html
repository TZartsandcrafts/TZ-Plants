<title>植物志</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:linear-gradient(150deg,#dce8d8 0%,#c8dcc0 50%,#d4e4cc 100%);background-attachment:fixed;color:#2e4a22;min-height:100vh}
#root{max-width:460px;margin:0 auto;min-height:100vh}
button{-webkit-tap-highlight-color:transparent}
input::placeholder,textarea::placeholder{color:#9aaa88}
input[type=date]{-webkit-appearance:none;color-scheme:light}

/* 全屏页面 */
.fullpage{
  min-height:100vh;
  background:linear-gradient(150deg,#dce8d8,#c8dcc0,#d4e4cc);
  padding-bottom:30px;
}

/* 顶部导航栏（全屏页面用）*/
.page-header{
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(90,120,70,0.2);
  background:rgba(220,232,216,0.95);
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding-top:max(14px,env(safe-area-inset-top,14px));
}
.page-header-title{font-size:17px;font-weight:700;color:#2e4a22;flex:1}
.back-btn{background:none;border:none;cursor:pointer;font-size:28px;color:#5a8040;padding:0;line-height:1;flex-shrink:0}

/* Tab布局 */
.tab-content{padding-bottom:calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 8px)}

/* 粘性顶栏 */
.sticky-bar{
  position:sticky;top:0;z-index:20;
  background:rgba(215,230,210,0.95);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(140,185,120,0.25);
  padding:14px 16px 11px;
  padding-top:max(14px,env(safe-area-inset-top,14px));
}
.sticky-bar h1{font-size:22px;font-weight:800;color:#2e4a22;letter-spacing:-.3px}
.sticky-bar .sub{font-size:11px;color:#7a9e7e;margin-top:2px}

/* 底部导航 */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:460px;z-index:100;
  background:rgba(235,244,230,0.96);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(140,185,120,0.3);
  display:flex;
  padding-bottom:max(env(safe-area-inset-bottom,0px),16px);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 6px;background:none;border:none;cursor:pointer;font-family:inherit}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;color:#8aaa78;font-weight:500}
.nav-btn.active .nav-label{color:#2e4a22;font-weight:700}
.nav-active-bar{width:20px;height:2.5px;background:#5a8040;border-radius:2px;margin-top:1px}

/* 卡片 */
.card{background:rgba(255,255,255,0.58);border:1px solid rgba(150,185,130,0.35);border-radius:14px;padding:13px 14px}

/* 通用按钮 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:11px 16px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .12s}
.btn:active{opacity:.7}
.btn-green{background:rgba(100,160,70,.88);color:white}
.btn-gray{background:rgba(200,218,190,.45);border:1px solid rgba(160,190,140,.4);color:#4a6a38}
.btn-red{background:rgba(220,100,80,.15);border:1px solid rgba(190,80,60,.4);color:#8a2010}

/* 输入框 */
.input{width:100%;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,.72);border:1px solid rgba(150,185,130,.45);font-family:inherit;font-size:14px;color:#2e4a22;outline:none;-webkit-appearance:none}
.input:focus{border-color:rgba(90,128,64,.7);background:rgba(255,255,255,.88)}
.field-label{display:block;font-size:11px;color:#6a8858;margin-bottom:3px;font-weight:500}

/* 分类筛选条 */
.cat-strip{display:flex;gap:6px;overflow-x:auto;padding:8px 16px 10px;scrollbar-width:none}
.cat-strip::-webkit-scrollbar{display:none}
.cat-chip{white-space:nowrap;flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;background:rgba(180,210,160,.2);border:1px solid rgba(150,185,130,.3);color:#5a7848;font-family:inherit}
.cat-chip.active{background:rgba(80,120,54,.82);border-color:rgba(60,100,34,.8);color:white;font-weight:700}

/* 植物列表 */
.plant-list{padding:4px 16px;display:flex;flex-direction:column;gap:10px}
.plant-card-row{background:rgba(255,255,255,.6);border:1px solid rgba(150,185,130,.45);border-radius:14px;padding:12px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:11px}
.plant-card-row:active{opacity:.85}

/* 占位 */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 32px;text-align:center}
.placeholder-emoji{font-size:56px;opacity:.55}
.placeholder-title{font-size:18px;font-weight:700;color:#3a5828}
.placeholder-desc{font-size:13px;color:#7a9060;line-height:1.7}

/* FAB */
.fab{position:fixed;bottom:calc(58px + max(env(safe-area-inset-bottom,0px),16px) + 14px);right:max(calc(50% - 230px + 16px),16px);width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6aaa44,#4a8a30);border:none;cursor:pointer;font-size:26px;color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(50,90,30,.32);z-index:60}
.fab:active{transform:scale(.92)}

/* Toast */
.toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:999;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.3,.64,1)}
.toast-wrap.show{transform:translateX(-50%) translateY(0)}
.toast-inner{background:rgba(30,60,18,.92);color:white;font-size:13px;font-weight:600;padding:10px 20px;border-radius:24px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18)}

/* 护理状态色块 */
.care-btn-block{flex:1;padding:8px 4px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:11px;text-align:center;transition:opacity .12s}
.care-btn-block:active{opacity:.7}

/* 详情页照片区 */
.photo-upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:160px;border-radius:14px;border:1.5px dashed rgba(150,185,130,.5);background:rgba(180,210,160,.1);cursor:pointer;gap:6px}
.photo-img{width:100%;max-height:200px;object-fit:cover;border-radius:14px;display:block}

/* 日志列表项 */
.log-item{background:rgba(255,255,255,.6);border:1px solid rgba(150,185,130,.3);border-radius:11px;padding:10px 13px;margin-bottom:8px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
'use strict';
const {useState,useEffect,useCallback,useRef,createContext,useContext}=React;

// ═══════════════════════════════════════════════
// 1. 常量 & 数据
// ═══════════════════════════════════════════════
const SK='plants_v9';
const DEFAULT_CATS=['🍎 水果','🌿 调味','🌺 花木','🥬 蔬菜'];

const BLANK=()=>({
  id:'',name:'',variety:'',type:'',category:'',notes:'',photo:'',
  status:'healthy',source:'sapling',indoorStart:'',
  buyDate:'',buyFrom:'',buySpec:'',buyPrice:'',
  sowDate:'',sowMethod:'',seedSource:'',
  germDate:'',germNotes:'',
  opDate:'',opNotes:'',rootDate:'',
  hardeningDate:'',hardeningDays:7,hardeningNotes:'',
  prePlantDate:'',prePlantNotes:'',
  transplantDate:'',transplantNotes:'',
  finalPlantDate:'',finalPlantNotes:'',finalPlantLocation:'',
  wi:7,fi:14,mi:30,medMode:'symptom',
  waterLog:[],fertLog:[],medLog:[],noteLog:[],
});

const STATUS_MAP={
  healthy:{label:'✅ 健康',color:'#2a6a35',bg:'rgba(80,190,80,0.15)'},
  watch:  {label:'👀 观察中',color:'#7a6010',bg:'rgba(220,185,60,0.18)'},
  treat:  {label:'💊 治疗中',color:'#8a2818',bg:'rgba(210,90,70,0.18)'},
};

const SRCS=[
  {key:'seed',   icon:'🌱',label:'种子自播'},
  {key:'sapling',icon:'🌿',label:'购入苗木'},
  {key:'mature', icon:'🪴',label:'购入成株'},
  {key:'bulb',   icon:'🧅',label:'购入球根'},
  {key:'cutting',icon:'✂️',label:'扦插繁殖'},
  {key:'graft',  icon:'🔗',label:'嫁接'},
  {key:'division',icon:'🌾',label:'分株'},
  {key:'other',  icon:'📦',label:'其他'},
];

const LOG_META={
  water:{icon:'💧',label:'浇水',key:'waterLog',ph:'浇水量、方式…'},
  fert: {icon:'🌿',label:'施肥',key:'fertLog', ph:'施肥观察…'},
  med:  {icon:'💊',label:'给药',key:'medLog',  ph:'用药后观察…'},
};

const AUTO_INT=[
  {k:['多肉','仙人掌'],w:10,f:30},
  {k:['玫瑰','月季'],  w:2, f:10},
  {k:['薄荷','香草'],  w:2, f:14},
  {k:['蝴蝶兰','兰花'],w:7, f:14},
  {k:['橡皮树','龟背竹'],w:5,f:21},
  {k:['绿萝','吊兰'],  w:3, f:14},
  {k:['番茄','辣椒'],  w:1, f:7},
];

// ═══════════════════════════════════════════════
// 2. 工具函数
// ═══════════════════════════════════════════════
function uid(){return 'p'+Date.now()+Math.random().toString(36).slice(2,6)}
function toDay(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDate(s){if(!s)return '—';const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?`${m[1]}/${m[2]}/${m[3]}`:s}
function daysSince(s){if(!s)return null;const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(!m)return null;return Math.floor((Date.now()-new Date(+m[1],+m[2]-1,+m[3]))/86400000)}
function lastLog(log){return log?.length?log[log.length-1].date:null}
function autoInt(name){for(const r of AUTO_INT)if(r.k.some(k=>name.includes(k)))return{wi:r.w,fi:r.f};return{wi:7,fi:14}}
function careAlerts(p){
  const a=[];
  const wd=daysSince(lastLog(p.waterLog))??999;
  const fi=parseInt(p.fi)||14;
  const wi=parseInt(p.wi)||7;
  if(wd>=wi)a.push({type:'water',icon:'💧',label:`浇水（已${wd}天）`,color:'#1a5a99'});
  const fd=daysSince(lastLog(p.fertLog))??999;
  if(fd>=fi)a.push({type:'fert',icon:'🌿',label:`施肥（已${fd}天）`,color:'#2a7020'});
  if(p.medMode==='scheduled'){const md=daysSince(lastLog(p.medLog))??999;if(md>=(parseInt(p.mi)||30))a.push({type:'med',icon:'💊',label:`给药（已${md}天）`,color:'#882010'});}
  return a;
}
function plantEmoji(p){
  const s=(p.name+p.variety+p.category).toLowerCase();
  if(/多肉|仙人/.test(s))return '🌵';
  if(/玫瑰|月季/.test(s))return '🌹';
  if(/兰/.test(s))return '🌸';
  if(/番茄|辣椒/.test(s))return '🍅';
  if(/黄瓜|瓜/.test(s))return '🥒';
  if(/薄荷|罗勒/.test(s))return '🌿';
  return '🪴';
}

// ═══════════════════════════════════════════════
// 3. Storage
// ═══════════════════════════════════════════════
function rLS(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb}catch{return fb}}
function wLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function loadAll(){
  const arc=rLS('plant_archive',{plants:[],batches:[]});
  return{
    plants: rLS(SK,[]),
    cats:   rLS('plant_cats',DEFAULT_CATS),
    lib:{fert:rLS('lib_fert',[]),med:rLS('lib_med',[]),soil:rLS('lib_soil',[])},
    archive:{plants:arc.plants||[],batches:arc.batches||[]},
    prop:   rLS('lib_prop',[]),
  };
}
function saveAll(db){
  wLS(SK,db.plants);
  wLS('plant_cats',db.cats);
  wLS('lib_fert',db.lib.fert);
  wLS('lib_med',db.lib.med);
  wLS('lib_soil',db.lib.soil);
  wLS('plant_archive',db.archive);
  wLS('lib_prop',db.prop);
}

// ═══════════════════════════════════════════════
// 4. Context
// ═══════════════════════════════════════════════
const Ctx=createContext(null);
function useApp(){return useContext(Ctx)}

// ═══════════════════════════════════════════════
// 5. Toast
// ═══════════════════════════════════════════════
function useToast(){
  const[s,setS]=useState({msg:'',show:false});
  const t=useRef(null);
  const show=useCallback((msg,ms=2200)=>{
    clearTimeout(t.current);
    setS({msg,show:true});
    t.current=setTimeout(()=>setS(x=>({...x,show:false})),ms);
  },[]);
  const el=<div className={`toast-wrap${s.show?' show':''}`}><div className="toast-inner">{s.msg}</div></div>;
  return{show,el};
}

// ═══════════════════════════════════════════════
// 6. 底部导航
// ═══════════════════════════════════════════════
const NAV=[
  {id:'calendar',icon:'📅',label:'日历'},
  {id:'plants',  icon:'🪴',label:'植物'},
  {id:'breeding',icon:'🌱',label:'繁育'},
  {id:'inventory',icon:'📦',label:'库存'},
];
function BottomNav({tab,onNav,badge}){
  return(
    <nav className="bottom-nav">
      {NAV.map(n=>(
        <button key={n.id} className={`nav-btn${tab===n.id?' active':''}`} onClick={()=>onNav(n.id)}>
          <span className="nav-icon" style={{position:'relative'}}>
            {n.icon}
            {n.id==='plants'&&badge>0&&<span style={{position:'absolute',top:-4,right:-8,background:'#e05030',color:'white',fontSize:9,fontWeight:700,borderRadius:8,padding:'1px 4px',minWidth:16,textAlign:'center',lineHeight:'14px'}}>{badge>9?'9+':badge}</span>}
          </span>
          <span className="nav-label">{n.label}</span>
          {tab===n.id&&<div className="nav-active-bar"/>}
        </button>
      ))}
    </nav>
  );
}

// ═══════════════════════════════════════════════
// 7. 日志管理页（全屏）
// ═══════════════════════════════════════════════
function LogPage({plantId,logType,onClose}){
  const{db,updateDb,toast}=useApp();
  const plant=db.plants.find(p=>p.id===plantId);
  const meta=LOG_META[logType];
  const log=plant?.[meta.key]||[];
  const blank=()=>({date:toDay(),note:'',name:'',reason:'',amount:''});
  const[form,setForm]=useState(blank());
  const[editIdx,setEditIdx]=useState(null);
  const[delIdx,setDelIdx]=useState(null);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{window.scrollTo(0,0)},[]);

  function save(){
    if(!form.date){toast.show('⚠️ 请选择日期');return}
    updateDb(prev=>{
      const plants=prev.plants.map(p=>{
        if(p.id!==plantId)return p;
        const arr=[...(p[meta.key]||[])];
        const rec={date:form.date};
        if(logType==='fert'){rec.name=form.name;rec.amount=form.amount;rec.note=form.note}
        else if(logType==='med'){rec.name=form.name;rec.reason=form.reason;rec.amount=form.amount;rec.note=form.note}
        else{rec.note=form.note}
        if(editIdx!==null)arr[editIdx]=rec;
        else{arr.push(rec);arr.sort((a,b)=>a.date.localeCompare(b.date))}
        return{...p,[meta.key]:arr};
      });
      return{...prev,plants};
    });
    setEditIdx(null);setForm(blank());
    toast.show(editIdx!==null?'✅ 已保存修改':`${meta.icon} 已记录${meta.label}`);
  }

  function startEdit(idx){
    const r=log[idx];
    setForm({date:r.date,note:r.note||'',name:r.name||'',reason:r.reason||'',amount:r.amount||''});
    setEditIdx(idx);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function doDelete(){
    updateDb(prev=>({...prev,plants:prev.plants.map(p=>{
      if(p.id!==plantId)return p;
      const arr=[...(p[meta.key]||[])];arr.splice(delIdx,1);return{...p,[meta.key]:arr};
    })}));
    setDelIdx(null);toast.show('🗑 已删除');
  }

  if(!plant)return null;
  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">
          {meta.icon} {plant.name}{plant.variety?<span style={{fontWeight:400,color:'#5a7848',marginLeft:6,fontSize:14}}>{plant.variety}</span>:''} · {meta.label}记录
        </div>
      </div>
      <div style={{padding:'14px 16px',paddingBottom:40}}>
        {/* 表单 */}
        <div className="card" style={{marginBottom:14}}>
          <div style={{fontSize:12,color:'#6a8858',fontWeight:700,marginBottom:10}}>{editIdx!==null?'修改记录':'新增记录'}</div>
          <label className="field-label">日期</label>
          <input type="date" className="input" style={{marginBottom:8}} value={form.date} max={toDay()} onChange={e=>sf('date',e.target.value)}/>
          {logType==='fert'&&<>
            <label className="field-label">肥料名称</label>
            <input className="input" style={{marginBottom:8}} placeholder="复合肥、磷酸二氢钾…" value={form.name} onChange={e=>sf('name',e.target.value)}/>
            <label className="field-label">用量/浓度</label>
            <input className="input" style={{marginBottom:8}} placeholder="5g/L…" value={form.amount} onChange={e=>sf('amount',e.target.value)}/>
          </>}
          {logType==='med'&&<>
            <label className="field-label">药品名称</label>
            <input className="input" style={{marginBottom:8}} placeholder="多菌灵、吡虫啉…" value={form.name} onChange={e=>sf('name',e.target.value)}/>
            <label className="field-label">病症/原因</label>
            <input className="input" style={{marginBottom:8}} placeholder="白粉病、蚜虫…" value={form.reason} onChange={e=>sf('reason',e.target.value)}/>
            <label className="field-label">用量/浓度</label>
            <input className="input" style={{marginBottom:8}} placeholder="稀释800倍…" value={form.amount} onChange={e=>sf('amount',e.target.value)}/>
          </>}
          <label className="field-label">{logType==='water'?'备注（可选）':'备注'}</label>
          <textarea className="input" rows={2} style={{marginBottom:10,resize:'vertical',lineHeight:1.6}} placeholder={meta.ph} value={form.note} onChange={e=>sf('note',e.target.value)}/>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-green" style={{flex:1}} onClick={save}>✓ {editIdx!==null?'保存修改':'添加'}</button>
            {editIdx!==null&&<button className="btn btn-gray" onClick={()=>{setEditIdx(null);setForm(blank())}}>取消</button>}
          </div>
        </div>
        {/* 历史 */}
        <div style={{fontSize:12,color:'#6a8858',fontWeight:700,marginBottom:8}}>历史记录（{log.length} 条）</div>
        {log.length===0
          ?<div style={{textAlign:'center',color:'#9aaa88',fontSize:13,padding:'28px 0'}}>暂无记录</div>
          :[...log].reverse().map((r,ri)=>{
            const origIdx=log.length-1-ri;
            return(
              <div key={origIdx} className="log-item">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#2e4a22'}}>{fmtDate(r.date)}</span>
                    {r.name&&<span style={{fontSize:12,color:'#5a7848',marginLeft:8}}>{r.name}</span>}
                    {r.amount&&<span style={{fontSize:12,color:'#7a9060',marginLeft:6}}>· {r.amount}</span>}
                    {r.reason&&<div style={{fontSize:11,color:'#9a7040',marginTop:2}}>病症：{r.reason}</div>}
                    {r.note&&<div style={{fontSize:12,color:'#6a8858',marginTop:2}}>{r.note}</div>}
                  </div>
                  <div style={{display:'flex',gap:2,flexShrink:0,marginLeft:8}}>
                    <button style={{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'2px 5px'}} onClick={()=>startEdit(origIdx)}>✏️</button>
                    <button style={{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'2px 5px'}} onClick={()=>setDelIdx(origIdx)}>🗑️</button>
                  </div>
                </div>
              </div>
            );
          })
        }
      </div>
      {/* 删除确认 */}
      {delIdx!==null&&(
        <div style={{position:'fixed',inset:0,background:'rgba(40,65,25,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={()=>setDelIdx(null)}>
          <div style={{background:'#f5f8f2',borderRadius:18,padding:'24px 20px',width:'100%',maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:28,marginBottom:10}}>⚠️</div>
            <div style={{fontSize:15,fontWeight:600,color:'#2e4a22',marginBottom:18}}>确认删除这条记录吗？</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-gray" style={{flex:1}} onClick={()=>setDelIdx(null)}>取消</button>
              <button className="btn btn-red" style={{flex:1}} onClick={doDelete}>确认删除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 8. 植物详情页（全屏）
// ═══════════════════════════════════════════════
function PlantDetail({plantId,onClose,onEdit,onOpenLog}){
  const{db,updateDb,toast}=useApp();
  const plant=db.plants.find(p=>p.id===plantId);
  useEffect(()=>{window.scrollTo(0,0)},[]);
  if(!plant)return null;

  const st=STATUS_MAP[plant.status]||STATUS_MAP.healthy;
  const src=SRCS.find(s=>s.key===plant.source);
  const alerts=careAlerts(plant);

  // 生长档案
  const tl=[];
  function addT(icon,label,date,note,color){if(date)tl.push({icon,label,date,note,color})}
  if(plant.source==='seed'){
    addT('🌱','播种',plant.sowDate,[plant.indoorStart?`环境：${plant.indoorStart==='indoor'?'室内':'室外'}`:'',plant.sowMethod?`方式：${plant.sowMethod}`:'',plant.seedSource?`种子来源：${plant.seedSource}`:''].filter(Boolean).join('\n'),'#5a8040');
    addT('🌿','发芽',plant.germDate,plant.germNotes||'','#6a9040');
  }
  if(['sapling','mature','bulb','other'].includes(plant.source))
    addT(src?.icon||'🛒','购入',plant.buyDate,[plant.buyFrom?`来源：${plant.buyFrom}`:'',plant.buySpec?`规格：${plant.buySpec}`:'',plant.buyPrice?`价格：${plant.buyPrice}`:''].filter(Boolean).join('\n'),'#5a7898');
  if(plant.source==='cutting'){
    addT('✂️','扦插',plant.opDate,[plant.indoorStart?`环境：${plant.indoorStart==='indoor'?'室内':'室外'}`:'',plant.buyFrom?`插穗来源：${plant.buyFrom}`:'',plant.opNotes?`备注：${plant.opNotes}`:''].filter(Boolean).join('\n'),'#7a6848');
    addT('🌱','生根/成活',plant.rootDate,'','#5a8040');
  }
  if(plant.source==='graft'){
    addT('🔗','嫁接',plant.opDate,[plant.indoorStart?`环境：${plant.indoorStart==='indoor'?'室内':'室外'}`:'',plant.buyFrom?`砧木来源：${plant.buyFrom}`:'',plant.opNotes?`备注：${plant.opNotes}`:''].filter(Boolean).join('\n'),'#7a6848');
    addT('✅','成活确认',plant.rootDate,'','#5a8040');
  }
  if(plant.source==='division')addT('🌾','分株',plant.opDate,[plant.buyFrom?`母株：${plant.buyFrom}`:'',plant.opNotes?`备注：${plant.opNotes}`:''].filter(Boolean).join('\n'),'#7a6848');
  if(plant.hardeningDate&&plant.indoorStart==='indoor'){
    const hd=daysSince(plant.hardeningDate),tgt=plant.hardeningDays||7,done=hd>=tgt;
    addT('🌤️',`炼苗${done?'（完成）':'（进行中）'}`,plant.hardeningDate,[`计划${tgt}天${done?'':`,已${hd}天`}`,plant.hardeningNotes?`备注：${plant.hardeningNotes}`:''].filter(Boolean).join('\n'),'#8a7a30');
  }
  addT('🪴','假植',plant.prePlantDate,plant.prePlantNotes||'','#5a9068');
  addT('🔄','移栽',plant.transplantDate,plant.transplantNotes?`备注：${plant.transplantNotes}`:'','#5a9888');
  addT('📍','定植',plant.finalPlantDate,[plant.finalPlantLocation?`位置：${plant.finalPlantLocation}`:'',plant.finalPlantNotes?`备注：${plant.finalPlantNotes}`:''].filter(Boolean).join('\n'),'#5a7898');

  function handlePhoto(e){
    const file=e.target.files?.[0];if(!file)return;
    if(file.size>5*1024*1024){toast.show('⚠️ 图片超过5MB');return}
    const reader=new FileReader();
    reader.onload=ev=>updateDb(prev=>({...prev,plants:prev.plants.map(p=>p.id===plantId?{...p,photo:ev.target.result}:p)}));
    reader.readAsDataURL(file);
  }

  const wd=daysSince(lastLog(plant.waterLog));
  const fd=daysSince(lastLog(plant.fertLog));
  const md=daysSince(lastLog(plant.medLog));

  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">{plant.name}{plant.variety?<span style={{fontWeight:400,color:'#5a7848',marginLeft:8,fontSize:14}}>{plant.variety}</span>:''}</div>
        <span style={{background:st.bg,color:st.color,padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>{st.label}</span>
      </div>
      <div style={{maxWidth:460,margin:'0 auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>
        {/* 照片 */}
        {plant.photo
          ?<div style={{position:'relative'}}>
            <img src={plant.photo} className="photo-img" alt={plant.name}/>
            <label style={{position:'absolute',bottom:8,right:8,background:'rgba(0,0,0,.45)',borderRadius:'50%',width:28,height:28,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'white'}}>
              📷<input type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
            </label>
          </div>
          :<label className="photo-upload-area">
            <span style={{fontSize:36}}>📷</span>
            <span style={{fontSize:12,color:'#8aaa78'}}>添加植物照片</span>
            <input type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
          </label>
        }

        {/* 基本信息条 */}
        <div className="card" style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {plant.category&&<span style={{background:'rgba(150,200,120,.22)',color:'#3a5828',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,border:'1px solid rgba(130,180,100,.3)'}}>{plant.category}</span>}
          {plant.type&&<span style={{fontSize:12,color:'#5a7848'}}>{plant.type}</span>}
          {src&&<span style={{fontSize:12,color:'#5a7848'}}>{src.icon} {src.label}</span>}
          {plant.finalPlantLocation&&<span style={{fontSize:12,color:'#5a7848'}}>📍 {plant.finalPlantLocation}</span>}
        </div>

        {/* 护理提醒 */}
        {alerts.length>0&&(
          <div className="card" style={{borderColor:'rgba(200,140,50,.4)',background:'rgba(240,200,180,.15)'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#8a3020',marginBottom:6}}>⚠️ 护理提醒</div>
            {alerts.map((a,i)=><div key={i} style={{fontSize:13,color:'#7a2818',padding:'3px 0'}}>{a.icon} {a.label}</div>)}
          </div>
        )}

        {/* 护理按钮 */}
        <div className="card">
          <div style={{fontSize:12,fontWeight:700,color:'#4a6a38',marginBottom:10}}>📋 护理记录</div>
          <div style={{display:'flex',gap:6}}>
            {[
              {type:'water',icon:'💧',days:wd,urgent:(wd??999)>=(parseInt(plant.wi)||7),cnt:(plant.waterLog||[]).length},
              {type:'fert', icon:'🌿',days:fd,urgent:(fd??999)>=(parseInt(plant.fi)||14),cnt:(plant.fertLog||[]).length},
              {type:'med',  icon:'💊',days:md,urgent:false,cnt:(plant.medLog||[]).length},
            ].map(item=>(
              <button key={item.type}
                className="care-btn-block"
                style={{
                  border:`1px solid ${item.urgent?'rgba(200,140,50,.5)':'rgba(150,185,130,.45)'}`,
                  background:item.urgent?'rgba(240,190,100,.25)':'rgba(180,215,160,.2)',
                  color:item.urgent?'#7a5010':'#4a7040',
                }}
                onClick={()=>onOpenLog(plant.id,item.type)}>
                <div style={{fontSize:18,marginBottom:2}}>{item.icon}</div>
                <div style={{fontWeight:600}}>{item.urgent?'⚠️ ':''}{item.days!=null?`${item.days}天前`:LOG_META[item.type].label}</div>
                <div style={{fontSize:10,color:'#8aaa78',marginTop:1}}>{item.cnt}条记录</div>
              </button>
            ))}
          </div>
        </div>

        {/* 生长档案 */}
        {tl.length>0&&(
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'#4a6a38',marginBottom:8}}>📋 生长档案</div>
            {tl.map((item,idx)=>(
              <div key={idx} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 0',borderBottom:idx<tl.length-1?'1px solid rgba(150,185,130,.15)':'none'}}>
                <span style={{fontSize:18}}>{item.icon}</span>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:12,color:item.color,fontWeight:700}}>{item.label}</span>
                    <span style={{fontSize:12,color:'#7a9868'}}>{fmtDate(item.date)}</span>
                  </div>
                  {item.note&&<div style={{fontSize:12,color:'#7a9060',marginTop:4,lineHeight:1.7,whiteSpace:'pre-line'}}>{item.note}</div>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* 备注 */}
        {plant.notes&&(
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:'#4a6a38',marginBottom:6}}>📝 备注</div>
            <div style={{fontSize:13,color:'#5a7040',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{plant.notes}</div>
          </div>
        )}

        {/* 操作按钮 */}
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-green" style={{flex:1}} onClick={()=>onEdit(plant)}>✏️ 编辑</button>
          <button className="btn btn-gray" style={{flex:1}} onClick={onClose}>关闭</button>
        </div>
      </div>
    </div>
  );
}

// 9. 植物表单页（全屏）
// ═══════════════════════════════════════════════
function PlantForm({initPlant,onClose}){
  const{db,updateDb,toast}=useApp();
  const isEdit=!!(initPlant?.id);
  const[form,setForm]=useState(()=>({...BLANK(),...(isEdit?initPlant:{}),id:isEdit?initPlant.id:uid()}));
  useEffect(()=>{window.scrollTo(0,0)},[]);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleName(v){
    setForm(f=>({...f,name:v,...(!isEdit?autoInt(v):{})}));
  }

  function save(){
    if(!form.name.trim()){toast.show('⚠️ 请填写植物名称');return}
    updateDb(prev=>{
      const plants=isEdit?prev.plants.map(p=>p.id===form.id?{...p,...form}:p):[...prev.plants,form];
      const cats=(form.category&&!prev.cats.includes(form.category))?[...prev.cats,form.category]:prev.cats;
      return{...prev,plants,cats};
    });
    toast.show(isEdit?'✅ 已更新':'🌱 已添加');
    onClose();
  }

  const allCats=[...new Set([...db.cats,...db.plants.map(p=>p.category).filter(Boolean)])];

  return(
    <div className="fullpage">
      <div className="page-header">
        <button className="back-btn" onClick={onClose}>‹</button>
        <div className="page-header-title">{isEdit?`✏️ 编辑：${initPlant.name}`:'🌱 添加植物'}</div>
      </div>
      <div style={{maxWidth:460,margin:'0 auto',padding:'16px',display:'flex',flexDirection:'column',gap:12}}>
        <div>
          <label className="field-label">植物名称 *</label>
          <input className="input" placeholder="如：玫瑰、番茄…" value={form.name} onChange={e=>handleName(e.target.value)}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}>
            <label className="field-label">品种</label>
            <input className="input" placeholder="品种名…" value={form.variety} onChange={e=>sf('variety',e.target.value)}/>
          </div>
          <div style={{flex:1}}>
            <label className="field-label">类别</label>
            <input className="input" placeholder="果树、蔬菜…" value={form.category} onChange={e=>sf('category',e.target.value)} list="form-cats"/>
            <datalist id="form-cats">{allCats.map(c=><option key={c} value={c}/>)}</datalist>
          </div>
        </div>

        {/* 健康状态 */}
        <div>
          <label className="field-label">健康状态</label>
          <div style={{display:'flex',gap:6}}>
            {Object.entries(STATUS_MAP).map(([k,v])=>(
              <button key={k} style={{flex:1,padding:'8px 4px',borderRadius:9,cursor:'pointer',fontFamily:'inherit',fontSize:11,
                background:form.status===k?v.bg:'rgba(180,210,160,.1)',
                border:`1px solid ${form.status===k?v.color+'88':'rgba(150,185,130,.25)'}`,
                color:form.status===k?v.color:'#6a8858'}}
                onClick={()=>sf('status',k)}>{v.label}</button>
            ))}
          </div>
        </div>

        {/* 护理周期 */}
        <div className="card" style={{background:'rgba(185,220,160,.15)'}}>
          <div style={{fontSize:12,fontWeight:700,color:'#3a5828',marginBottom:10}}>⏱ 护理周期</div>
          <div style={{display:'flex',gap:12,textAlign:'center'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:'#6a8858',marginBottom:4}}>💧 浇水间隔（天）</div>
              <input type="number" min={1} className="input" style={{width:80,textAlign:'center',fontSize:15,fontWeight:700,color:'#2266aa'}} value={form.wi} onChange={e=>sf('wi',+e.target.value||7)}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:'#6a8858',marginBottom:4}}>🌿 施肥间隔（天）</div>
              <input type="number" min={1} className="input" style={{width:80,textAlign:'center',fontSize:15,fontWeight:700,color:'#3a7a28'}} value={form.fi} onChange={e=>sf('fi',+e.target.value||14)}/>
            </div>
          </div>
        </div>

        <div>
          <label className="field-label">备注</label>
          <textarea className="input" rows={3} style={{resize:'vertical',lineHeight:1.6}} placeholder="特殊说明…" value={form.notes} onChange={e=>sf('notes',e.target.value)}/>
        </div>

        <div style={{display:'flex',gap:8,paddingBottom:20}}>
          <button className="btn btn-green" style={{flex:1}} onClick={save}>✓ 保存</button>
          <button className="btn btn-gray" style={{flex:1}} onClick={onClose}>取消</button>
        </div>
      </div>
    </div>
  );
}

// 10. 植物 Tab
// ═══════════════════════════════════════════════
function PlantsTab(){
  const{db,updateDb,toast}=useApp();
  const[search,setSearch]=useState('');
  const[filterCat,setFilter]=useState('all');
  const[view,setView]=useState(null); // null | {type:'detail',id} | {type:'form',plant} | {type:'log',plantId,logType}

  if(view?.type==='log')
    return<LogPage plantId={view.plantId} logType={view.logType} onClose={()=>setView(null)}/>;
  if(view?.type==='detail')
    return<PlantDetail
      plantId={view.id}
      onClose={()=>setView(null)}
      onEdit={p=>setView({type:'form',plant:p})}
      onOpenLog={(pid,lt)=>setView({type:'log',plantId:pid,logType:lt})}/>;
  if(view?.type==='form')
    return<PlantForm initPlant={view.plant||null} onClose={()=>setView(null)}/>;

  const usedCats=[...new Set(db.plants.map(p=>p.category).filter(Boolean))];
  const allCats=[...new Set([...db.cats,...usedCats])];
  const q=search.trim().toLowerCase();
  const filtered=db.plants.filter(p=>{
    const mQ=!q||p.name.toLowerCase().includes(q)||(p.variety||'').toLowerCase().includes(q);
    const mC=filterCat==='all'||(filterCat==='__none__'&&!p.category)||p.category===filterCat;
    return mQ&&mC;
  });

  return(
    <div className="tab-content">
      <div className="sticky-bar">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <h1>🪴 植物</h1>
          <span style={{background:'rgba(150,200,120,.22)',color:'#3a5828',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,border:'1px solid rgba(130,180,100,.3)'}}>{db.plants.length} 株</span>
        </div>
        <input className="input" placeholder="搜索植物名称…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="cat-strip">
        {[{id:'all',label:`全部 (${db.plants.length})`},
          ...allCats.filter(c=>db.plants.some(p=>p.category===c)).map(c=>({id:c,label:`${c} (${db.plants.filter(p=>p.category===c).length})`})),
          db.plants.some(p=>!p.category)?{id:'__none__',label:`未分类 (${db.plants.filter(p=>!p.category).length})`}:null,
        ].filter(Boolean).map(item=>(
          <button key={item.id} className={`cat-chip${filterCat===item.id?' active':''}`} onClick={()=>setFilter(item.id)}>{item.label}</button>
        ))}
      </div>
      <div className="plant-list">
        {filtered.length===0
          ?<div className="placeholder">
            <div className="placeholder-emoji">🪴</div>
            <div className="placeholder-title">{db.plants.length?'没有匹配的植物':'还没有植物'}</div>
            <div className="placeholder-desc">{db.plants.length?'换个搜索词试试？':'点击右下角 ＋ 添加第一株植物！'}</div>
          </div>
          :filtered.map(p=>{
            const st=STATUS_MAP[p.status]||STATUS_MAP.healthy;
            const alerts=careAlerts(p);
            const wd=daysSince(lastLog(p.waterLog));
            const fd=daysSince(lastLog(p.fertLog));
            return(
              <div key={p.id} className="plant-card-row" onClick={()=>setView({type:'detail',id:p.id})}>
                {p.photo
                  ?<img src={p.photo} style={{width:52,height:52,borderRadius:10,objectFit:'cover',flexShrink:0,border:'1px solid rgba(150,185,130,.3)'}}/>
                  :<div style={{width:52,height:52,borderRadius:10,flexShrink:0,background:'rgba(180,210,160,.2)',border:'1px solid rgba(150,185,130,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{plantEmoji(p)}</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:700,color:'#2e4a22',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {p.name}{p.variety&&<span style={{fontSize:13,fontWeight:400,color:'#5a7848',marginLeft:6}}>{p.variety}</span>}
                  </div>
                  <div style={{fontSize:12,color:'#7a9060',marginTop:3}}>
                    {[p.category,wd!=null?`💧${wd}天前`:null,fd!=null?`🌿${fd}天前`:null,p.finalPlantLocation?`📍${p.finalPlantLocation}`:null].filter(Boolean).join(' · ')}
                  </div>
                  {alerts.length>0&&<div style={{fontSize:12,color:'#c05020',marginTop:4}}>{alerts.map(a=>a.icon).join('')} {alerts.map(a=>a.label).join('  ')}</div>}
                </div>
                <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,marginTop:4,background:st.bg,border:`2px solid ${st.color}`}}/>
              </div>
            );
          })
        }
      </div>
      <button className="fab" onClick={()=>setView({type:'form',plant:null})}>＋</button>
    </div>
  );
}

// ═══════════════════════════════════════════════
// 11. 其他 Tab 占位
// ═══════════════════════════════════════════════
function CalendarTab(){
  return(
    <div className="tab-content">
      <div className="sticky-bar"><h1>📅 日历</h1><div className="sub">护理日历与提醒</div></div>
      <div className="placeholder"><div className="placeholder-emoji">📅</div><div className="placeholder-title">日历</div><div className="placeholder-desc">即将迁移：月历视图 · 每日护理提醒 · 天气建议</div></div>
    </div>
  );
}
function BreedingTab(){
  const{db}=useApp();
  return(
    <div className="tab-content">
      <div className="sticky-bar"><h1>🌱 繁育</h1><div className="sub">{db.prop.length} 个批次</div></div>
      <div className="placeholder"><div className="placeholder-emoji">🌱</div><div className="placeholder-title">繁育管理</div><div className="placeholder-desc">{db.prop.length?`已加载 ${db.prop.length} 个批次，迁移中…`:'即将迁移：扦插 · 播种 · 分株批次管理'}</div></div>
    </div>
  );
}
function InventoryTab(){
  const{db,updateDb,toast}=useApp();
  const total=db.lib.fert.length+db.lib.med.length+db.lib.soil.length;

  function exportData(){
    const data={plants:db.plants,fert:db.lib.fert,med:db.lib.med,soil:db.lib.soil,prop:db.prop,archive:db.archive,exportTime:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`植物志备份_${toDay()}.json`;a.click();
    URL.revokeObjectURL(url);toast.show('💾 备份已下载');
  }

  function importData(){document.getElementById('import-file').click()}

  function handleImport(e){
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.plants))throw new Error('格式不正确');
        if(!confirm(`将恢复 ${data.plants.length} 株植物数据，现有数据将被覆盖。确认？`))return;
        updateDb(()=>({plants:data.plants||[],cats:data.cats||DEFAULT_CATS,lib:{fert:data.fert||[],med:data.med||[],soil:data.soil||[]},archive:data.archive||{plants:[],batches:[]},prop:data.prop||[]}));
        toast.show('✅ 数据恢复成功');
      }catch(err){alert('导入失败：'+err.message)}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  return(
    <div className="tab-content">
      <div className="sticky-bar"><h1>📦 库存</h1><div className="sub">{total} 条库存记录</div></div>
      <div className="placeholder"><div className="placeholder-emoji">📦</div><div className="placeholder-title">库存管理</div><div className="placeholder-desc">{total?`肥料 ${db.lib.fert.length} · 农药 ${db.lib.med.length} · 基质 ${db.lib.soil.length}，迁移中…`:'即将迁移：肥料 · 农药 · 基质库存'}</div></div>
      <div style={{padding:'0 16px 20px',display:'flex',gap:8}}>
        <button className="btn btn-green" style={{flex:1}} onClick={exportData}>💾 备份数据</button>
        <button className="btn btn-gray" style={{flex:1,border:'1px solid rgba(140,175,210,.4)',color:'#384a68',background:'rgba(165,195,220,.25)'}} onClick={importData}>📂 恢复数据</button>
      </div>
      <input type="file" id="import-file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
    </div>
  );
}

// ═══════════════════════════════════════════════
// 12. App Root
// ═══════════════════════════════════════════════
function App(){
  const[db,setDb]=useState(()=>loadAll());
  const updateDb=useCallback(updater=>{
    setDb(prev=>{const next=typeof updater==='function'?updater(prev):updater;saveAll(next);return next});
  },[]);
  const[tab,setTab]=useState('calendar');
  const toast=useToast();

  const badge=db.plants.filter(p=>careAlerts(p).length>0).length;
  const ctx={db,updateDb,toast};

  const renderTab=()=>{
    switch(tab){
      case 'calendar':  return<CalendarTab/>;
      case 'plants':    return<PlantsTab/>;
      case 'breeding':  return<BreedingTab/>;
      case 'inventory': return<InventoryTab/>;
      default:          return<CalendarTab/>;
    }
  };

  return(
    <Ctx.Provider value={ctx}>
      {renderTab()}
      <BottomNav tab={tab} onNav={setTab} badge={badge}/>
      {toast.el}
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
